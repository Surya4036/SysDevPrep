  "Job sequencing Problem":              { pattern:"Sort by Profit + DSU Slot — assign each job to the latest free slot ≤ deadline.", insight:"Union-find compresses the search for the latest free slot to nearly O(1) per job.", complexity:"T: O(n log n)  S: O(n)", followup:"Job sequencing with cooldown?; weighted deadlines?", clarify:"Profit non-negative?; deadline 1-indexed?", edges:"All deadlines = 1; all same profit; empty input" },
  "Fractional Knapsack":                 { pattern:"Sort by Value/Weight + Greedy Fill — take whole items, fraction the last.", insight:"Continuous knapsack is greedy because partial inclusion is allowed; sorted by ratio.", complexity:"T: O(n log n)  S: O(1)", followup:"0/1 knapsack DP?; multiple knapsacks?", clarify:"Capacity float-precision?; positive weights?", edges:"Capacity 0; single item; all items fit" },
  "Assign Cookies":                      { pattern:"Sort + Two-Pointer Greedy — sort children and cookies, advance pointers, count fits.", insight:"Pairing the smallest cookie that satisfies the smallest child maximizes total satisfied.", complexity:"T: O(n log n + m log m)  S: O(1)", followup:"Maximize cookie value rather than count?; multiple cookies per child?", clarify:"Strict greater-equal?; arrays may be empty?", edges:"Empty inputs; cookies all too small; greedy children all same size" },
  // DP · Strivers
  "Longest common subsequence":          { pattern:"2D DP Edit-Style — dp[i][j] = dp[i-1][j-1]+1 if match, else max(dp[i-1][j], dp[i][j-1]).", insight:"Each prefix pair has an optimal LCS; recurrence chooses to align or skip one character.", complexity:"T: O(n*m)  S: O(min(n,m)) rolling",     followup:"Reconstruct the LCS?; longest common substring?; LPS?", clarify:"Case-sensitive?; allow non-ASCII?", edges:"Empty strings; identical; no common chars" },
  "0 and 1 Knapsack":                    { pattern:"2D DP — dp[i][w] = max(dp[i-1][w], dp[i-1][w-wt[i]] + val[i]).", insight:"Each item is included or excluded; the recurrence enumerates both.", complexity:"T: O(n*W)  S: O(W) rolling row", followup:"Unbounded knapsack?; bounded item counts?", clarify:"Integer weights?; capacity bounded?", edges:"Capacity 0; single item; all items too heavy" },
  "Edit distance":                       { pattern:"Levenshtein 2D DP — dp[i][j] = 1 + min(insert, delete, replace); 0 cost on match.", insight:"Each cell decides between three operations; recurrence captures all three on prefixes.", complexity:"T: O(n*m)  S: O(min(n,m)) rolling row", followup:"Damerau-Levenshtein?; weighted operations?", clarify:"All ops same cost?; case-sensitive?", edges:"Empty strings; identical; one a prefix of the other" },
  "Maximum Sum Increasing Subsequence":  { pattern:"DP over LIS Recurrence — dp[i] = max(dp[j] + a[i]) for j<i with a[j]<a[i].", insight:"Same scaffold as LIS but accumulating values rather than counting length.", complexity:"T: O(n^2)  S: O(n)", followup:"O(n log n) variant?; reconstruct subsequence?", clarify:"Strictly increasing?; values may be negative?", edges:"All same value; sorted descending; n = 1" },
  "Matrix chain multiplication":         { pattern:"Interval DP — dp[i][j] = min over k of dp[i][k] + dp[k+1][j] + p[i-1]*p[k]*p[j].", insight:"Each split point yields a multiplication cost; interval DP enumerates all splits.", complexity:"T: O(n^3)  S: O(n^2)", followup:"Reconstruct the parenthesization?; Knuth's O(n^2)?", clarify:"Dimensions positive?; matrices non-square?", edges:"Single matrix (cost 0); two matrices; chain of 1xN or Nx1" },
  "Minimum Path Sum (Strivers)":         { pattern:"2D DP Right/Down — dp[i][j] = grid[i][j] + min(dp[i-1][j], dp[i][j-1]).", insight:"Optimal path to (i,j) extends optimal path to (i-1,j) or (i,j-1); each cell decides locally.", complexity:"T: O(m*n)  S: O(n) rolling row", followup:"All four directions (Dijkstra)?; reconstruct path?", clarify:"Negative values?; non-rectangular grid?", edges:"1xN or Mx1; all zeros; all negatives" },
  "Coin change II":                      { pattern:"Unbounded Knapsack — dp[a] = sum over coins of dp[a - coin]; coin loop outer.", insight:"Outer-coin / inner-amount counts unordered combinations; reverse counts permutations.", complexity:"T: O(amount * coins)  S: O(amount)", followup:"Count permutations?; minimum coins?", clarify:"Coins unique?; amount = 0 returns 1?", edges:"amount 0; no coins; coin > amount" },
  "Subset sum equals to target":         { pattern:"Boolean Knapsack DP — dp[i][s] = dp[i-1][s] || dp[i-1][s - a[i]].", insight:"Each subset contributes 0 or one element; bottom-up table fills all reachable sums.", complexity:"T: O(n*sum)  S: O(sum) rolling row", followup:"Count subsets?; partition into k equal subsets?", clarify:"Non-negative values?; sum bounded?", edges:"Sum 0 (empty subset); single element; sum exceeds total" },
  "Rod cutting problem":                 { pattern:"Unbounded Knapsack — dp[len] = max over k of dp[len-k] + price[k].", insight:"Each rod length decomposes into one cut plus the optimal of the rest; standard DP.", complexity:"T: O(n^2)  S: O(n)", followup:"Reconstruct cut points?; cost-per-cut variant?", clarify:"Prices non-negative?; integer lengths only?", edges:"Length 0; price array length 1; identical prices" },
  "Super Egg Drop":                      { pattern:"Inverted DP — dp[k][m] = max floors testable with k eggs and m moves.", insight:"Inverting state from (eggs, floors) to (eggs, moves) collapses cost from O(k*n^2) to O(k*n).", complexity:"T: O(k*n)  S: O(k*n)", followup:"Closed form?; eggs reusable?", clarify:"Egg breaks irreversibly?; thresholds inclusive?", edges:"1 egg (linear); k >= log2(n) (binary); n = 0" },
  "Minimum coins (Strivers)":            { pattern:"Unbounded Knapsack DP — dp[a] = min(dp[a - coin] + 1) over coins.", insight:"Minimum coins to reach amount a depends only on minimums for smaller a.", complexity:"T: O(amount * coins)  S: O(amount)", followup:"Bounded coins?; max coins variant?", clarify:"Coins distinct?; reaching impossible amounts?", edges:"amount 0 (zero coins); no valid combo (-1); single coin" }
  // ───── Future task groups (8.2-8.9) splice their entries above this line ─────
};

// Normalize a raw DSA task name into a key suitable for PROBLEM_PREP lookup.
// Strips numeric prefixes ("1. ", "001 "), trailing difficulty badges
// ("[E]", "[M]", "[H]", "[M·P]"), and variant suffixes ("(variant)",
// "— follow-up", "- follow-up") so prepLookup can match decorated DSA task
// text against canonical PROBLEM_PREP keys.
function normalizePrepKey(rawName){
  return String(rawName)
    .replace(/^\s*\d+[.)\s-]+/, "")
    .replace(/\s*\[[^\]]+\]\s*$/, "")
    .replace(/\s*\((variant|follow-?up)\)\s*$/i, "")
    .replace(/\s*[—-]\s*(variant|follow-?up)\s*$/i, "")
    .trim();
}

// Module-local set tracking which prep names have already produced a
// console.warn — so each missing name (and the table-missing banner) warns
// exactly once per page load.
const _warnedMissingPrep = new Set();

// Module-level set tracking which prep cards are currently expanded, keyed by
// `prepId` (e.g. `${taskId}::${normalizePrepKey(name)}` for the Daily Schedule
// or `grind::${normalizePrepKey(name)}` for the Grind 169 tab). Membership is
// the single source of truth that `renderPrepCard` consults to decide whether
// to emit an open or collapsed card on every render pass — so cards stay open
// across re-renders triggered by checkbox ticks, note edits, or timer updates
// (Requirement 5.3). NOT persisted to localStorage: the Set lives only in
// memory for the current page session, so reloading the page returns every
// card to the collapsed default (Requirement 5.4).
const expandedPrepCards = new Set();

// Emit a single console.warn for `name` the first time it is missing from
// PROBLEM_PREP. The sentinel "__missing_table__" is reserved for the
// banner warning when PROBLEM_PREP itself is undefined.
function warnMissingPrepOnce(name){
  const key = name == null ? "" : String(name);
  if (_warnedMissingPrep.has(key)) return;
  _warnedMissingPrep.add(key);
  if (key === "__missing_table__") {
    console.warn("PROBLEM_PREP table missing — prep cards disabled");
  } else {
    console.warn(`PROBLEM_PREP: no entry for "${key}"`);
  }
}

// Look up a prep entry for a raw DSA task name. Returns the entry object
// on hit, or null on miss / when PROBLEM_PREP is unavailable. Misses
// trigger a single console.warn per normalized key.
function prepLookup(rawName){
  if (!rawName) return null;
  // Guard: PROBLEM_PREP could be undefined if an earlier JS error blocked its declaration
  if (typeof PROBLEM_PREP === 'undefined') {
    warnMissingPrepOnce("__missing_table__");
    return null;
  }
  const key = normalizePrepKey(rawName);
  const entry = PROBLEM_PREP[key] || null;
  if (!entry) warnMissingPrepOnce(key);
  return entry;
}

// Escape HTML-significant characters so prep-card content can safely
// interpolate into innerHTML strings. Covers the four characters that can
// break attribute or element parsing: `&`, `<`, `>`, and `"`.
// Order matters: `&` MUST be replaced first so the later substitutions don't
// double-escape the ampersands they introduce (e.g. `<` → `&lt;` would become
// `&amp;lt;` if `&` were escaped after `<`).
// @param {*} s — coerced to string before escaping
// @returns {string} the input with `& < > "` replaced by their entity forms
function escapeHTML(s){
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// Sanitize an arbitrary string into a fragment safe for use inside an HTML
// `id` attribute. Replaces every character that is not ASCII alphanumeric
// with `_` so problem names containing spaces, punctuation, or em-dashes
// (e.g. "Two Sum II — input array is sorted") yield a valid id like
// `Two_Sum_II___input_array_is_sorted`. Used by `renderPrepCard` to build
// per-card ids of the form `prep-${cssEscape(prepId)}`.
// @param {*} s — coerced to string before sanitizing
// @returns {string} the input with every non-alphanumeric character replaced by `_`
function cssEscape(s){
  return String(s).replace(/[^A-Za-z0-9]/g, "_");
}

// Render a single labelled row inside a prep-card. Two-shape output:
//   - When `value` contains a `;`, the value is treated as a multi-item field
//     and rendered as a `<ul>` with one `<li>` per non-empty trimmed segment
//     (per Requirement 1.5 / Property 5: count of <li> tags equals the count
//     of non-empty trimmed segments in `value.split(";")`).
//   - Otherwise the value is rendered as plain escaped text inside the `.val`
//     span (zero `<li>` tags).
// All emitted text is run through `escapeHTML` so prep content containing
// `< > & "` cannot break attribute or element parsing (Property 14).
// `labelClass` is the modifier class (e.g. "pattern", "insight", "complex",
// "followup", "clarify", "edges") that selects the existing per-label color
// token from the prep-card CSS in tracker/index.html.
// @param {string} labelText  — visible label text (e.g. "Pattern", "Edge Cases")
// @param {string} labelClass — modifier class on `.label`
// @param {*}      value      — coerced to string; `;` triggers list rendering
// @returns {string} a `<div class="row">…</div>` HTML fragment
function renderPrepRow(labelText, labelClass, value){
  const str = String(value);
  let body;
  if (str.includes(";")) {
    const items = str.split(";").map(s => s.trim()).filter(Boolean);
    body = `<ul>${items.map(s => `<li>${escapeHTML(s)}</li>`).join("")}</ul>`;
  } else {
    body = escapeHTML(str);
  }
  return `<div class="row">
      <span class="label ${labelClass}">${labelText}</span>
      <span class="val">${body}</span>
    </div>`;
}

// Render a single prep card (toggle + collapsible body) for one problem.
// PURE function: identical inputs always produce identical output. The
// open-vs-collapsed shape of the returned HTML is determined solely by
// `expandedPrepCards.has(prepId)` at call time — so callers can re-invoke
// `renderPrepCard` after any in-session re-render and the card's open state
// will survive (Requirement 5.3). All six rows are emitted in the fixed
// order required by Requirement 3.2: Pattern, Key Insight, Complexity,
// Follow-up, Clarify, Edge Cases — using the existing label modifier
// classes `pattern`, `insight`, `complex`, `followup`, `clarify`, `edges`
// already defined in tracker/index.html (Requirement 3.3 / 8.1).
//
// Attribute escaping:
//   - `data-prep-toggle` and `data-prep-card` carry the raw `prepId` (which
//     may include problem-name characters like spaces, em-dashes, or quotes),
//     so the value MUST be run through `escapeHTML` to keep `"` from
//     terminating the attribute early (Property 14 / Requirement 8.5).
//   - `id` and `aria-controls` use `cssEscape(prepId)`, which already
//     replaces every non-alphanumeric character with `_`, so its output is
//     safe to interpolate directly without further escaping.
//
// Toggle wiring is intentionally NOT done here: this function emits markup
// only. The click + keyboard handlers are attached separately by
// `wirePrepToggles` (task 4.1), which reads back `data-prep-toggle` /
// `data-prep-card` to flip `expandedPrepCards` membership and re-style the
// card in place. Containing `renderPrepCard` to a pure string-in / string-out
// shape is what lets Properties 6, 7, 8, 13, and 14 test it without a DOM.
//
// No external links are emitted (Requirement 7.1 / 7.3) — the card content
// is whatever the caller-supplied `prep` fields contain, rendered through
// `renderPrepRow` which only emits `<ul>`, `<li>`, and `<span>` elements.
//
// @param {string}    prepId — opaque per-card identifier; doubles as the
//                              `expandedPrepCards` Set key and the `data-*`
//                              attribute value
// @param {Object}    prep   — six-field prep entry
// @param {string}    prep.pattern
// @param {string}    prep.insight
// @param {string}    prep.complexity
// @param {string}    prep.followup
// @param {string}    prep.clarify
// @param {string}    prep.edges
// @returns {string} a `<span class="prep-toggle">…</span><div class="prep-card">…</div>`
//                   HTML fragment, ready to be embedded inside an existing
//                   task `<li>` or Grind row `<li>`
function renderPrepCard(prepId, prep){
  const open = expandedPrepCards.has(prepId);
  const cardStyle = open ? "" : "display:none";
  const toggleText = open ? "▾ Hide prep" : "▸ Show prep";
  const idAttr = cssEscape(prepId);
  const dataAttr = escapeHTML(prepId);
  return `
    <span class="prep-toggle"
          data-prep-toggle="${dataAttr}"
          tabindex="0" role="button"
          aria-expanded="${open}"
          aria-controls="prep-${idAttr}"
          title="Show/hide the per-problem interview prep card (pattern, insight, complexity, follow-up, clarify, edges).">${toggleText}</span>
    <div class="prep-card" id="prep-${idAttr}" data-prep-card="${dataAttr}" style="${cardStyle}">
      ${renderPrepRow("Pattern",     "pattern",  prep.pattern)}
      ${renderPrepRow("Key Insight", "insight",  prep.insight)}
      ${renderPrepRow("Complexity",  "complex",  prep.complexity)}
      ${renderPrepRow("Follow-up",   "followup", prep.followup)}
      ${renderPrepRow("Clarify",     "clarify",  prep.clarify)}
      ${renderPrepRow("Edge Cases",  "edges",    prep.edges)}
    </div>`;
}

// Convert a six-field prep entry into a plain-text block for the clipboard
// export (consumed by `taskToText` / `buildDayText`). Emits exactly six
// labelled lines in the fixed order matching the on-screen render order
// (Requirement 6.1):
//
//   Pattern, Key Insight, Complexity, Follow-up, Clarify, Edge Cases
//
// Indentation contract (Requirement 6.4 / Property 17): every line begins
// with at least five leading space characters, so the prep block stays
// visually distinct from the surrounding task lines — DSA task lines
// begin with `  • ` (two spaces and a bullet), so a five-space indent
// nests the prep block underneath them in any plain-text viewer.
//
// Multi-item fields use `;` as separator (Requirement 1.5). When a value
// contains a semicolon, the label is emitted on its own line as
// `     Label:` (five spaces, label, colon — with NO trailing
// colon-space), and each non-empty trimmed segment becomes a bullet line
// of the form `       - item` (seven leading spaces — five for the
// indent plus two for the `- ` marker — followed by the trimmed segment
// text). This matches Property 12: a value with k semicolons yields k+1
// segments, so the renderer emits one bullet per non-empty trimmed
// segment (k+1 bullets when none are empty). Empty segments — produced
// by stray separators like a trailing `;` or a `;;` run — are filtered
// out so the export never contains an empty `       - ` line.
//
// Each field value is coerced to `String` before the `;` check so the
// helper is defensive against any non-string field reaching it (e.g. a
// future schema mistake or a malformed `PROBLEM_PREP` entry).
//
// @param {Object} prep            — six-field prep entry (see PrepEntry)
// @param {string} prep.pattern
// @param {string} prep.insight
// @param {string} prep.complexity
// @param {string} prep.followup
// @param {string} prep.clarify
// @param {string} prep.edges
// @returns {string} a multi-line plain-text block, suitable for direct
//                   inclusion under a DSA task line in `taskToText`
function prepToPlainText(prep){
  const lines = [];
  const push = (label, val) => {
    const s = String(val);
    if (s.includes(";")){
      lines.push(`     ${label}:`);
      s.split(";")
       .map(seg => seg.trim())
       .filter(seg => seg.length > 0)
       .forEach(seg => lines.push(`       - ${seg}`));
    } else {
      lines.push(`     ${label}: ${s}`);
    }
  };
  push("Pattern",     prep.pattern);
  push("Key Insight", prep.insight);
  push("Complexity",  prep.complexity);
  push("Follow-up",   prep.followup);
  push("Clarify",     prep.clarify);
  push("Edge Cases",  prep.edges);
  return lines.join("\n");
}

// Escape a string for safe interpolation into an attribute-equals selector
// like `[data-prep-card="..."]`. Problem names contain spaces, em-dashes,
// quotes, and backslashes, all of which can break a naively-built selector.
// Prefers the canonical `CSS.escape()` API (well-supported in every browser
// the Tracker targets); falls back to escaping `\` and `"` for environments
// where `CSS.escape` is somehow unavailable (older test runners).
// @param {*} s — coerced to string before escaping
// @returns {string} a fragment safe to interpolate inside `[attr="..."]`
function _cssAttrEscape(s){
  if (typeof CSS !== "undefined" && typeof CSS.escape === "function") {
    return CSS.escape(s);
  }
  return String(s).replace(/\\/g, "\\\\").replace(/"/g, '\\"');
}

// Bind click + keyboard activation handlers to every `.prep-toggle` inside
// `cont`. Each toggle activates a single Prep Card whose `data-prep-card`
// attribute matches the toggle's `data-prep-toggle` value, with all lookup
// scoped to `cont` — so two cards rendered with the same Problem Name in
// different views (e.g. the Daily Schedule and the Grind 169 Tab) never
// cross-toggle (Requirement 5.5).
//
// On activation (click, Enter, or Space):
//   1. Stop the event from bubbling up to ancestor handlers (Requirement
//      3.7) — DSA tasks have parent click handlers for `why-toggle` and
//      `<li>` selection that would otherwise also fire.
//   2. Flip the toggle's `prepId` membership in the module-local
//      `expandedPrepCards` Set, which is the single source of truth that
//      `renderPrepCard` consults on every subsequent re-render so the
//      open/closed state survives unrelated re-renders (Requirement 5.3).
//   3. Update the matching `.prep-card`'s inline `style.display` to either
//      `""` (open — falls back to the stylesheet's natural display) or
//      `"none"` (closed). This avoids removing/recreating the card markup
//      and avoids any flicker (Requirement 5.2).
//   4. Update the toggle's text and `aria-expanded` attribute to reflect
//      the new state (Requirement 3.6 / 3.7).
//
// Keyboard handling: Enter and Space both activate the toggle (Requirement
// 3.8). The `Space` key reports as `" "` in modern browsers and as
// `"Spacebar"` in some older Edge / IE-derived environments, so both are
// accepted. `preventDefault()` on those keys stops Space from scrolling
// the page when the toggle has focus.
//
// Idempotence: `wirePrepToggles` is called from inside
// `wireScheduleInteractions(cont)` (task 4.2) and the Grind 169 wiring
// tail (task 4.3), both of which fire on every re-render. To avoid
// double-binding the same toggle (which would flip the state twice per
// click, leaving it where it started), each toggle is tagged with a
// `__prepWired` property the first time it is wired and skipped on every
// subsequent pass. Re-rendered toggles are fresh DOM nodes, so they pick
// up handlers as expected.
//
// Defensive guards: returns early when `cont` is null/undefined or lacks
// `querySelectorAll`, and skips toggles missing a `data-prep-toggle`
// value rather than throwing — consistent with Requirement 1.6's
// non-throwing posture.
//
// @param {Element|Document} cont — any object with a `querySelectorAll`
//                                  method whose subtree contains the
//                                  `.prep-toggle` elements to wire
function wirePrepToggles(cont){
  if (!cont || typeof cont.querySelectorAll !== "function") return;
  cont.querySelectorAll(".prep-toggle").forEach(tg => {
    if (tg.__prepWired) return;
    tg.__prepWired = true;
    const activate = (e) => {
      if (e && typeof e.stopPropagation === "function") e.stopPropagation();
      const prepId = tg.dataset.prepToggle;
      if (!prepId) return;
      const card = cont.querySelector(`[data-prep-card="${_cssAttrEscape(prepId)}"]`);
      const willOpen = !expandedPrepCards.has(prepId);
      if (willOpen) expandedPrepCards.add(prepId); else expandedPrepCards.delete(prepId);
      if (card) card.style.display = willOpen ? "" : "none";
      tg.textContent = willOpen ? "▾ Hide prep" : "▸ Show prep";
      tg.setAttribute("aria-expanded", String(willOpen));
    };
    tg.addEventListener("click", activate);
    tg.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " " || e.key === "Spacebar") {
        e.preventDefault();
        activate(e);
      }
    });
  });
}

// Expose the helpers on `window` so:
//   - the test harness can detect that helpers loaded
//     (typeof window.normalizePrepKey === "function")
//   - the property tests can read/mutate PROBLEM_PREP fixtures and reset
//     the warned-name set between iterations
//   - the diagnostic helper window.__listMissingPrep (added in a later task)
//     can call prepLookup/normalizePrepKey from DevTools
window.PROBLEM_PREP = PROBLEM_PREP;
window.normalizePrepKey = normalizePrepKey;
window.warnMissingPrepOnce = warnMissingPrepOnce;
window.prepLookup = prepLookup;
window.escapeHTML = escapeHTML;
window.cssEscape = cssEscape;
window.renderPrepRow = renderPrepRow;
window.renderPrepCard = renderPrepCard;
window.expandedPrepCards = expandedPrepCards;
window.wirePrepToggles = wirePrepToggles;
window.prepToPlainText = prepToPlainText;

// Test-only helper: clear the once-only warning record so individual
// property-test iterations can be isolated.
window.__resetPrepWarnings = function(){ _warnedMissingPrep.clear(); };

</script>

<script>

// ---- DSA library: name -> {slug, diff, premium?} ----

        <span class="kw">for</span> dr, dc <span class="kw">in</span> ((<span class="num">1</span>,<span class="num">0</span>),(-<span class="num">1</span>,<span class="num">0</span>),(<span class="num">0</span>,<span class="num">1</span>),(<span class="num">0</span>,-<span class="num">1</span>)):
            dfs(r+dr, c+dc)
    n = <span class="num">0</span>
    <span class="kw">for</span> r <span class="kw">in</span> range(R):
        <span class="kw">for</span> c <span class="kw">in</span> range(C):
            <span class="kw">if</span> g[r][c] == <span class="str">'1'</span>: dfs(r, c); n += <span class="num">1</span>
    <span class="kw">return</span> n`,
  "grid-traversal": `<span class="com"># Standard 4-direction grid step</span>
DIRS = ((<span class="num">1</span>,<span class="num">0</span>),(-<span class="num">1</span>,<span class="num">0</span>),(<span class="num">0</span>,<span class="num">1</span>),(<span class="num">0</span>,-<span class="num">1</span>))
<span class="kw">def</span> <span class="fn">step</span>(grid, r, c):
    R, C = len(grid), len(grid[<span class="num">0</span>])
    <span class="kw">for</span> dr, dc <span class="kw">in</span> DIRS:
        nr, nc = r + dr, c + dc
        <span class="kw">if</span> <span class="num">0</span> &lt;= nr &lt; R <span class="kw">and</span> <span class="num">0</span> &lt;= nc &lt; C:
            <span class="kw">yield</span> nr, nc`,
  "topological-sort": `<span class="com"># Course Schedule II – Kahn's BFS</span>
<span class="kw">from</span> collections <span class="kw">import</span> deque, defaultdict
<span class="kw">def</span> <span class="fn">order</span>(n, prereq):
    g, indeg = defaultdict(list), [<span class="num">0</span>] * n
    <span class="kw">for</span> a, b <span class="kw">in</span> prereq:
        g[b].append(a); indeg[a] += <span class="num">1</span>
    q = deque(i <span class="kw">for</span> i <span class="kw">in</span> range(n) <span class="kw">if</span> indeg[i] == <span class="num">0</span>)
    out = []
    <span class="kw">while</span> q:
        x = q.popleft(); out.append(x)
        <span class="kw">for</span> y <span class="kw">in</span> g[x]:
            indeg[y] -= <span class="num">1</span>
            <span class="kw">if</span> indeg[y] == <span class="num">0</span>: q.append(y)
    <span class="kw">return</span> out <span class="kw">if</span> len(out) == n <span class="kw">else</span> []   <span class="com"># cycle ⇒ []</span>`,
  "union-find": `<span class="com"># Disjoint-set union with path compression + rank</span>
<span class="kw">class</span> DSU:
    <span class="kw">def</span> <span class="fn">__init__</span>(self, n):
        self.p = list(range(n)); self.r = [<span class="num">0</span>] * n
    <span class="kw">def</span> <span class="fn">find</span>(self, x):
        <span class="kw">while</span> self.p[x] != x:

        <span class="kw">return</span> x
    <span class="kw">def</span> <span class="fn">union</span>(self, a, b):
        ra, rb = self.find(a), self.find(b)
        <span class="kw">if</span> ra == rb: <span class="kw">return</span> <span class="kw">False</span>
        <span class="kw">if</span> self.r[ra] &lt; self.r[rb]: ra, rb = rb, ra
        self.p[rb] = ra
        <span class="kw">if</span> self.r[ra] == self.r[rb]: self.r[ra] += <span class="num">1</span>
        <span class="kw">return</span> <span class="kw">True</span>`,
  "dijkstra": `<span class="com"># Network Delay Time – Dijkstra with min-heap</span>
<span class="kw">import</span> heapq
<span class="kw">def</span> <span class="fn">dijkstra</span>(n, edges, src):
    g = [[] <span class="kw">for</span> _ <span class="kw">in</span> range(n)]
    <span class="kw">for</span> u, v, w <span class="kw">in</span> edges: g[u].append((v, w))
    dist = [float(<span class="str">'inf'</span>)] * n; dist[src] = <span class="num">0</span>
    pq = [(<span class="num">0</span>, src)]
    <span class="kw">while</span> pq:
        d, u = heapq.heappop(pq)
        <span class="kw">if</span> d &gt; dist[u]: <span class="kw">continue</span>      <span class="com"># stale</span>
        <span class="kw">for</span> v, w <span class="kw">in</span> g[u]:
            <span class="kw">if</span> d + w &lt; dist[v]:
                dist[v] = d + w

  "heap": `<span class="com"># Top-K largest with a min-heap of size K</span>
<span class="kw">import</span> heapq
<span class="kw">def</span> <span class="fn">top_k</span>(nums, k):
    h = []

  "two-heaps": `<span class="com"># Streaming median: max-heap (low) + min-heap (high)</span>
<span class="kw">import</span> heapq
<span class="kw">class</span> MedianFinder:
    <span class="kw">def</span> <span class="fn">__init__</span>(self):

    <span class="kw">def</span> <span class="fn">add</span>(self, x):
        heapq.heappush(self.lo, -heapq.heappushpop(self.hi, x))
        <span class="kw">if</span> len(self.lo) &gt; len(self.hi) + <span class="num">1</span>:
            heapq.heappush(self.hi, -heapq.heappop(self.lo))
    <span class="kw">def</span> <span class="fn">median</span>(self):

  "trie": `<span class="com"># Trie: insert + prefix lookup</span>
<span class="kw">class</span> Trie:
    <span class="kw">def</span> <span class="fn">__init__</span>(self):

  "recursion": `<span class="com"># Define base + recursive case</span>
<span class="kw">def</span> <span class="fn">factorial</span>(n):
    <span class="kw">if</span> n &lt;= <span class="num">1</span>: <span class="kw">return</span> <span class="num">1</span>     <span class="com"># base</span>

  "backtracking": `<span class="com"># Permutations – choose, recurse, undo</span>
<span class="kw">def</span> <span class="fn">perms</span>(nums):
    out, path, used = [], [], [<span class="kw">False</span>] * len(nums)
    <span class="kw">def</span> <span class="fn">bt</span>():
        <span class="kw">if</span> len(path) == len(nums):

        <span class="kw">for</span> i, x <span class="kw">in</span> enumerate(nums):

  "sorting": `<span class="com"># Custom sort with cmp_to_key</span>

<span class="kw">def</span> <span class="fn">largest_number</span>(nums):

    <span class="kw">return</span> <span class="str">'0'</span> <span class="kw">if</span> s[<span class="num">0</span>] == <span class="str">'0'</span> <span class="kw">else</span> <span class="str">''</span>.join(s)`,
  "intervals": `<span class="com"># Merge overlapping intervals</span>
<span class="kw">def</span> <span class="fn">merge</span>(intervals):
    intervals.sort()
    out = []
    <span class="kw">for</span> s, e <span class="kw">in</span> intervals:

  "greedy": `<span class="com"># Jump Game – greedy farthest reachable</span>
<span class="kw">def</span> <span class="fn">can_jump</span>(nums):

  "dp": `<span class="com"># Memoized recursion template</span>
<span class="kw">from</span> functools <span class="kw">import</span> lru_cache
<span class="kw">def</span> <span class="fn">solve</span>(args):

  "dp-1d": `<span class="com"># House Robber – dp[i] = max(dp[i-1], dp[i-2] + nums[i])</span>
<span class="kw">def</span> <span class="fn">rob</span>(nums):

  "dp-2d": `<span class="com"># Unique Paths in m x n grid</span>
<span class="kw">def</span> <span class="fn">unique_paths</span>(m, n):
    dp = [<span class="num">1</span>] * n
    <span class="kw">for</span> _ <span class="kw">in</span> range(<span class="num">1</span>, m):

  "dp-string": `<span class="com"># Longest Palindromic Substring (expand around center)</span>
<span class="kw">def</span> <span class="fn">longest_pal</span>(s):
    res = <span class="str">""</span>
    <span class="kw">def</span> <span class="fn">expand</span>(l, r):
        <span class="kw">while</span> l &gt;= <span class="num">0</span> <span class="kw">and</span> r &lt; len(s) <span class="kw">and</span> s[l] == s[r]: l -= <span class="num">1</span>; r += <span class="num">1</span>
        <span class="kw">return</span> s[l+<span class="num">1</span>:r]
    <span class="kw">for</span> i <span class="kw">in</span> range(len(s)):
        <span class="kw">for</span> a <span class="kw">in</span> (expand(i, i), expand(i, i+<span class="num">1</span>)):
            <span class="kw">if</span> len(a) &gt; len(res): res = a

  "knapsack": `<span class="com"># Coin Change – min coins for amount (unbounded knapsack)</span>
<span class="kw">def</span> <span class="fn">coin_change</span>(coins, amount):
    INF = float(<span class="str">'inf'</span>)
    dp = [<span class="num">0</span>] + [INF] * amount
    <span class="kw">for</span> a <span class="kw">in</span> range(<span class="num">1</span>, amount + <span class="num">1</span>):
        <span class="kw">for</span> c <span class="kw">in</span> coins:
            <span class="kw">if</span> c &lt;= a: dp[a] = min(dp[a], dp[a - c] + <span class="num">1</span>)
    <span class="kw">return</span> dp[amount] <span class="kw">if</span> dp[amount] != INF <span class="kw">else</span> -<span class="num">1</span>`,
  "lis": `<span class="com"># LIS in O(n log n) via patience sorting</span>
<span class="kw">from</span> bisect <span class="kw">import</span> bisect_left
<span class="kw">def</span> <span class="fn">lis</span>(nums):
    tails = []

  "kadane": `<span class="com"># Max contiguous subarray sum in O(n)</span>
<span class="kw">def</span> <span class="fn">max_subarray</span>(nums):

  "bit-manipulation": `<span class="com"># XOR cancels duplicates – Single Number</span>
<span class="kw">def</span> <span class="fn">single</span>(nums):

  "math": `<span class="com"># Fast exponentiation – Pow(x, n)</span>
<span class="kw">def</span> <span class="fn">my_pow</span>(x, n):
    <span class="kw">if</span> n &lt; <span class="num">0</span>: x, n = <span class="num">1</span> / x, -n

  "design": `<span class="com"># LRU Cache: hashmap + doubly linked list (or OrderedDict)</span>
<span class="kw">from</span> collections <span class="kw">import</span> OrderedDict
<span class="kw">class</span> LRUCache:
    <span class="kw">def</span> <span class="fn">__init__</span>(self, capacity):
        self.cap = capacity; self.d = OrderedDict()
    <span class="kw">def</span> <span class="fn">get</span>(self, k):
        <span class="kw">if</span> k <span class="kw">not</span> <span class="kw">in</span> self.d: <span class="kw">return</span> -<span class="num">1</span>

  "matrix-tricks": `<span class="com"># Rotate image 90° clockwise = transpose + reverse rows</span>
<span class="kw">def</span> <span class="fn">rotate</span>(m):

            m[i][j], m[j][i] = m[j][i], m[i][j]   <span class="com"># transpose</span>

  "seen-before": `<span class="com"># Find Duplicate Number – Floyd cycle on index→value mapping</span>
<span class="kw">def</span> <span class="fn">find_dup</span>(nums):

};

// ───── small inline animations for high-value patterns ─────
// Each entry returns an array of frames: { html, narr }
// A few helpers keep markup terse.
const _cell = (v, opts = {}) => {
  const { cls = "", ptr = "", ptrCls = "" } = opts;
  return `<div class="anim-cell ${cls}">${ptr ? `<span class="ptr ${ptrCls}">${ptr}</span>` : ""}${v}</div>`;
};
const _row = (items) => `<div class="anim-cells">${items.join("")}</div>`;
const _label = (text) => `<div style="text-align:center;margin-top:8px;font-family:ui-monospace,monospace;font-size:12px;color:var(--muted)">${text}</div>`;
const _kv = (pairs) => `<div style="display:flex;justify-content:center;gap:18px;margin-top:8px;font-family:ui-monospace,monospace;font-size:12px">${
  pairs.map(([k, v, color]) => `<span>${k} = <b style="color:${color||'var(--accent)'}">${v}</b></span>`).join("")
}</div>`;

const CONCEPT_ANIM = (function buildAnims(){
  const A = {};

  // ============ KADANE ============
  A["kadane"] = (() => {
    const a = [-2, 1, -3, 4, -1, 2, 1, -5, 4];
    const out = []; let cur = a[0], best = a[0];
    out.push({
      html: _row(a.map((v, j) => _cell(v, { cls: j===0?"cur":"", ptr: j===0?"i":"" }))) + _kv([["cur", cur, "var(--accent-3)"], ["best", best, "var(--ok)"]]),
      narr: `Start: cur and best both equal ${cur}; at each index we either extend the run or restart it.`
    });
    for (let i = 1; i < a.length; i++){
      const restart = a[i] > cur + a[i];
      const beforeCur = cur;
      cur = restart ? a[i] : cur + a[i];
      const beforeBest = best;
      best = Math.max(best, cur);
      const action = restart
        ? `restart at ${a[i]} — alone it beats extending`
        : `extend the run, cur becomes ${cur}`;
      const bestNote = best > beforeBest ? ` (new best ${best})` : ``;
      out.push({
        html: _row(a.map((v, j) => _cell(v, { cls: j===i?"cur":(j<i?"dim":""), ptr: j===i?"i":"" })))
              + _kv([["cur", cur, "var(--accent-3)"], ["best", best, "var(--ok)"]]),
        narr: `Index ${i} (value ${a[i]}): ${action}${bestNote}.`
      });
    }
    out.push({
      html: _row(a.map(v => _cell(v, { cls: "match" }))) + _kv([["best", best, "var(--ok)"]]),
      narr: `Done — the largest contiguous-subarray sum is ${best}.`
    });
    return out;
  })();

  // ============ SLIDING WINDOW ============
  A["sliding-window"] = (() => {
    const a = ['a','a','b','b','c','c','d','e','e','f']; const k = 3;
    const out = []; let l = 0; const cnt = {};
    out.push({
      html: _row(a.map(v => _cell(v))) + _label(`goal: longest substring with at most ${k} distinct chars`),
      narr: `Goal: longest substring with at most ${k} distinct chars; grow the right edge, shrink left when we have too many.`
    });
    for (let r = 0; r < a.length; r++){
      cnt[a[r]] = (cnt[a[r]] || 0) + 1;
      const beforeShrink = { l, distinct: Object.keys(cnt).length };
      while (Object.keys(cnt).length > k){
        cnt[a[l]] -= 1;
        if (cnt[a[l]] === 0) delete cnt[a[l]];
        l += 1;
      }
      const distinct = Object.keys(cnt).length;
      const winLen = r - l + 1;
      let narr;
      if (l > beforeShrink.l) {
        narr = `Add '${a[r]}' on the right; window had ${beforeShrink.distinct} distinct so we slid left to index ${l} — now ${distinct} distinct, length ${winLen}.`;
      } else {
        narr = `Add '${a[r]}' on the right; window stays valid at ${distinct} distinct, length ${winLen}.`;
      }
      out.push({
        html: _row(a.map((v, i) => {
          let cls = "";
          if (i >= l && i <= r) cls = "in-window";
          if (i < l || i > r) cls = "dim";
          let ptr = "";
          if (i === l) ptr = "l"; else if (i === r) ptr = "r";
          return _cell(v, { cls, ptr, ptrCls: i===l?"l":"r" });
        }))
        + _label(`window has ${distinct} distinct (max ${k})`),
        narr
      });
    }
    return out;
  })();

  // ============ TWO POINTERS ============
  A["two-pointer"] = (() => {
    const a = [1, 2, 4, 6, 8, 10, 13, 17], target = 14;
    const out = []; let l = 0, r = a.length - 1;
    out.push({

            + _label(`sorted array · target = ${target}`),
      narr: `Array is sorted, target ${target}: pin l at the left and r at the right, then walk them inward by checking the sum.`
    });
    while (l < r){
      const s = a[l] + a[r];
      const found = s === target;
      let narr;
      if (found) narr = `Sum is ${a[l]} + ${a[r]} = ${s}, which hits the target — found at indices (${l}, ${r}).`;
      else if (s < target) narr = `Sum ${s} is below ${target}; we need a bigger value, so move l right to ${l+1}.`;
      else narr = `Sum ${s} is above ${target}; we need a smaller value, so move r left to ${r-1}.`;
      out.push({
        html: _row(a.map((v, i) => {

        }))

  // ============ BINARY SEARCH ============
  A["binary-search"] = (() => {

    out.push({
      html: _row(a.map((v, i) => _cell(v, { cls: i===0?"cur":(i===a.length-1?"cur":""), ptr: i===0?"lo":(i===a.length-1?"hi-1":"") })))
            + _label(`sorted array · target = ${target}`),
      narr: `Searching for ${target}: keep a window [lo, hi); each step we compare the midpoint and throw away the half that cannot contain it.`
    });
    let iters = 0;
    while (lo < hi){
      const mid = (lo + hi) >> 1;
      iters++;

        }))

  // ============ MONOTONIC STACK ============
  A["monotonic-stack"] = (() => {

    });

      const popped = [];

  // ============ PREFIX SUM (subarray sum = K) ============
  A["prefix-sum"] = (() => {
    const a = [1, 2, 3, -1, 2, 1], k = 3;

      html: _row(a.map(v => _cell(v))) + _label(`count subarrays with sum = ${k}`),

    });

      psum += a[i];

      seen[psum] = beforeStore + 1;
      let narr;
      if (add) narr = `Index ${i}: running sum is ${psum}; ${add} earlier prefix${add===1?'':'es'} equal ${psum - k}, so ${add} subarray${add===1?'':'s'} end here (total ${ans}).`;
      else narr = `Index ${i}: running sum is ${psum}; no earlier prefix equals ${psum - k}, so nothing closes here. Record this prefix.`;
      out.push({

        + `<div style="margin-top:4px;font-family:ui-monospace,monospace;font-size:11px;text-align:center;color:var(--muted)">seen = {${Object.entries(seen).map(([k,v])=>`${k}:${v}`).join(", ")}} · ans = ${ans}</div>`,

  // ============ SEARCH ON ANSWER (Koko) ============
  A["search-on-answer"] = (() => {
    const piles = [3, 6, 7, 11], h = 8;

    const out = []; let lo = 1, hi = Math.max(...piles);
    out.push({
      html: _label(`piles = ${JSON.stringify(piles)} · h = ${h} hours`),

    });
    while (lo < hi){
      const mid = (lo + hi) >> 1;
      const feasible = ok(mid);
      const hours = piles.reduce((s, p) => s + Math.ceil(p / mid), 0);
      let narr;
      narr = feasible
        ? `Try k = ${mid}: needs ${hours} hours, fits in ${h} — try a smaller speed by pulling hi down to ${mid}.`
        : `Try k = ${mid}: needs ${hours} hours, too slow — push lo up to ${mid + 1} and try faster.`;
      out.push({
        html: _row(Array.from({length: hi - 0 + 1}, (_, i) => i)
          .filter(i => i >= 1 && i <= Math.max(...piles))

        + _label(`k = ${mid} · ${feasible ? "feasible ✓" : "too slow ✗"}`),

  // ============ STACK (Valid Parens) ============
  A["stack"] = (() => {
    const s = "([{}])";

    const out = []; const st = [];
    out.push({
      html: _row(s.split("").map(v => _cell(v))) + _label(`is "${s}" balanced?`),
      narr: `Push every opener; on a closer the top must match it, otherwise the brackets are out of order.`
    });

      const ch = s[i];

      if (ch in pair){

          action = `match — pop '${top}'`;

        } else {
          action = `mismatch ✗`;
          narr = `Saw closer '${ch}' but top of stack is '${top || "empty"}' — bracket order is broken, fail.`;
        }
      } else {
        st.push(ch); action = `push '${ch}'`;

      }

        html: _row(s.split("").map((v, j) => _cell(v, { cls: j === i ? "cur" : (j < i ? "dim" : ""), ptr: j === i ? "i" : "" })))

  // ============ TREE — pre/in/post DFS ============

  A["binary-tree-dfs"] = (() => {
    const tree = { 1: [2, 3], 2: [4, 5], 3: [null, 6], 4: [null, null], 5: [null, null], 6: [null, null] };
    const positions = { 1: [50, 0], 2: [25, 35], 3: [75, 35], 4: [10, 70], 5: [40, 70], 6: [90, 70] };
    function svg(visited, current){
      const edges = [
        [1,2],[1,3],[2,4],[2,5],[3,6]
      ].map(([p,c]) => {
        const [px,py]=positions[p],[cx,cy]=positions[c];
        return `<line x1="${px}" y1="${py+5}" x2="${cx}" y2="${cy-3}" stroke="var(--line)" stroke-width="0.6"/>`;
      }).join("");
      const nodes = Object.keys(positions).map(k => {
        const [x,y] = positions[k];
        const isCur = current === Number(k);
        const isVis = visited.includes(Number(k));
        const fill = isCur ? "var(--accent-3)" : (isVis ? "var(--ok)" : "var(--panel)");
        const stroke = isCur ? "var(--accent-3)" : (isVis ? "var(--ok)" : "var(--line)");
        const tc = isCur || isVis ? "#000" : "var(--fg)";
        return `<circle cx="${x}" cy="${y}" r="6" fill="${fill}" stroke="${stroke}" stroke-width="1"/><text x="${x}" y="${y+1.7}" text-anchor="middle" font-size="6" font-weight="700" fill="${tc}">${k}</text>`;
      }).join("");
      return `<svg viewBox="0 -10 100 90" style="width:100%;max-width:380px;display:block;margin:0 auto;height:120px">${edges}${nodes}</svg>`;
    }
    const order = [];
    const out = [];
    function dfs(n){
      if (!n) return;
      out.push({ html: svg(order, n) + _label(`visit order so far: [${order.join(", ")}] · current = ${n}`), narr: `Walk down to node ${n} — explore its left subtree, then right subtree, before recording it.` });
      const [l, r] = tree[n] || [null, null];
      dfs(l); dfs(r);
      order.push(n);
      out.push({ html: svg(order, n) + _label(`visit order so far: [${order.join(", ")}]`), narr: `Both children of ${n} are done — record ${n} (post-order means parent comes after its kids).` });
    }
    dfs(1);
    return out;
  })();

  // ============ BOTTOM-UP RECURSION (diameter) ============
  A["bottom-up-recursion"] = (() => {

        const fill = isCur ? "var(--accent-3)" : (dep != null ? "var(--ok)" : "var(--panel)");
        const stroke = isCur ? "var(--accent-3)" : (dep != null ? "var(--ok)" : "var(--line)");

      best = Math.max(best, dl + dr);

  // ============ UNION FIND ============
  A["union-find"] = (() => {

    const parent = Array.from({length: N}, (_, i) => i);
    function find(x){ while (parent[x] !== x){ parent[x] = parent[parent[x]]; x = parent[x]; } return x; }
    function svg(highlight){
      let cells = "";
      for (let i = 0; i < N; i++){
        const root = find(i);

      }
      return `<div class="anim-cells">${cells}</div>`;
    }
    out.push({ html: svg([]), narr: `Start with each node as its own component (parent points to itself); union will merge components by linking roots.` });
    for (const [a, b] of ops){
      const ra = find(a), rb = find(b);
      if (ra !== rb){ parent[rb] = ra; out.push({ html: svg([a, b]), narr: `union(${a}, ${b}): different roots ${ra} and ${rb}, so attach ${rb} under ${ra} — components merge.` }); }

    const adj = Array.from({length: N}, () => []);

      }).join("");

  // ============ TWO HEAPS — running median ============
  A["two-heaps"] = (() => {
    const stream = [5, 2, 8, 1, 7, 3];
    const out = []; const lo = []; const hi = [];
    function median(){
      if (lo.length > hi.length) return lo[lo.length-1];
      return (lo[lo.length-1] + hi[0]) / 2;
    }
    for (const x of stream){
      // insert
      if (!lo.length || x <= lo[lo.length-1]) lo.push(x); else hi.push(x);
      lo.sort((a,b)=>a-b); hi.sort((a,b)=>a-b);
      // balance
      while (lo.length > hi.length + 1) hi.unshift(lo.pop());
      while (hi.length > lo.length) lo.push(hi.shift());
      lo.sort((a,b)=>a-b); hi.sort((a,b)=>a-b);

  A["trie"] = (() => {

  // ============ RECURSION (factorial) ============
  A["recursion"] = (() => {

    const out = []; const path = []; const subsets = [];
    function bt(i){
      subsets.push(path.slice());
      out.push({
        html: _row(a.map((v, j) => _cell(v, { cls: path.includes(v) ? "match" : (j === i ? "cur" : "") })))
        + _label(`path = [${path.join(", ")}] · subsets so far: ${subsets.length}`),
        narr: `Record subset [${path.join(", ")}]: every visit to a node in the choice tree is one valid subset.`
      });
      for (let j = i; j < a.length; j++){
        path.push(a[j]);
        bt(j + 1);
        path.pop();
        out.push({
          html: _row(a.map((v, k) => _cell(v, { cls: path.includes(v) ? "match" : (k === j ? "cur" : "") })))
          + _label(`backtrack: undo ${a[j]} · path = [${path.join(", ")}]`),
          narr: `Backtrack — pop ${a[j]} so the path is reusable for the next branch of the search.`
        });
      }
    }
    bt(0);
    return out;
  })();

  // ============ SORTING (custom comparator) ============
  A["sorting"] = (() => {
    const arr = ["3","30","34","5","9"]; // largest number
    const out = [];
    out.push({ html: _row(arr.map(v => _cell(v))), narr: `Goal: arrange these number-strings to form the largest possible concatenated value.` });
    const sorted = arr.slice().sort((a, b) => (a + b > b + a) ? -1 : 1);
    out.push({ html: _row(sorted.map(v => _cell(v, { cls: "match" }))) + _label(`sorted by a+b > b+a → ${sorted.join("")}`), narr: `Custom comparator: a comes before b when a+b > b+a — concatenated answer is ${sorted.join("")}.` });
    return out;
  })();

  // ============ INTERVALS (merge) ============
  A["intervals"] = (() => {
    const intervals = [[1,3],[2,6],[8,10],[15,18]];
    const out = [];
    intervals.sort((a,b) => a[0]-b[0]);
    const merged = [];
    function svg(curIdx){
      let html = `<svg viewBox="0 0 200 ${30 + 20*intervals.length}" style="width:100%;max-width:380px;display:block;margin:0 auto;height:${30 + 20*intervals.length}px">`;
      for (let i = 0; i < intervals.length; i++){
        const [s, e] = intervals[i];
        const isCur = i === curIdx;
        html += `<rect x="${s*10}" y="${20*i + 4}" width="${(e-s)*10}" height="12" fill="${isCur ? 'var(--accent-3)' : 'var(--accent-2)'}" stroke="${isCur?'var(--accent-3)':'var(--accent-2)'}" rx="2"/>`;
        html += `<text x="${s*10}" y="${20*i + 1}" font-size="5" fill="var(--muted)">[${s},${e}]</text>`;
      }
      html += `</svg>`;
      const m = merged.map(iv => `[${iv[0]}, ${iv[1]}]`).join(", ");
      return html + _label(`merged: ${m || "—"}`);
    }
    for (let i = 0; i < intervals.length; i++){
      if (merged.length && intervals[i][0] <= merged[merged.length-1][1]){
        merged[merged.length-1][1] = Math.max(merged[merged.length-1][1], intervals[i][1]);
        out.push({ html: svg(i), narr: `[${intervals[i][0]},${intervals[i][1]}] overlaps the last merged block, so extend its end to ${merged[merged.length-1][1]}.` });
      } else {
        merged.push(intervals[i].slice());
        out.push({ html: svg(i), narr: `[${intervals[i][0]},${intervals[i][1]}] starts after the last block ends, so begin a new merged interval.` });
      }
    }
    return out;
  })();

  // ============ GREEDY (Jump Game) ============
  A["greedy"] = (() => {
    const a = [2, 3, 1, 1, 4]; const out = []; let far = 0;
    for (let i = 0; i < a.length; i++){
      if (i > far){ out.push({ html: _row(a.map((v, j) => _cell(v, { cls: "dim" }))) + _label(`stuck at i=${i}, far=${far}`), narr: `Index ${i} is past our farthest reach (${far}) — we cannot get here, so the end is unreachable.` }); break; }
      far = Math.max(far, i + a[i]);
      out.push({
        html: _row(a.map((v, j) => _cell(v, { cls: j === i ? "cur" : (j <= far ? "in-window" : "dim"), ptr: j === i ? "i" : "" }))) + _label(`far reachable: ${far}`),
        narr: `From index ${i}, jump up to ${a[i]} forward — extend the farthest reachable index to ${far}.`
      });
    }
    return out;
  })();

  // ============ DP — generic memoized ============
  A["dp"] = (() => {
    const out = [];
    out.push({ html: `<div style="text-align:center;color:var(--muted);font-family:ui-monospace,monospace;font-size:13px;line-height:1.7">f(state) = base · or · combine(f(next₁), f(next₂))<br>memo[state] caches the result.</div>`, narr: `DP recipe: define a state, hit a base case, or combine answers from smaller subproblems and cache each result.` });
    return out;
  })();

  // ============ DP-1D (House Robber) ============
  A["dp-1d"] = (() => {
    const a = [2, 7, 9, 3, 1];
    const out = []; let p2 = 0, p1 = 0;
    out.push({ html: _row(a.map(v => _cell(v))) + _kv([["prev2", p2, "var(--muted)"],["prev1", p1, "var(--accent)"]]), narr: `Start: prev1 and prev2 are both 0 — we have not robbed any house yet.` });
    for (let i = 0; i < a.length; i++){
      const cur = Math.max(p1, p2 + a[i]);
      out.push({
        html: _row(a.map((v, j) => _cell(v, { cls: j === i ? "cur" : (j < i ? "dim" : "") })))
        + _kv([["prev2", p2, "var(--muted)"], ["prev1", p1, "var(--accent)"], ["cur", cur, "var(--ok)"]])
        + _label(`max(prev1=${p1}, prev2+a[i]=${p2 + a[i]}) = ${cur}`),
        narr: `House ${i} (value ${a[i]}): take the bigger of skipping (${p1}) or robbing (${p2 + a[i]}) → cur = ${cur}.`
      });
      p2 = p1; p1 = cur;
    }
    out.push({ html: _label(`answer = ${p1}`), narr: `Done — best total we can rob without picking adjacent houses is ${p1}.` });
    return out;
  })();

  // ============ DP-2D (Unique Paths) ============
  A["dp-2d"] = (() => {
    const M = 3, N = 4;
    const dp = Array.from({length: M}, () => Array(N).fill(0));
    for (let r = 0; r < M; r++) dp[r][0] = 1;
    for (let c = 0; c < N; c++) dp[0][c] = 1;
    const out = [];
    function svg(focus){
      let html = `<div style="display:grid;grid-template-columns:repeat(${N},36px);gap:4px;justify-content:center;margin-top:6px">`;
      for (let r = 0; r < M; r++){
        for (let c = 0; c < N; c++){
          let cls = "anim-cell";
          if (focus && focus[0] === r && focus[1] === c) cls += " cur";
          else if (dp[r][c]) cls += " in-window";
          html += `<div class="${cls}">${dp[r][c]}</div>`;
        }
      }
      return html + `</div>`;
    }
    out.push({ html: svg() + _label("init: row 0 and col 0 = 1"), narr: `Seed the first row and column with 1 — there is exactly one way to reach each border cell.` });
    for (let r = 1; r < M; r++){
      for (let c = 1; c < N; c++){
        dp[r][c] = dp[r-1][c] + dp[r][c-1];
        out.push({ html: svg([r,c]) + _label(`dp[${r}][${c}] = dp[${r-1}][${c}] + dp[${r}][${c-1}] = ${dp[r][c]}`), narr: `Cell (${r},${c}): paths into it = paths from above + paths from the left = ${dp[r][c]}.` });
      }
    }
    out.push({ html: svg([M-1, N-1]) + _label(`answer = ${dp[M-1][N-1]}`), narr: `Bottom-right cell holds the total number of unique paths: ${dp[M-1][N-1]}.` });
    return out;
  })();

  // ============ DP-STRING (palindrome expand-around-center) ============
  A["dp-string"] = (() => {
    const s = "babad";
    const out = []; let best = "";
    for (let i = 0; i < s.length; i++){
      // odd
      let l = i, r = i;
      while (l >= 0 && r < s.length && s[l] === s[r]){ l--; r++; }
      const cand = s.slice(l+1, r);
      if (cand.length > best.length) best = cand;
      out.push({
        html: _row(s.split("").map((v, j) => _cell(v, { cls: j > l && j < r ? "in-window" : (j === i ? "cur" : "dim") })))
        + _label(`expand around ${i} (odd): "${cand}" · best="${best}"`),
        narr: `Center at index ${i}: expand outward while sides match — longest palindrome here is "${cand}", best so far "${best}".`
      });
    }
    return out;
  })();

  // ============ KNAPSACK (Coin Change) ============
  A["knapsack"] = (() => {
    const coins = [1, 2, 5], amount = 11;
    const dp = Array(amount + 1).fill(Infinity); dp[0] = 0;
    const out = [];
    function svg(focus){
      return _row(dp.map((v, i) => _cell(v === Infinity ? "∞" : v, { cls: focus === i ? "cur" : (v !== Infinity ? "in-window" : "dim"), ptr: focus === i ? `${i}` : "" })));
    }
    out.push({ html: svg() + _label(`coins=${JSON.stringify(coins)} amount=${amount}`), narr: `dp[a] = fewest coins to make amount a; dp[0] is 0 (empty), the rest start as ∞ (unknown).` });
    for (let a = 1; a <= amount; a++){
      for (const c of coins) if (c <= a) dp[a] = Math.min(dp[a], dp[a-c] + 1);
      out.push({ html: svg(a) + _label(`dp[${a}] = ${dp[a] === Infinity ? "∞" : dp[a]}`), narr: `For amount ${a}: try each coin c, take dp[${a}-c]+1, keep the min — dp[${a}] = ${dp[a] === Infinity ? "∞" : dp[a]}.` });
    }
    return out;
  })();

  // ============ LIS (patience) ============
  A["lis"] = (() => {
    const a = [10, 9, 2, 5, 3, 7, 101, 18];
    const out = []; const tails = [];
    function bisectLeft(arr, x){ let lo=0,hi=arr.length; while(lo<hi){ const m=(lo+hi)>>1; if(arr[m]<x) lo=m+1; else hi=m; } return lo; }
    for (let i = 0; i < a.length; i++){
      const idx = bisectLeft(tails, a[i]);
      const prev = tails[idx];
      if (idx === tails.length) tails.push(a[i]); else tails[idx] = a[i];
      let narr;
      if (prev === undefined) narr = `Value ${a[i]} is bigger than every tail — append it; the longest run grew by 1.`;
      else narr = `Value ${a[i]} replaces tail ${prev} at slot ${idx} — same length run, but with a smaller tail to keep options open.`;
      out.push({
        html: _row(a.map((v, j) => _cell(v, { cls: j === i ? "cur" : (j < i ? "dim" : "") })))
        + `<div style="display:flex;align-items:center;gap:8px;margin-top:10px;font-family:ui-monospace,monospace;font-size:11px;color:var(--muted)"><span style="min-width:48px">tails →</span><div class="anim-cells">${tails.map(v => _cell(v, { cls: "in-window" })).join("")}</div></div>`
        + _label(`bisect_left(tails, ${a[i]}) = ${idx}${prev !== undefined ? `, replace ${prev}` : `, append`}`),
        narr
      });
    }
    out.push({ html: _label(`LIS length = ${tails.length}`), narr: `Length of tails = length of the longest increasing subsequence: ${tails.length}.` });
    return out;
  })();

  // ============ BIT MANIPULATION (XOR Single Number) ============
  A["bit-manipulation"] = (() => {
    const a = [4, 1, 2, 1, 2];
    const out = []; let x = 0;
    out.push({ html: _row(a.map(v => _cell(v))) + _kv([["x", x.toString(2).padStart(3,"0"), "var(--accent-3)"]]), narr: `Start with x = 0; XOR has the trick that v ⊕ v = 0, so duplicate values will cancel as we sweep.` });
    for (let i = 0; i < a.length; i++){
      x ^= a[i];
      out.push({
        html: _row(a.map((v, j) => _cell(v, { cls: j === i ? "cur" : (j < i ? "dim" : "") })))
        + _kv([["x", x.toString(2).padStart(3,"0"), "var(--accent-3)"]])
        + _label(`x ^= ${a[i]} → ${x}`),
        narr: `XOR in ${a[i]}: bits flip where they differ from x — running XOR is now ${x}.`
      });
    }
    out.push({ html: _label(`unique = ${x}`), narr: `Every duplicate cancelled; what's left in x (${x}) is the only number that appeared once.` });
    return out;
  })();

  // ============ MATH (fast pow) ============
  A["math"] = (() => {
    const x = 2, n0 = 10;
    const out = []; let n = n0, base = x, res = 1;
    out.push({ html: _kv([["base", base, "var(--accent)"], ["n (binary)", n.toString(2), "var(--accent-3)"], ["res", res, "var(--ok)"]]), narr: `Fast exponentiation: walk the bits of the exponent from low to high, squaring base and multiplying when the bit is 1.` });
    while (n){
      if (n & 1) res *= base;
      base *= base;
      n >>= 1;
      out.push({ html: _kv([["base", base, "var(--accent)"], ["n (binary)", n.toString(2), "var(--accent-3)"], ["res", res, "var(--ok)"]]), narr: `Square base for the next bit and shift n down to ${n}; running product is ${res}.` });
    }
    out.push({ html: _label(`${x}^${n0} = ${res}`), narr: `All exponent bits processed — ${x}^${n0} = ${res}, computed in O(log n) multiplications.` });
    return out;
  })();

  // ============ DESIGN (LRU access order) ============
  A["design"] = (() => {
    // capacity 3, ops:
    const ops = [["put",1,1],["put",2,2],["put",3,3],["get",1],["put",4,4]];
    const cap = 3;
    const order = []; const map = {};
    const out = [];
    function frame(narr){
      return _row(order.map(k => _cell(`${k}:${map[k]}`, { cls: "in-window" })))
        + _label(narr);
    }
    for (const op of ops){
      if (op[0] === "put"){
        const k = op[1], v = op[2];
        const wasFull = order.length === cap && !(k in map);
        if (k in map){ order.splice(order.indexOf(k), 1); }
        else if (order.length === cap){ const oldest = order.shift(); delete map[oldest]; }
        order.push(k); map[k] = v;
        const narr = wasFull
          ? `put(${k}, ${v}): cache was full, evict the least-recently-used and insert ${k} as most-recent.`
          : `put(${k}, ${v}): write the entry and mark it most-recently-used by appending it to the end.`;
        out.push({ html: frame(`put(${k},${v})${order.length === cap+1 ? `, evict oldest` : ""}`), narr });
      } else {
        const k = op[1];
        if (k in map){
          order.splice(order.indexOf(k), 1); order.push(k);
          out.push({ html: frame(`get(${k}) → ${map[k]} · move to MRU`), narr: `get(${k}) returns ${map[k]} — touching it bumps the key to most-recently-used.` });
        }
      }
    }
    return out;
  })();

  // ============ MATRIX TRICKS (rotate 90°) ============
  A["matrix-tricks"] = (() => {
    const m = [[1,2,3],[4,5,6],[7,8,9]];
    const out = [];
    function svg(grid, narr){
      const C = grid[0].length, R = grid.length;
      let html = `<div style="display:grid;grid-template-columns:repeat(${C},36px);gap:4px;justify-content:center;margin-top:6px">`;
      for (let r = 0; r < R; r++) for (let c = 0; c < C; c++) html += `<div class="anim-cell in-window">${grid[r][c]}</div>`;
      html += `</div>` + _label(narr);
      return html;
    }
    out.push({ html: svg(m, "input"), narr: `Goal: rotate this matrix 90° clockwise using two simple in-place steps.` });
    // transpose
    const t = m[0].map((_, c) => m.map(row => row[c]));
    out.push({ html: svg(t, "transpose: m[i][j] ↔ m[j][i]"), narr: `Step 1 — transpose: swap m[i][j] with m[j][i] so rows become columns.` });
    // reverse each row
    const r = t.map(row => [...row].reverse());
    out.push({ html: svg(r, "reverse each row → 90° clockwise rotation"), narr: `Step 2 — reverse each row: combined with the transpose, this gives a 90° clockwise rotation.` });
    return out;
  })();

  // ============ SEEN BEFORE (Floyd on duplicate) ============
  A["seen-before"] = (() => {
    const a = [1, 3, 4, 2, 2]; // duplicate is 2
    const out = []; let slow = a[0], fast = a[0];
    let it = 0;
    while (it < 5){
      slow = a[slow]; fast = a[a[fast]];
      out.push({
        html: _row(a.map((v, i) => _cell(v, { cls: i === slow && i === fast ? "match" : (i === slow ? "cur" : (i === fast ? "in-window" : "")), ptr: i === slow ? "slow" : (i === fast ? "fast" : ""), ptrCls: i === slow ? "s" : "f" }))),
        narr: slow === fast
          ? `slow and fast both land at index ${slow} — meeting point inside the cycle, the duplicate is nearby.`
          : `Treat indices as a linked list via a[i]: slow at ${slow}, fast at ${fast} — keep walking until they meet.`
      });
      if (slow === fast) break;
      it++;
    }
    slow = a[0];
    while (slow !== fast){ slow = a[slow]; fast = a[fast]; }
    out.push({ html: _row(a.map((v, i) => _cell(v, { cls: i === slow ? "match" : "" }))) + _label(`duplicate = ${slow}`), narr: `Reset slow to the start; walk both at the same speed until they meet — that index ${slow} is the duplicate.` });
    return out;
  })();

  return A;
})();

(function attachDates(){
  const NEW_DOW = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"]; // Day 1 = Mon
  const FMT = (d) => d.toLocaleDateString(undefined, { weekday:"short", month:"short", day:"numeric" });
  SCHEDULE.forEach((d) => {
    const dt = new Date(START_DATE.getTime());
    dt.setDate(START_DATE.getDate() + (d.day - 1));
    d.date = dt;
    d.dow = NEW_DOW[(d.day - 1) % 7];
    d.dateLabel = FMT(dt);
  });
})();

// ───── SM-2 lite spaced repetition ─────
// Each revisit-flagged note carries: intervalDays, easeFactor, repetitions, nextDueAt.
// Defaults on first flag: 3d / ease 2.5 / reps 0. See sm2GotIt / sm2Struggling below.
const DAY_MS = 86400000;
function sm2Defaults(initialTs){
  const ts = initialTs || Date.now();
  return {
    intervalDays: 3,
    easeFactor: 2.5,
    repetitions: 0,
    nextDueAt: ts + 3 * DAY_MS
  };
}
// Migrate existing notes: any flagged note missing SM-2 fields gets defaults derived
// from the first timestamp (treated as the original flag time).
function ensureSM2(id){
  const n = getNote(id);
  if (!n.revisit) return n;
  if (n.intervalDays !== undefined && n.easeFactor !== undefined &&
      n.repetitions !== undefined && n.nextDueAt !== undefined) return n;
  const initialTs = (n.timestamps && n.timestamps[0]) || Date.now();
  const defaults = sm2Defaults(initialTs);
  setNote(id, defaults);
  return getNote(id);
}
function sm2GotIt(id){
  const n = ensureSM2(id);
  const reps = (n.repetitions || 0) + 1;
  // Per spec: compute interval using the CURRENT ease, then bump ease.
  const curEase = (n.easeFactor || 2.5);
  let interval;
  if (reps === 1) interval = 3;
  else if (reps === 2) interval = 7;
  else interval = Math.min(90, Math.round((n.intervalDays || 3) * curEase));
  const ease = Math.min(3.0, curEase + 0.1);
  setNote(id, {
    repetitions: reps,
    easeFactor: ease,
    intervalDays: interval,
    nextDueAt: Date.now() + interval * DAY_MS
  });
}
function sm2Struggling(id){
  const n = ensureSM2(id);
  const ease = Math.max(1.3, (n.easeFactor || 2.5) - 0.2);
  setNote(id, {
    repetitions: 0,
    easeFactor: ease,
    intervalDays: 3,
    nextDueAt: Date.now() + 3 * DAY_MS
  });
}

const ttimers = {}; // ephemeral: slug -> { startedAt, intervalId, btn }
function startStopTimer(slug, btnEl){
  if (ttimers[slug]){
    // stop & log
    const t = ttimers[slug];
    clearInterval(t.intervalId);
    const elapsed = Math.round((Date.now() - t.startedAt) / 1000);
    solveTimes[slug] = solveTimes[slug] || { totalSec: 0, sessions: [] };
    solveTimes[slug].totalSec += elapsed;
    solveTimes[slug].sessions.push({ started: t.startedAt, ended: Date.now(), sec: elapsed });
    saveTimes();
    delete ttimers[slug];
    btnEl.classList.remove("running"); btnEl.classList.add("logged");
    btnEl.textContent = `⏱ ${formatDuration(solveTimes[slug].totalSec)}`;
    btnEl.setAttribute("title", "Total time you've spent on this problem. Click to start a new session.");
    toast(`⏱ Logged ${formatDuration(elapsed)} on this problem (total: ${formatDuration(solveTimes[slug].totalSec)})`);
    return;
  }
  const startedAt = Date.now();
  const tick = () => {
    const sec = Math.round((Date.now() - startedAt) / 1000);
    btnEl.textContent = `⏸ ${formatDuration(sec)}`;
  };
  tick();
  ttimers[slug] = { startedAt, intervalId: setInterval(tick, 1000) };
  btnEl.classList.add("running"); btnEl.classList.remove("logged");
  btnEl.setAttribute("title", "Timer running. Click to stop and log this session.");
}
function formatDuration(s){
  if (s < 60) return `${s}s`;
  const m = Math.floor(s / 60), sec = s % 60;
  if (m < 60) return `${m}:${String(sec).padStart(2,"0")}`;
  const h = Math.floor(m / 60), mm = m % 60;
  return `${h}h${String(mm).padStart(2,"0")}m`;
}
