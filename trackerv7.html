<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Amazon SDE 60-Day Tracker</title>
<style>
  :root {
    --bg: #07090d;
    --bg-2: #0d1117;
    --panel: #141923;
    --panel-2: #1c2230;
    --line: #262d3d;
    --fg: #e7eaf0;
    --muted: #8a93a3;
    --accent: #ff9900;
    --accent-2: #146eb4;
    --accent-3: #c084fc;
    --ok: #4ade80;
    --warn: #fbbf24;
    --hard: #f87171;
    --easy: #60a5fa;
    --med: #fbbf24;
    --grad-1: linear-gradient(135deg, #ff9900 0%, #ff5e62 100%);
    --grad-2: linear-gradient(135deg, #146eb4 0%, #c084fc 100%);
    --grad-3: linear-gradient(135deg, #4ade80 0%, #22d3ee 100%);
  }
  [data-theme="light"] {
    --bg: #f7f8fb;
    --bg-2: #eef1f6;
    --panel: #ffffff;
    --panel-2: #f1f4f9;
    --line: #e4e7ed;
    --fg: #1a1f2c;
    --muted: #6b7280;
    --accent: #d97706;
    --accent-2: #1d4ed8;
    --accent-3: #7c3aed;
    --ok: #16a34a;
    --warn: #d97706;
    --hard: #dc2626;
    --easy: #2563eb;
    --med: #d97706;
  }
  [data-theme="hc"] {
    /* high-contrast: pure black/white + vivid accents */
    --bg: #000000;
    --bg-2: #0a0a0a;
    --panel: #111111;
    --panel-2: #1a1a1a;
    --line: #ffffff;
    --fg: #ffffff;
    --muted: #cfcfcf;
    --accent: #ffd000;
    --accent-2: #00d4ff;
    --accent-3: #ff66cc;
    --ok: #00ff99;
    --warn: #ffd000;
    --hard: #ff5050;
    --easy: #00d4ff;
    --med: #ffd000;
  }
  [data-theme="hc"] .progress-fill { box-shadow: 0 0 0 1px #fff; }
  [data-theme="hc"] *:focus-visible { outline: 3px solid #ffd000 !important; outline-offset: 2px !important; }

  /* ───── classic black & white ───── */
  [data-theme="bw"] {
    --bg: #0a0a0a;
    --bg-2: #111111;
    --panel: #161616;
    --panel-2: #1c1c1c;
    --line: #2a2a2a;
    --fg: #f5f5f5;
    --muted: #9a9a9a;
    --accent: #ffffff;
    --accent-2: #cccccc;
    --accent-3: #e0e0e0;
    --ok: #d0d0d0;
    --warn: #cccccc;
    --hard: #ffffff;
    --easy: #b8b8b8;
    --med: #d0d0d0;
    --grad-1: linear-gradient(135deg, #ffffff 0%, #b0b0b0 100%);
    --grad-2: linear-gradient(135deg, #cccccc 0%, #777777 100%);
    --grad-3: linear-gradient(135deg, #e0e0e0 0%, #888888 100%);
  }
  [data-theme="bw"] .progress-fill { background: #ffffff !important; box-shadow: none !important; }

  /* ───── solarized dark ───── */
  [data-theme="solarized"] {
    --bg: #002b36;
    --bg-2: #003542;
    --panel: #073642;
    --panel-2: #0a4452;
    --line: #2d4a55;
    --fg: #eee8d5;
    --muted: #93a1a1;
    --accent: #b58900;
    --accent-2: #268bd2;
    --accent-3: #d33682;
    --ok: #859900;
    --warn: #cb4b16;
    --hard: #dc322f;
    --easy: #2aa198;
    --med: #b58900;
    --grad-1: linear-gradient(135deg, #b58900 0%, #cb4b16 100%);
    --grad-2: linear-gradient(135deg, #268bd2 0%, #6c71c4 100%);
    --grad-3: linear-gradient(135deg, #859900 0%, #2aa198 100%);
  }

  /* ───── nord (cool blue-gray) ───── */
  [data-theme="nord"] {
    --bg: #2e3440;
    --bg-2: #3b4252;
    --panel: #434c5e;
    --panel-2: #4c566a;
    --line: #565e6f;
    --fg: #eceff4;
    --muted: #aab1bf;
    --accent: #88c0d0;
    --accent-2: #81a1c1;
    --accent-3: #b48ead;
    --ok: #a3be8c;
    --warn: #ebcb8b;
    --hard: #bf616a;
    --easy: #88c0d0;
    --med: #ebcb8b;
    --grad-1: linear-gradient(135deg, #88c0d0 0%, #5e81ac 100%);
    --grad-2: linear-gradient(135deg, #81a1c1 0%, #b48ead 100%);
    --grad-3: linear-gradient(135deg, #a3be8c 0%, #88c0d0 100%);
  }

  /* ───── sepia (warm reading mode) ───── */
  [data-theme="sepia"] {
    --bg: #f4ecd8;
    --bg-2: #ede2c4;
    --panel: #faf3e0;
    --panel-2: #f1e7cf;
    --line: #d8caa8;
    --fg: #3a2f1f;
    --muted: #7d6f53;
    --accent: #a0522d;
    --accent-2: #5d4037;
    --accent-3: #8b4513;
    --ok: #556b2f;
    --warn: #b8860b;
    --hard: #a0303f;
    --easy: #4a6741;
    --med: #b8860b;
    --grad-1: linear-gradient(135deg, #a0522d 0%, #8b4513 100%);
    --grad-2: linear-gradient(135deg, #5d4037 0%, #3e2723 100%);
    --grad-3: linear-gradient(135deg, #556b2f 0%, #6b8e23 100%);
  }
  [data-theme="sepia"] header { background: rgba(244,236,216,.92); }

  /* ───── dracula (purple-pink classic) ───── */
  [data-theme="dracula"] {
    --bg: #282a36;
    --bg-2: #21222c;
    --panel: #44475a;
    --panel-2: #3b3d4f;
    --line: #6272a4;
    --fg: #f8f8f2;
    --muted: #a4a8c5;
    --accent: #ff79c6;
    --accent-2: #8be9fd;
    --accent-3: #bd93f9;
    --ok: #50fa7b;
    --warn: #f1fa8c;
    --hard: #ff5555;
    --easy: #8be9fd;
    --med: #ffb86c;
    --grad-1: linear-gradient(135deg, #ff79c6 0%, #bd93f9 100%);
    --grad-2: linear-gradient(135deg, #8be9fd 0%, #50fa7b 100%);
    --grad-3: linear-gradient(135deg, #ffb86c 0%, #ff5555 100%);
  }

  /* ───── monokai (terminal-esque, warm) ───── */
  [data-theme="monokai"] {
    --bg: #272822;
    --bg-2: #1e1f1c;
    --panel: #3e3d32;
    --panel-2: #353630;
    --line: #75715e;
    --fg: #f8f8f2;
    --muted: #a59f85;
    --accent: #f92672;
    --accent-2: #66d9ef;
    --accent-3: #ae81ff;
    --ok: #a6e22e;
    --warn: #fd971f;
    --hard: #f92672;
    --easy: #66d9ef;
    --med: #fd971f;
    --grad-1: linear-gradient(135deg, #f92672 0%, #fd971f 100%);
    --grad-2: linear-gradient(135deg, #66d9ef 0%, #ae81ff 100%);
    --grad-3: linear-gradient(135deg, #a6e22e 0%, #66d9ef 100%);
  }

  /* ───── tokyo night (deep blue with violet) ───── */
  [data-theme="tokyo"] {
    --bg: #1a1b26;
    --bg-2: #16161e;
    --panel: #24283b;
    --panel-2: #1f2335;
    --line: #414868;
    --fg: #c0caf5;
    --muted: #7982a9;
    --accent: #7aa2f7;
    --accent-2: #7dcfff;
    --accent-3: #bb9af7;
    --ok: #9ece6a;
    --warn: #e0af68;
    --hard: #f7768e;
    --easy: #7dcfff;
    --med: #e0af68;
    --grad-1: linear-gradient(135deg, #7aa2f7 0%, #bb9af7 100%);
    --grad-2: linear-gradient(135deg, #7dcfff 0%, #9ece6a 100%);
    --grad-3: linear-gradient(135deg, #e0af68 0%, #f7768e 100%);
  }

  /* ───── synthwave (80s neon retro) ───── */
  [data-theme="synthwave"] {
    --bg: #2b213a;
    --bg-2: #241a30;
    --panel: #34283f;
    --panel-2: #2c2237;
    --line: #5d3a7e;
    --fg: #f4eeff;
    --muted: #a890c4;
    --accent: #ff6ec7;
    --accent-2: #00f0ff;
    --accent-3: #ffe600;
    --ok: #00ffaa;
    --warn: #ffaa00;
    --hard: #ff3377;
    --easy: #00f0ff;
    --med: #ffe600;
    --grad-1: linear-gradient(135deg, #ff6ec7 0%, #ffe600 100%);
    --grad-2: linear-gradient(135deg, #00f0ff 0%, #ff6ec7 100%);
    --grad-3: linear-gradient(135deg, #ffe600 0%, #00ffaa 100%);
  }

  /* ───── forest (calming green) ───── */
  [data-theme="forest"] {
    --bg: #1a2419;
    --bg-2: #151e15;
    --panel: #243024;
    --panel-2: #1e2a1e;
    --line: #3a503a;
    --fg: #e8f0e8;
    --muted: #8aa28a;
    --accent: #a5c97f;
    --accent-2: #7fc9c0;
    --accent-3: #c97fa5;
    --ok: #7fc97f;
    --warn: #c9b97f;
    --hard: #c97f7f;
    --easy: #7fc9c0;
    --med: #c9b97f;
    --grad-1: linear-gradient(135deg, #a5c97f 0%, #7fc97f 100%);
    --grad-2: linear-gradient(135deg, #7fc9c0 0%, #a5c97f 100%);
    --grad-3: linear-gradient(135deg, #c9b97f 0%, #c97fa5 100%);
  }

  /* ───── rose pine (soft warm pink/violet) ───── */
  [data-theme="rosepine"] {
    --bg: #191724;
    --bg-2: #16121f;
    --panel: #26233a;
    --panel-2: #1f1d2e;
    --line: #403d52;
    --fg: #e0def4;
    --muted: #908caa;
    --accent: #eb6f92;
    --accent-2: #9ccfd8;
    --accent-3: #c4a7e7;
    --ok: #31748f;
    --warn: #f6c177;
    --hard: #eb6f92;
    --easy: #9ccfd8;
    --med: #f6c177;
    --grad-1: linear-gradient(135deg, #eb6f92 0%, #c4a7e7 100%);
    --grad-2: linear-gradient(135deg, #9ccfd8 0%, #31748f 100%);
    --grad-3: linear-gradient(135deg, #f6c177 0%, #ebbcba 100%);
  }

  /* ───── catppuccin (mocha) ───── */
  [data-theme="catppuccin"] {
    --bg: #1e1e2e;
    --bg-2: #181825;
    --panel: #313244;
    --panel-2: #292c3c;
    --line: #45475a;
    --fg: #cdd6f4;
    --muted: #a6adc8;
    --accent: #f38ba8;
    --accent-2: #89dceb;
    --accent-3: #cba6f7;
    --ok: #a6e3a1;
    --warn: #f9e2af;
    --hard: #f38ba8;
    --easy: #89b4fa;
    --med: #fab387;
    --grad-1: linear-gradient(135deg, #f38ba8 0%, #cba6f7 100%);
    --grad-2: linear-gradient(135deg, #89dceb 0%, #a6e3a1 100%);
    --grad-3: linear-gradient(135deg, #fab387 0%, #f9e2af 100%);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font: 14px/1.5 "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, "Helvetica Neue", Arial, sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

  /* ───── windows scrollbar polish ───── */
  * { scrollbar-width: thin; scrollbar-color: var(--line) transparent; }
  *::-webkit-scrollbar { width: 10px; height: 10px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: var(--line); border-radius: 6px; border: 2px solid var(--bg); }
  *::-webkit-scrollbar-thumb:hover { background: var(--muted); }
  body::before {
    content:""; position: fixed; inset:0; pointer-events:none; z-index:-1;
    background:
      radial-gradient(900px 600px at 0% 0%, rgba(255,153,0,.10), transparent 60%),
      radial-gradient(900px 600px at 100% 0%, rgba(20,110,180,.10), transparent 60%),
      radial-gradient(700px 500px at 50% 100%, rgba(192,132,252,.08), transparent 60%);
  }
  a { color: var(--accent-2); text-decoration: none; }
  a:hover { text-decoration: underline; color: var(--accent); }

  /* ───── header ───── */
  header { position: sticky; top: 0; z-index: 10; background: rgba(20,25,35,.92); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); padding: 14px 20px; }
  /* gradient-text title with safe fallback to accent color */
  header h1 { margin: 0; font-size: 19px; color: var(--accent); font-weight: 800; letter-spacing: -.01em; }
  @supports ((-webkit-background-clip: text) or (background-clip: text)) {
    header h1 { background: var(--grad-1); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
  }
  [data-theme="light"] header { background: rgba(255,255,255,.92); }
  [data-theme="hc"] header { background: #000; -webkit-backdrop-filter: none; backdrop-filter: none; }
  header .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .top-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }

  /* ───── progress + xp ───── */
  .progress { flex: 1; min-width: 260px; }
  .progress-bar { height: 10px; background: var(--panel-2); border-radius: 99px; overflow: hidden; box-shadow: inset 0 0 0 1px var(--line); }
  .progress-fill { height: 100%; background: var(--grad-1); transition: width .6s cubic-bezier(.22,1,.36,1); position: relative; box-shadow: 0 0 18px rgba(255,153,0,.5); }
  .progress-fill::after {
    content:""; position:absolute; inset:0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
    animation: shimmer 2.4s linear infinite;
  }
  @keyframes shimmer { 0% { transform: translateX(-100%);} 100% { transform: translateX(100%);} }
  .stats { display: flex; gap: 14px; font-size: 12px; color: var(--muted); margin-top: 8px; flex-wrap: wrap; align-items: center; }
  .stats .pill { background: var(--panel-2); border: 1px solid var(--line); padding: 3px 9px; border-radius: 99px; }
  .stats .pill b { color: var(--fg); }
  .stats .streak { background: linear-gradient(135deg, rgba(255,153,0,.18), rgba(255,94,98,.18)); border-color: rgba(255,153,0,.4); color: var(--accent); font-weight: 700; }
  .stats .level { background: linear-gradient(135deg, rgba(192,132,252,.18), rgba(20,110,180,.18)); border-color: rgba(192,132,252,.4); color: var(--accent-3); font-weight: 700; }
  .stats .due-pill { color: var(--warn); border-color: rgba(251,191,36,.4); background: rgba(251,191,36,.08); text-decoration: none; transition: all .2s; }
  .stats .due-pill:hover { background: rgba(251,191,36,.18); transform: translateY(-1px); }
  .stats .due-pill b { color: var(--warn); }
  .stats .due-pill.due-pill-overdue { color: var(--hard); border-color: rgba(248,113,113,.5); background: rgba(248,113,113,.1); animation: due-pulse 2s ease-in-out infinite; }
  .stats .due-pill.due-pill-overdue b { color: var(--hard); }
  @keyframes due-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(248,113,113,0); } 50% { box-shadow: 0 0 0 4px rgba(248,113,113,.15); } }

  nav.weeks { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
  nav.weeks button { background: var(--panel-2); color: var(--fg); border: 1px solid var(--line); padding: 6px 12px; border-radius: 99px; cursor: pointer; font-size: 12px; transition: all .2s; }
  nav.weeks button.active { background: var(--grad-1); color: #000; border-color: transparent; font-weight: 700; box-shadow: 0 4px 12px rgba(255,153,0,.4); }
  nav.weeks button:hover:not(.active) { border-color: var(--accent); transform: translateY(-1px); }

  .tabs { display: flex; gap: 4px; margin-left: auto; }
  .tabs button { background: transparent; border: 1px solid var(--line); color: var(--muted); padding: 6px 14px; border-radius: 99px; cursor: pointer; font-size: 12px; transition: all .2s; }
  .tabs button.active { color: var(--accent); border-color: var(--accent); background: rgba(255,153,0,.08); }

  main { max-width: 1100px; margin: 0 auto; padding: 20px; }

  /* ───── focus mode ───── */
  .focus-overlay {
    position: fixed; inset: 0; background: var(--bg); z-index: 90;
    overflow-y: auto; padding: 30px 20px;
    animation: fadeIn .25s;
  }
  .focus-card {
    max-width: 680px; margin: 0 auto;
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px;
    padding: 32px; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,.4);
  }
  .focus-card .exit-focus {
    position: absolute; top: 16px; right: 16px;
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--line);
    padding: 6px 14px; border-radius: 99px; cursor: pointer; font-size: 12px;
  }
  .focus-card .exit-focus:hover { color: var(--accent); border-color: var(--accent); }
  .focus-card h2 {
    margin: 0 0 4px; font-size: 22px; color: var(--accent);
    background: var(--grad-1); -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .focus-card .sub { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
  .focus-timer {
    font-size: 56px; font-weight: 800; color: var(--accent); text-align: center;
    font-family: ui-monospace, "SF Mono", Consolas, monospace;
    margin: 18px 0; padding: 18px;
    background: var(--panel-2); border-radius: 10px; border: 1px solid var(--line);
    transition: all .3s;
  }
  .focus-timer.running { color: var(--ok); border-color: rgba(74,222,128,.5); box-shadow: 0 0 18px rgba(74,222,128,.2); }
  .focus-timer.warning { color: var(--warn); }
  .focus-timer.done { color: var(--hard); animation: pulse 1s infinite; }
  .focus-controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 22px; flex-wrap: wrap; }
  .focus-controls button {
    background: var(--panel-2); border: 1px solid var(--line); color: var(--fg);
    padding: 8px 18px; border-radius: 99px; cursor: pointer; font-size: 13px;
  }
  .focus-controls button:hover { border-color: var(--accent); color: var(--accent); }
  .focus-controls button.primary { background: var(--grad-1); color: #000; border: 0; font-weight: 700; }
  .focus-card .tasks-list ul.tasks li { padding: 12px 0; }
  .focus-card .tasks-list ul.tasks input[type=checkbox] { width: 22px; height: 22px; }

  .journey-wrap {
    position: relative; padding: 18px 12px 30px; margin-top: 10px;
    background: linear-gradient(180deg, transparent, rgba(255,153,0,.04));
    border-radius: 10px;
  }
  .journey-svg-wrap {
    position: relative; width: 100%;
    height: 220px;
    margin: 14px 0 8px;
  }
  .journey-svg { width: 100%; height: 100%; display: block; overflow: visible; }
  .journey-road-bg { fill: none; stroke: var(--line); stroke-width: 8; stroke-linecap: round; stroke-dasharray: 4 8; }
  .journey-road-fill { fill: none; stroke: url(#journeyGrad); stroke-width: 8; stroke-linecap: round; transition: stroke-dashoffset .8s cubic-bezier(.22,1,.36,1); filter: drop-shadow(0 0 8px rgba(255,153,0,.45)); }
  .journey-cp-dot { fill: var(--panel-2); stroke: var(--line); stroke-width: 2; transition: all .3s; cursor: pointer; }
  .journey-cp-dot.earned { fill: var(--ok); stroke: var(--ok); filter: drop-shadow(0 0 6px rgba(74,222,128,.6)); }
  .journey-cp-dot:hover { stroke: var(--accent); stroke-width: 3; }
  .journey-cp-icon { font-size: 14px; pointer-events: none; user-select: none; transition: transform .3s; }
  .journey-cp-icon.earned { font-size: 16px; }
  .journey-cp-label { font-size: 9px; fill: var(--muted); text-anchor: middle; pointer-events: none; font-weight: 600; }
  .journey-cp-label.earned { fill: var(--ok); }
  .journey-week-marker { font-size: 10px; fill: var(--accent); text-anchor: middle; font-weight: 700; pointer-events: none; }
  .journey-week-tick { stroke: var(--accent); stroke-width: 1.5; opacity: .5; }
  .journey-vehicle-svg {
    font-size: 26px;
    transition: all .8s cubic-bezier(.22,1,.36,1);
    filter: drop-shadow(0 4px 6px rgba(255,153,0,.5));
    pointer-events: none;
    user-select: none;
  }
  .journey-flag-svg { font-size: 22px; pointer-events: none; }
  .journey-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); margin-top: 8px; padding: 0 6px; }
  .journey-meta b { color: var(--accent); }
  .journey-tier { padding: 6px 12px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 99px; font-size: 12px; color: var(--muted); display: inline-flex; align-items: center; gap: 8px; }
  .journey-tier b { color: var(--accent); }
  .journey-tier .vehicle-emoji { font-size: 18px; }
  .journey-cp-tooltip {
    position: absolute; background: var(--panel); border: 1px solid var(--line);
    border-radius: 6px; padding: 8px 10px; font-size: 11px; pointer-events: none;
    box-shadow: 0 6px 18px rgba(0,0,0,.4); z-index: 5; opacity: 0;
    transition: opacity .15s; max-width: 180px; line-height: 1.4;
    transform: translate(-50%, -100%); margin-top: -8px;
  }
  .journey-cp-tooltip.show { opacity: 1; }
  .journey-cp-tooltip b { color: var(--accent); display: block; margin-bottom: 2px; }
  .journey-cp-tooltip .desc { color: var(--muted); }
  .journey-cp-tooltip .status { color: var(--ok); font-weight: 700; margin-top: 4px; }
  .journey-cp-tooltip .status.locked { color: var(--muted); }
  @media (max-width: 720px) {
    .journey-svg-wrap { height: 280px; }
  }

  .grid-wrap { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
  .grid-wrap h3 { margin: 0 0 10px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .grid-60 { display: grid; grid-template-columns: repeat(20, 1fr); gap: 4px; }
  @media (max-width: 700px) { .grid-60 { grid-template-columns: repeat(10, 1fr); } }
  .cell { aspect-ratio: 1/1; min-height: 22px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px; display:flex; align-items:center; justify-content:center; font-size: 9px; color: var(--muted); cursor: pointer; transition: all .2s; position: relative; }
  .cell:hover { transform: scale(1.18); border-color: var(--accent); z-index: 2; }
  .cell.p25 { background: rgba(255,153,0,.18); border-color: rgba(255,153,0,.35); color: #fff; }
  .cell.p50 { background: rgba(255,153,0,.40); border-color: rgba(255,153,0,.6); color: #fff; }
  .cell.p75 { background: rgba(255,153,0,.62); border-color: rgba(255,153,0,.8); color: #000; }
  .cell.p100 { background: var(--grad-1); border-color: transparent; color: #000; font-weight: 700; box-shadow: 0 0 10px rgba(255,153,0,.6); }
  .cell.today { outline: 2px solid var(--accent-3); outline-offset: 2px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { outline-color: var(--accent-3); } 50% { outline-color: var(--accent); } }

  /* ───── motivation banner ───── */
  .quote { background: var(--panel); border: 1px solid var(--line); border-left: 4px solid var(--accent); border-radius: 8px; padding: 12px 16px; margin-bottom: 14px; font-style: italic; color: var(--fg); position: relative; }
  .quote::before { content: "❝"; position: absolute; top: -2px; right: 14px; font-size: 32px; color: var(--accent); opacity: .35; }
  .quote .who { display: block; font-style: normal; color: var(--muted); font-size: 11px; margin-top: 4px; }

  /* ───── day card ───── */
  .day { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; margin-bottom: 12px; overflow: hidden; transition: all .25s; position: relative; }
  .day:hover { border-color: rgba(255,153,0,.4); }
  .day-head { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; user-select: none; }
  .day-head:hover { background: var(--panel-2); }
  .day-copy {
    background: var(--panel-2); color: var(--muted); border: 1px solid var(--line);
    padding: 4px 10px; border-radius: 99px; font-size: 11px; cursor: pointer;
    margin-right: 8px; transition: all .2s;
  }
  .day-copy:hover { color: var(--accent); border-color: var(--accent); }
  .day-copy.ok { background: var(--ok); color: #000; border-color: transparent; font-weight: 700; }
  .day-head-left { display: flex; align-items: center; }
  .day-num { color: var(--muted); font-size: 11px; margin-right: 10px; font-weight: 700; letter-spacing: .05em; padding: 2px 7px; background: var(--panel-2); border-radius: 4px; }
  .day-title { font-weight: 600; font-size: 14px; }
  .day-pct { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .day-pct b { color: var(--ok); font-size: 13px; }
  .mini-ring { width: 28px; height: 28px; }
  .day-body { padding: 4px 18px 16px; border-top: 1px solid var(--line); display: none; }
  .day.open .day-body { display: block; animation: slideDown .25s ease-out; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

  /* ───── DAY COMPLETED — cross out treatment ───── */
  .day.completed { background: linear-gradient(135deg, rgba(74,222,128,.06), rgba(20,110,180,.06)); border-color: rgba(74,222,128,.3); }
  .day.completed::after {
    content: "✓ DONE";
    position: absolute; top: 50%; right: 22px; transform: translateY(-50%) rotate(-8deg);
    font-size: 32px; font-weight: 900; letter-spacing: .1em;
    color: var(--ok); opacity: .25;
    pointer-events: none;
    text-shadow: 0 0 30px rgba(74,222,128,.6);
  }
  .day.completed .day-title { color: var(--muted); position: relative; }
  .day.completed .day-title::after {
    content: ""; position: absolute; left: 0; right: 0; top: 50%;
    border-top: 2px solid rgba(74,222,128,.7);
    transform: scaleX(1); transform-origin: left;
    animation: strikeThrough .6s ease-out;
  }
  @keyframes strikeThrough { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  .day.completed .day-num { background: var(--ok); color: #000; }
  .day.completed .day-pct b { color: var(--ok); }

  /* ───── tasks ───── */
  .block { margin: 14px 0; padding-left: 4px; }
  .block-head { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  .block-head b { color: var(--accent); margin-right: 6px; font-size: 12px; }
  ul.tasks { list-style: none; padding: 0; margin: 0; }
  ul.tasks li { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px dashed var(--line); align-items: flex-start; transition: background .2s; border-radius: 4px; padding-left: 6px; padding-right: 6px; }
  ul.tasks li:hover { background: rgba(255,153,0,.04); }
  ul.tasks li:last-child { border: 0; }
  ul.tasks input[type=checkbox] { margin-top: 3px; accent-color: var(--accent); cursor: pointer; width: 16px; height: 16px; }
  ul.tasks input[type=checkbox].dsa-sub-check { width: 13px; height: 13px; margin-right: 4px; vertical-align: middle; opacity: .8; }
  ul.tasks input[type=checkbox].dsa-sub-check:hover { opacity: 1; }
  /* per-problem block inside a multi-problem DSA task */
  .dsa-problem-row { margin: 6px 0; padding: 6px 8px; border-left: 2px solid rgba(20,110,180,.25); border-radius: 3px; background: rgba(20,110,180,.03); }
  .dsa-problem-row + .dsa-problem-row { margin-top: 8px; }
  .dsa-problem-line { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
  .task-text { flex: 1; transition: all .25s; }
  .task-text.done { color: var(--muted); text-decoration: line-through; opacity: .6; }
  .task-text a.done, .task-text .task-title.done { color: var(--muted); text-decoration: line-through; opacity: .55; }

  /* compact Topics row */
  .topic-row { display: inline-block; }
  .topic-row > summary { cursor: pointer; list-style: none; display: inline-flex; align-items: center; gap: 6px; padding: 0; }
  .topic-row > summary::-webkit-details-marker { display: none; }
  .topic-row > summary::before { content: "▸"; color: var(--muted); font-size: 10px; transition: transform .15s; display: inline-block; }
  .topic-row[open] > summary::before { transform: rotate(90deg); }
  .topic-tag { background: rgba(192,132,252,.16); color: var(--accent-3); }
  .topic-headline { color: var(--fg); font-size: 12.5px; }
  .topic-meta { color: var(--muted); font-size: 11px; }
  .topic-grid { margin-top: 6px; padding: 6px 10px; background: rgba(192,132,252,.04); border-left: 2px solid rgba(192,132,252,.4); border-radius: 4px; display: grid; grid-template-columns: 60px 1fr; gap: 4px 14px; }
  .topic-cell { font-size: 11.5px; line-height: 1.45; }
  .topic-key { color: var(--accent-3); font-weight: 700; margin-right: 6px; min-width: 32px; display: inline-block; }
  .topic-val { color: var(--fg); }
  .topic-task { margin-top: 6px; font-size: 11.5px; color: var(--ok); padding: 4px 10px; background: rgba(74,222,128,.06); border-left: 2px solid var(--ok); border-radius: 4px; }
  .topic-task b { color: var(--ok); }
  .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 99px; margin-left: 6px; vertical-align: middle; letter-spacing: .03em; }
  .b-E { background: rgba(96,165,250,.18); color: var(--easy); }
  .b-M { background: rgba(251,191,36,.18); color: var(--med); }
  .b-H { background: rgba(248,113,113,.18); color: var(--hard); }
  .b-P { background: rgba(138,147,163,.18); color: var(--muted); }
  .links { display: inline-flex; gap: 6px; margin-left: 8px; flex-wrap: wrap; }
  .links a { font-size: 11px; padding: 2px 9px; border: 1px solid var(--line); border-radius: 99px; color: var(--muted); background: var(--panel-2); transition: all .2s; }
  .links a:hover { color: var(--accent); border-color: var(--accent); text-decoration: none; transform: translateY(-1px); }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 99px; margin-right: 8px; font-weight: 700; letter-spacing: .04em; }
  .t-DSA { background: rgba(20,110,180,.22); color: var(--accent-2); }
  .t-SD  { background: rgba(255,153,0,.20); color: var(--accent); }
  .t-LP  { background: rgba(74,222,128,.18); color: var(--ok); }
  .t-BE  { background: rgba(168,85,247,.20); color: #c084fc; }
  .t-LX  { background: rgba(251,191,36,.18); color: var(--warn); }
  .t-MK  { background: rgba(248,113,113,.20); color: var(--hard); }
  .t-PY  { background: rgba(96,165,250,.18); color: var(--easy); }
  .t-REV { background: rgba(138,147,163,.18); color: var(--muted); }
  .t-LAB { background: rgba(251,191,36,.20); color: var(--warn); }

  /* ───── phase banner ───── */
  .phase-banner { padding: 12px 16px; background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%); border-left: 4px solid var(--accent); margin: 18px 0 10px; border-radius: 8px; font-size: 13px; box-shadow: 0 4px 12px rgba(0,0,0,.2); }
  .phase-banner b { color: var(--accent); letter-spacing: .04em; }

  /* ───── panels (resources / grind / lp tabs) ───── */
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 18px; margin-bottom: 14px; }
  .panel h2 { margin: 0 0 12px; font-size: 16px; color: var(--accent); }
  .panel h3 { margin: 14px 0 6px; font-size: 13px; color: var(--fg); border-bottom: 1px solid var(--line); padding-bottom: 5px; letter-spacing: .03em; }
  .panel ul { padding-left: 18px; margin: 4px 0; }
  .panel li { padding: 2px 0; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 28px; }
  @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }

  details { margin: 4px 0; }
  details summary { cursor: pointer; padding: 4px 0; color: var(--muted); }
  details summary:hover { color: var(--fg); }
  details[open] summary { color: var(--fg); }
  .lp-card { background: var(--panel-2); border-radius: 8px; padding: 12px 16px; margin: 10px 0; border-left: 3px solid var(--ok); }
  .lp-card h4 { margin: 0 0 6px; color: var(--ok); font-size: 14px; }
  .lp-card .red { color: var(--hard); font-size: 12px; }

  .hidden { display: none !important; }

  /* ───── celebration toast ───── */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(120px); background: var(--grad-1); color: #000; padding: 14px 22px; border-radius: 99px; font-weight: 700; box-shadow: 0 12px 36px rgba(255,153,0,.6); z-index: 100; transition: transform .4s cubic-bezier(.22,1.4,.36,1); pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ───── confetti ───── */
  canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 99; }

  /* ───── controls (search/import/export/theme) ───── */
  .controls { display:flex; align-items:center; gap:8px; flex-wrap:wrap; margin-top: 10px; }
  .controls input[type=text] { background: var(--panel-2); border: 1px solid var(--line); color: var(--fg); padding: 7px 12px; border-radius: 99px; font-size: 12px; min-width: 220px; outline: none; transition: all .2s; }
  .controls input[type=text]:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(255,153,0,.15); }
  .controls button.icon { background: var(--panel-2); color: var(--fg); border: 1px solid var(--line); padding: 6px 12px; border-radius: 99px; cursor: pointer; font-size: 12px; transition: all .2s; }
  .controls button.icon:hover { border-color: var(--accent); color: var(--accent); transform: translateY(-1px); }
  .controls button.primary { background: var(--grad-1); color: #000; border: 0; font-weight: 700; box-shadow: 0 4px 12px rgba(255,153,0,.4); }
  .controls button.primary:hover { transform: translateY(-1px); }

  /* ───── search results ───── */
  .search-results { position: absolute; top: 100%; left: 20px; right: 20px; background: var(--panel); border: 1px solid var(--line); border-radius: 10px; max-height: 360px; overflow-y: auto; z-index: 20; box-shadow: 0 12px 36px rgba(0,0,0,.4); display: none; margin-top: 8px; }
  .search-results.show { display: block; }
  .search-results .hit { padding: 10px 14px; border-bottom: 1px solid var(--line); cursor: pointer; }
  .search-results .hit:hover { background: var(--panel-2); }
  .search-results .hit:last-child { border: 0; }
  .search-results .hit .meta { color: var(--muted); font-size: 11px; }

  /* ───── timer ───── */
  .timer-btn { background: var(--panel-2); border: 1px solid var(--line); color: var(--muted); padding: 3px 10px; border-radius: 99px; cursor: pointer; font-size: 11px; margin-left: 8px; transition: all .2s; }
  .timer-btn:hover { color: var(--accent); border-color: var(--accent); }
  .timer-btn.running { background: var(--grad-1); color: #000; border-color: transparent; font-weight: 700; }
  .timer-btn.done { background: var(--ok); color: #000; border-color: transparent; }

  /* ───── achievements ───── */
  .achievements-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); gap: 10px; }
  .achv { background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px; padding: 14px; text-align: center; transition: all .25s; opacity: .42; filter: grayscale(.7); }
  .achv.earned { opacity: 1; filter: none; border-color: rgba(255,153,0,.4); box-shadow: 0 4px 18px rgba(255,153,0,.18); background: linear-gradient(135deg, var(--panel-2) 0%, rgba(255,153,0,.06) 100%); }
  .achv .ico { font-size: 32px; margin-bottom: 6px; }
  .achv .name { font-weight: 700; font-size: 13px; color: var(--fg); }
  .achv .desc { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* ───── modal ───── */
  .modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.78); -webkit-backdrop-filter: blur(6px); backdrop-filter: blur(6px); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
  .modal-bg.show { display: flex; animation: fadeIn .2s; }
  @keyframes fadeIn { from { opacity:0 } to { opacity:1 } }
  .modal { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; max-width: 600px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 24px; box-shadow: 0 20px 60px rgba(0,0,0,.5); }
  .modal h2 { margin: 0 0 12px; color: var(--accent); font-size: 22px; }
  @supports ((-webkit-background-clip: text) or (background-clip: text)) {
    .modal h2 { background: var(--grad-1); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; color: transparent; }
  }
  .modal .close { float: right; background: none; border: 0; color: var(--muted); cursor: pointer; font-size: 22px; line-height: 1; }
  .modal .close:hover { color: var(--accent); }

  /* ───── note field ───── */
  .note-input { display: block; width: 100%; margin-top: 4px; padding: 5px 8px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px; color: var(--fg); font-size: 11px; font-family: inherit; resize: vertical; min-height: 22px; max-height: 100px; outline: none; }
  .note-input:focus { border-color: var(--accent); }
  .note-toggle { color: var(--muted); cursor: pointer; font-size: 11px; margin-left: 6px; user-select: none; }
  .note-toggle:hover { color: var(--accent); }
  .note-toggle.has-note { color: var(--warn); }

  /* ───── mistake log ───── */
  .mistake-row { padding: 10px 14px; border-bottom: 1px solid var(--line); display: flex; gap: 10px; align-items: flex-start; }
  .mistake-row:last-child { border: 0; }
  .mistake-row .due { padding: 3px 9px; border-radius: 99px; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .mistake-row .due.overdue { background: rgba(248,113,113,.2); color: var(--hard); }
  .mistake-row .due.upcoming { background: rgba(251,191,36,.2); color: var(--warn); }
  .mistake-row .due.future { background: var(--panel-2); color: var(--muted); }
  .mistake-row .body { flex: 1; }
  .mistake-row .body .name { font-weight: 600; }
  .mistake-row .body .note { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .mistake-row .actions { display: flex; gap: 6px; }
  .mistake-row .actions button { background: var(--panel-2); border: 1px solid var(--line); color: var(--fg); padding: 4px 10px; border-radius: 99px; font-size: 11px; cursor: pointer; }
  .mistake-row .actions button:hover { border-color: var(--accent); color: var(--accent); }

  /* ───── view mode pills ───── */
  .view-mode { display: inline-flex; background: var(--panel-2); border: 1px solid var(--line); border-radius: 99px; padding: 3px; gap: 2px; }
  .view-mode button { background: transparent; border: 0; color: var(--muted); padding: 4px 14px; border-radius: 99px; cursor: pointer; font-size: 11px; }
  .view-mode button.active { background: var(--grad-1); color: #000; font-weight: 700; }

  /* ───── shortcut hint ───── */
  .kbd { display: inline-block; padding: 2px 6px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px; font-size: 10px; font-family: ui-monospace, "SF Mono", monospace; color: var(--muted); }

  /* ───── grind filter chips ───── */
  .grind-filters { margin: 12px 0 18px; padding: 12px 14px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; }
  .grind-filter-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin: 6px 0; }
  .grind-filter-label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .06em; text-transform: uppercase; min-width: 70px; }
  .grind-chip { background: transparent; border: 1px solid var(--line); color: var(--muted); padding: 4px 10px; border-radius: 99px; font-size: 11.5px; cursor: pointer; transition: all .15s; display: inline-flex; align-items: center; gap: 6px; }
  .grind-chip:hover { color: var(--fg); border-color: var(--accent); }
  .grind-chip.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }
  .grind-chip-count { font-size: 10px; opacity: .7; font-weight: 500; }
  .grind-chip.active .grind-chip-count { opacity: .8; color: #000; }
  .grind-chip-clear { color: var(--hard) !important; border-color: rgba(248,113,113,.3) !important; margin-left: auto; }
  .grind-chip-clear:hover { color: var(--hard) !important; border-color: var(--hard) !important; background: rgba(248,113,113,.06); }
  .grind-search { flex: 1; background: var(--bg-2); border: 1px solid var(--line); color: var(--fg); padding: 6px 12px; border-radius: 6px; font-size: 12px; outline: none; min-width: 200px; }
  .grind-search:focus { border-color: var(--accent); }
  .grind-count { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .grind-topic { display: inline-block; font-size: 10px; color: var(--muted); background: rgba(192,132,252,.08); border: 1px solid rgba(192,132,252,.2); padding: 1px 7px; border-radius: 99px; margin-left: 8px; vertical-align: middle; }

  /* ───── concept chips ───── */
  .concepts { display: inline-flex; gap: 4px; margin-left: 8px; flex-wrap: wrap; }
  .concept-chip {
    font-size: 10px; padding: 1px 8px; border-radius: 99px;
    background: rgba(192,132,252,.12); color: var(--accent-3);
    border: 1px solid rgba(192,132,252,.3);
    cursor: pointer; transition: all .15s; white-space: nowrap;
  }
  .concept-chip:hover { background: rgba(192,132,252,.22); border-color: var(--accent-3); transform: translateY(-1px); }
  .concept-chip::before { content:"🧠 "; }

  /* ───── per-DSA-problem interview prep card ───── */
  .prep-card {
    background: rgba(20,110,180,.05);
    border: 1px solid rgba(20,110,180,.25);
    border-left: 3px solid var(--accent-2);
    border-radius: 6px;
    padding: 10px 14px;
    margin-top: 8px;
    font-size: 12px;
    line-height: 1.55;
  }
  .prep-card .row { display: grid; grid-template-columns: 110px 1fr; gap: 8px; padding: 4px 0; align-items: start; }
  .prep-card .row + .row { border-top: 1px dashed rgba(20,110,180,.18); }
  .prep-card .label {
    color: var(--accent-2);
    font-weight: 700;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: .07em;
  }
  .prep-card .label.pattern  { color: var(--accent-3); }
  .prep-card .label.insight  { color: var(--accent); }
  .prep-card .label.complex  { color: var(--ok); }
  .prep-card .label.followup { color: var(--med); }
  .prep-card .label.clarify  { color: var(--easy); }
  .prep-card .label.edges    { color: var(--hard); }
  .prep-card .val { color: var(--fg); }
  .prep-card .val ul { margin: 0; padding-left: 16px; }
  .prep-card .val li { padding: 1px 0; }
  .prep-card code { background: var(--bg); padding: 1px 5px; border-radius: 3px; font-family: ui-monospace, monospace; font-size: 11px; color: var(--accent); }
  .prep-toggle {
    display: inline-block; cursor: pointer; user-select: none;
    color: var(--accent-2); font-size: 11px; font-weight: 600; margin-top: 6px;
    padding: 2px 9px; border: 1px solid var(--line); border-radius: 99px; background: var(--panel-2);
  }
  .prep-toggle:hover { color: var(--accent); border-color: var(--accent); }

  .dsa-extras { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 6px; align-items: center; font-size: 11px; }
  .why-toggle { color: var(--muted); cursor: pointer; user-select: none; padding: 2px 8px; border-radius: 99px; border: 1px solid var(--line); background: var(--panel-2); }
  .why-toggle:hover { color: var(--accent); border-color: var(--accent); }
  .why-text { display: none; flex-basis: 100%; padding: 6px 10px; background: rgba(20,110,180,.08); border-left: 3px solid var(--accent-2); border-radius: 4px; color: var(--fg); font-size: 12px; line-height: 1.45; }
  .why-text.open { display: block; }
  .why-text b { color: var(--accent-2); }
  .ttimer { display: inline-flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 99px; border: 1px solid var(--line); background: var(--panel-2); cursor: pointer; user-select: none; color: var(--muted); font-family: ui-monospace, monospace; font-size: 11px; }
  .ttimer:hover { color: var(--accent); border-color: var(--accent); }
  .ttimer.running { color: #000; background: var(--grad-1); border-color: transparent; font-weight: 700; }
  .ttimer.logged { color: var(--accent-3); border-color: rgba(192,132,252,.4); background: rgba(192,132,252,.08); }

  /* ───── standup card ───── */
  .standup {
    background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%);
    border: 1px solid var(--line); border-left: 4px solid var(--accent);
    border-radius: 10px; padding: 16px 20px; margin-bottom: 14px;
    box-shadow: 0 4px 18px rgba(0,0,0,.18);
  }
  .standup h3 { margin: 0 0 6px; font-size: 13px; color: var(--accent); text-transform: uppercase; letter-spacing: .08em; }
  .standup .focus { font-size: 16px; font-weight: 700; line-height: 1.4; margin: 6px 0; }
  .standup .focus .day { color: var(--muted); font-weight: 600; }
  .standup .refresh { color: var(--muted); font-size: 13px; margin-top: 6px; }
  .standup .refresh b { color: var(--accent-3); cursor: pointer; }
  .standup .refresh b:hover { text-decoration: underline; }
  .standup .meta-row { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; font-size: 12px; color: var(--muted); }
  .standup .meta-row b { color: var(--fg); }

  /* ───── concept browser tab cards ───── */
  .concept-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 10px; }
  .concept-card { background: var(--panel-2); border: 1px solid var(--line); border-left: 3px solid var(--accent-3); border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: all .2s; }
  .concept-card:hover { border-left-color: var(--accent); transform: translateY(-2px); box-shadow: 0 6px 18px rgba(0,0,0,.25); }
  .concept-card h4 { margin: 0 0 4px; font-size: 13px; color: var(--accent-3); }
  .concept-card p { margin: 0; font-size: 12px; color: var(--muted); line-height: 1.45; }
  .concept-modal-section { margin: 12px 0; }
  .concept-modal-section h5 { margin: 0 0 6px; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .concept-modal-section ul { margin: 4px 0 0; padding-left: 18px; }
  .concept-modal-section li { padding: 2px 0; font-size: 13px; }
  .related-chips { display: flex; flex-wrap: wrap; gap: 6px; }

  /* ───── concept modal: code & animation ───── */
  pre.code-block {
    background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px;
    padding: 12px 14px; margin: 4px 0 0; overflow-x: auto;
    font: 12px/1.55 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    color: var(--fg);
  }
  pre.code-block .kw { color: #c084fc; }
  pre.code-block .fn { color: #60a5fa; }
  pre.code-block .str { color: #4ade80; }
  pre.code-block .num { color: #fbbf24; }
  pre.code-block .com { color: var(--muted); font-style: italic; }

  .anim-box {
    background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px;
    padding: 12px; margin-top: 4px; min-height: 110px;
    position: relative; overflow: hidden;
  }
  .anim-controls { display: flex; gap: 6px; margin-bottom: 8px; align-items: center; }
  .anim-controls button {
    background: var(--panel-2); color: var(--fg); border: 1px solid var(--line);
    padding: 4px 12px; border-radius: 99px; font-size: 11px; cursor: pointer;
  }
  .anim-controls button:hover { border-color: var(--accent); color: var(--accent); }
  .anim-controls .step-info { color: var(--muted); font-size: 11px; margin-left: auto; font-family: ui-monospace, monospace; }
  .anim-cells { display: flex; gap: 4px; justify-content: center; flex-wrap: wrap; }
  .anim-cell {
    min-width: 32px; height: 36px; border: 2px solid var(--line);
    border-radius: 4px; display: flex; align-items: center; justify-content: center;
    font-family: ui-monospace, monospace; font-size: 13px; font-weight: 600;
    background: var(--panel); color: var(--fg);
    transition: all .35s cubic-bezier(.22,1,.36,1);
    position: relative;
  }
  .anim-cell.in-window { border-color: var(--accent); background: rgba(255,153,0,.15); }
  .anim-cell.cur { border-color: var(--accent-3); background: rgba(192,132,252,.2); }
  .anim-cell.match { border-color: var(--ok); background: rgba(74,222,128,.18); }
  .anim-cell.dim { opacity: .35; }
  .anim-cell .ptr { position: absolute; top: -16px; font-size: 10px; color: var(--accent); font-weight: 800; }
  .anim-cell .ptr.r { color: var(--accent-2); }
  .anim-cell .ptr.l { color: var(--accent); }
  .anim-cell .ptr.s { color: var(--accent-3); }
  .anim-cell .ptr.f { color: var(--hard); }
  .anim-narration {
    color: var(--fg);
    font-size: 13px;
    margin-top: 12px;
    min-height: 40px;
    line-height: 1.55;
    text-align: left;
    background: rgba(192,132,252,.08);
    border-left: 3px solid var(--accent-3);
    padding: 10px 14px;
    border-radius: 4px;
  }
  .anim-narration code, .anim-narration b { font-family: ui-monospace, "SF Mono", Consolas, monospace; background: var(--bg); padding: 1px 5px; border-radius: 3px; font-size: 12px; font-weight: 600; color: var(--accent); }
  .anim-narration .step-num { display: inline-block; min-width: 22px; height: 22px; line-height: 22px; text-align: center; background: var(--accent-3); color: #000; border-radius: 99px; font-weight: 700; font-size: 11px; margin-right: 8px; vertical-align: middle; }

  /* ───── calendar (month grid) ───── */
  .heatmap-tabs { display: inline-flex; gap: 2px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 99px; padding: 3px; margin-left: auto; }
  .heatmap-tabs button { background: transparent; border: 0; color: var(--muted); padding: 4px 12px; border-radius: 99px; cursor: pointer; font-size: 11px; }
  .heatmap-tabs button.active { background: var(--grad-1); color: #000; font-weight: 700; }
  .grid-wrap header.row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .grid-wrap header.row h3 { margin: 0; flex: 1; }
  .calendar-month { margin-bottom: 18px; }
  .calendar-month h4 { margin: 6px 0 8px; font-size: 13px; color: var(--fg); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-grid .dow { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; text-align: center; padding: 4px 0; }
  .cal-cell { aspect-ratio: 1/1; min-height: 44px; background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 11px; color: var(--muted); padding: 2px; transition: all .2s; cursor: default; }
  .cal-cell.has-day { cursor: pointer; }
  .cal-cell.has-day:hover { transform: scale(1.04); border-color: var(--accent); z-index: 2; }
  .cal-cell .date-num { font-size: 13px; font-weight: 700; color: var(--fg); }
  .cal-cell .day-label { font-size: 9px; color: var(--muted); }
  .cal-cell.p25 { background: rgba(255,153,0,.18); border-color: rgba(255,153,0,.35); }
  .cal-cell.p50 { background: rgba(255,153,0,.40); border-color: rgba(255,153,0,.6); }
  .cal-cell.p75 { background: rgba(255,153,0,.62); border-color: rgba(255,153,0,.8); }
  .cal-cell.p100 { background: var(--grad-1); border-color: transparent; box-shadow: 0 0 10px rgba(255,153,0,.6); }
  .cal-cell.p100 .date-num, .cal-cell.p100 .day-label { color: #000; }
  .cal-cell.today { outline: 2px solid var(--accent-3); outline-offset: 2px; animation: pulse 2s ease-in-out infinite; }
  .cal-cell.dim { opacity: .35; }

  /* ───── charts ───── */
  .charts { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-top: 12px; }
  @media (max-width: 720px) { .charts { grid-template-columns: 1fr; } }
  .chart-box { background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 12px; }
  .chart-box h4 { margin: 0 0 8px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
  .jars { display: flex; align-items: flex-end; gap: 10px; height: 130px; padding-top: 18px; padding-bottom: 18px; }
  .jar { flex: 1; height: 100%; background: var(--panel); border: 2px solid var(--accent-2); border-radius: 4px 4px 10px 10px; position: relative; overflow: hidden; box-shadow: inset 0 0 0 1px rgba(255,255,255,.04); }
  .jar .water {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: var(--accent-2);
    transition: height .8s cubic-bezier(.22,1,.36,1);
    box-shadow: 0 -2px 10px rgba(20,110,180,.4) inset;
  }
  .jar .water::before, .jar .water::after {
    content: ""; position: absolute; left: -10%; right: -10%;
    height: 12px; top: -6px;
    background: var(--accent-2);
    border-radius: 50%;
    animation: wave 3.5s ease-in-out infinite;
  }
  .jar .water::after { animation-duration: 5s; animation-delay: -1.2s; opacity: .55; }
  @keyframes wave {
    0%,100% { transform: translateX(-4%); }
    50%     { transform: translateX( 4%); }
  }
  .jar.full { border-color: var(--ok); }
  .jar.full .water, .jar.full .water::before, .jar.full .water::after { background: var(--ok); }
  .jar .v { position: absolute; top: -16px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--fg); font-weight: 700; }
  .jar .lbl { position: absolute; bottom: -16px; left: 50%; transform: translateX(-50%); font-size: 10px; color: var(--muted); font-weight: 600; }
  .pie { width: 100%; aspect-ratio: 1/1; max-width: 140px; margin: 0 auto; display: block; }
  .pie .pie-hole  { fill: var(--panel-2); }
  .pie .pie-num   { fill: var(--fg);    font-size: 0.32px; font-weight: 700; }
  .pie .pie-label { fill: var(--muted); font-size: 0.14px; }
  .pie-legend { display: flex; flex-direction: column; gap: 3px; font-size: 11px; margin-top: 8px; }
  .pie-legend .row { display: flex; align-items: center; gap: 6px; }
  .pie-legend .swatch { width: 10px; height: 10px; border-radius: 2px; }

  /* ───── focus rings (a11y) ───── */
  /* Hide default focus outline only for pointer users, keep for keyboard */
  button:focus:not(:focus-visible), a:focus:not(:focus-visible), input:focus:not(:focus-visible) { outline: 0; }
  *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }
  button:focus-visible, a:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }

  /* ───── profile name field ───── */
  .profile-name { background: transparent; border: 0; color: var(--fg); font-size: 12px; font-weight: 600; padding: 2px 6px; border-radius: 4px; outline: none; max-width: 140px; }
  .profile-name:hover, .profile-name:focus { background: var(--panel-2); }

  /* ───── mobile ───── */
  @media (max-width: 720px) {
    header { padding: 10px 12px; }
    header h1 { font-size: 16px; }
    main { padding: 12px; }
    .top-row { flex-direction: column; align-items: stretch; gap: 10px; }
    .stats { gap: 6px; }
    .stats .pill { padding: 3px 8px; font-size: 11px; }
    .tabs { width: 100%; overflow-x: auto; flex-wrap: nowrap; -webkit-overflow-scrolling: touch; padding-bottom: 4px; }
    .tabs button { flex-shrink: 0; padding: 8px 14px; }
    .controls { gap: 6px; }
    .controls input[type=text] { min-width: 0; flex: 1; }
    .controls .kbd { display: none; }
    nav.weeks { overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
    nav.weeks button { flex-shrink: 0; padding: 8px 14px; }
    .day-head { padding: 14px 14px; }
    ul.tasks input[type=checkbox] { width: 22px; height: 22px; margin-top: 1px; }
    .timer-btn, .links a, .badge, .tag { padding: 4px 10px; }
    .grid-60 { grid-template-columns: repeat(10, 1fr); }
  }

  /* ───── print ───── */
  @media print {
    body::before, header, .controls, nav.weeks, .tabs, #toast, #confetti, .modal-bg, .heatmap-tabs, .timer-btn, .note-toggle, .note-input, label[data-noteid], .resume, #resume, #search, #search-results { display: none !important; }
    body { background: #fff; color: #000; }
    .day { page-break-inside: avoid; border: 1px solid #ccc; box-shadow: none; }
    .day-body { display: block !important; border-top: 1px solid #ddd; }
    .panel, .grid-wrap { border: 1px solid #ccc; box-shadow: none; }
    .quote, .phase-banner { box-shadow: none; }
    a { color: #1d4ed8; text-decoration: underline; }
    .day.completed::after { display: none; }
    .day.completed { background: #f5fffa !important; border-color: #aaa !important; }
    h1 { color: #000 !important; -webkit-text-fill-color: #000 !important; }
    /* cheat-sheet print mode hides everything except cheat sheets */
    body.print-cheats > main > section:not(#view-cheats) { display: none !important; }
    body.print-cheats #view-cheats { display: block !important; }
    body.print-cheats .cheat-page { page-break-after: always; }
  }

  /* ───── cheat sheets (screen + print) ───── */
  .cheat-page {
    background: var(--panel); border: 1px solid var(--line); border-radius: 10px;
    padding: 18px 22px; margin-bottom: 14px; max-width: 800px; margin-left: auto; margin-right: auto;
  }
  .cheat-page h2 { margin: 0 0 6px; font-size: 18px; color: var(--accent); }
  .cheat-page .sub { color: var(--muted); font-size: 12px; margin-bottom: 12px; }
  .cheat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 700px) { .cheat-grid { grid-template-columns: 1fr; } }
  .cheat-block { background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; padding: 10px 12px; }
  .cheat-block h4 { margin: 0 0 6px; font-size: 13px; color: var(--accent-3); }
  .cheat-block p { margin: 4px 0; font-size: 12px; line-height: 1.45; }
  .cheat-block ul { padding-left: 16px; margin: 4px 0; font-size: 12px; line-height: 1.5; }
  .cheat-block code { font-family: ui-monospace, monospace; font-size: 11px; background: var(--bg); padding: 1px 4px; border-radius: 3px; }
  .cheat-actions { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }

  /* ───── revisit-rate progress chart ───── */
  .revisit-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 12px 0; }
  .revisit-stats .stat { background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 14px; text-align: center; }
  .revisit-stats .stat .num { font-size: 28px; font-weight: 800; color: var(--accent); }
  .revisit-stats .stat .lbl { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
  .revisit-stats .stat.green .num { color: var(--ok); }
  .revisit-stats .stat.red .num { color: var(--hard); }

  /* ───── system design tab ───── */
  .sd-subtabs { display: inline-flex; background: var(--panel-2); border: 1px solid var(--line); border-radius: 99px; padding: 3px; margin-bottom: 14px; gap: 2px; }
  .sd-subtabs button { background: transparent; border: 0; color: var(--muted); padding: 6px 16px; border-radius: 99px; cursor: pointer; font-size: 12px; font-weight: 600; }
  .sd-subtabs button.active { background: var(--grad-1); color: #000; }
  .sd-card-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .sd-card {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px;
    cursor: pointer; transition: all .2s; border-left: 3px solid var(--accent-2);
  }
  .sd-card:hover { transform: translateY(-2px); border-left-color: var(--accent); box-shadow: 0 6px 18px rgba(0,0,0,.25); }
  .sd-card .fam { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .sd-card h4 { margin: 4px 0 6px; color: var(--accent-2); font-size: 14px; }
  .sd-card p { margin: 0; font-size: 12px; color: var(--muted); line-height: 1.5; }
  .sd-card .diff { font-size: 10px; padding: 2px 8px; border-radius: 99px; background: rgba(255,153,0,.15); color: var(--accent); margin-left: 6px; }
  .sd-card .diff.hard { background: rgba(248,113,113,.15); color: var(--hard); }

  /* ───── SD modal sections ───── */
  .sd-modal-section { margin: 14px 0; }
  .sd-modal-section h4 { margin: 0 0 8px; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; padding-bottom: 4px; border-bottom: 1px solid var(--line); }
  .sd-modal-section ul { padding-left: 18px; margin: 4px 0; font-size: 13px; line-height: 1.55; }
  .sd-modal-section li { padding: 2px 0; }
  .sd-modal-section li code { background: var(--bg); padding: 1px 5px; border-radius: 3px; font-family: ui-monospace, monospace; font-size: 11px; color: var(--accent); }
  .sd-modal-section p { margin: 6px 0; font-size: 13px; line-height: 1.6; }
  .sd-tradeoff-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-top: 4px; }
  .sd-tradeoff-table th { text-align: left; padding: 8px 6px; color: var(--muted); border-bottom: 1px solid var(--line); font-weight: 600; }
  .sd-tradeoff-table td { padding: 8px 6px; border-bottom: 1px solid var(--line); vertical-align: top; }
  .sd-tradeoff-table td:first-child, .sd-tradeoff-table td:nth-child(2) { font-weight: 600; color: var(--fg); white-space: nowrap; }
  .sd-tradeoff-table td:nth-child(2) { color: var(--accent-3); }
  .sd-pitfall { background: rgba(248,113,113,.06); border-left: 3px solid var(--hard); padding: 6px 12px; margin: 4px 0; font-size: 12px; line-height: 1.5; border-radius: 3px; }
  .sd-pitfall::before { content: "⚠️ "; }
  .sd-example { background: rgba(74,222,128,.06); border-left: 3px solid var(--ok); padding: 10px 14px; margin: 4px 0; font-size: 13px; line-height: 1.6; border-radius: 4px; }
  .sd-example b { color: var(--ok); }
  .sd-diagram { background: var(--bg-2); border: 1px solid var(--line); border-radius: 6px; padding: 18px 14px; margin: 6px 0; text-align: center; overflow-x: auto; }
  .sd-diagram svg { max-width: 100%; height: auto; }
  .sd-diagram pre { font-family: ui-monospace, "SF Mono", Consolas, monospace; font-size: 11px; line-height: 1.4; color: var(--fg); margin: 0; text-align: left; display: inline-block; white-space: pre; }
  .sd-api-row { font-family: ui-monospace, monospace; font-size: 12px; padding: 6px 10px; border-bottom: 1px dashed var(--line); display: grid; grid-template-columns: 60px 1fr; gap: 12px; }
  .sd-api-row:last-child { border: 0; }
  .sd-api-method { font-weight: 700; padding: 2px 8px; border-radius: 4px; text-align: center; height: fit-content; }
  .sd-api-method.GET { background: rgba(74,222,128,.18); color: var(--ok); }
  .sd-api-method.POST { background: rgba(255,153,0,.18); color: var(--accent); }
  .sd-api-method.PUT { background: rgba(96,165,250,.18); color: var(--easy); }
  .sd-api-method.DELETE { background: rgba(248,113,113,.18); color: var(--hard); }
  .sd-api-method.PATCH { background: rgba(192,132,252,.18); color: var(--accent-3); }
  .sd-followups { color: var(--muted); font-size: 12px; line-height: 1.55; }
  .sd-followups li::marker { content: "→ "; color: var(--accent); }
  .sd-key-pts { background: rgba(255,153,0,.06); border: 1px solid rgba(255,153,0,.25); border-radius: 6px; padding: 10px 14px; margin: 6px 0; }
  .sd-key-pts ul { padding-left: 18px; margin: 0; }
  .sd-key-pts li { padding: 2px 0; font-size: 13px; }
  .sd-key-pts li b { color: var(--accent); }

  /* ───── backend project guide ───── */
  .be-project-card {
    background: var(--panel-2); border: 1px solid var(--line); border-radius: 10px;
    padding: 16px 18px; margin-bottom: 14px; border-left: 3px solid #c084fc;
    cursor: pointer; transition: all .2s;
  }
  .be-project-card:hover { transform: translateY(-2px); border-left-color: var(--accent); box-shadow: 0 6px 18px rgba(0,0,0,.22); }
  .be-project-card h4 { margin: 0 0 4px; font-size: 16px; color: #c084fc; }
  .be-project-card .stack { font-size: 11px; color: var(--muted); font-family: ui-monospace, monospace; margin-top: 4px; }
  .be-project-card .meta { font-size: 11px; color: var(--accent); margin-top: 6px; }
  .be-step { background: var(--panel-2); border: 1px solid var(--line); border-radius: 6px; padding: 8px 12px; margin: 6px 0; }
  .be-step summary { cursor: pointer; font-weight: 600; color: var(--fg); list-style: none; }
  .be-step summary::-webkit-details-marker { display: none; }
  .be-step summary::before { content: "▶ "; color: var(--accent); margin-right: 6px; transition: transform .2s; display: inline-block; }
  .be-step[open] summary::before { transform: rotate(90deg); }

     Activated by adding `class="sleek"` to <body> via the 🌙 Sleek toggle

/* ──────────────────────────────────────────────────────────────────────
   CARD MODE — kanban-style. Each day's slots become horizontal columns,
   tasks become cards. Open a day to see the board.
   ────────────────────────────────────────────────────────────────────── */
body.mode-card .day { border-radius: 10px !important; }
body.mode-card .day-body { padding: 14px 18px 18px !important; }
/* The day-body wraps multiple .block divs (one per slot). Lay them
   horizontally with horizontal scroll on overflow. */
body.mode-card .day.open .day-body {
  display: grid !important;
  grid-auto-flow: column !important;
  grid-auto-columns: minmax(280px, 1fr) !important;
  gap: 12px !important;
  overflow-x: auto !important;
  padding-bottom: 18px !important;
  scrollbar-width: thin;
}
body.mode-card .day.open .day-body::-webkit-scrollbar { height: 8px; }
body.mode-card .day.open .day-body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }
/* Each .block becomes a kanban column */
body.mode-card .block {
  background: var(--panel-2) !important;
  border: 1px solid var(--line) !important;
  border-radius: 8px !important;
  padding: 12px 10px 10px !important;
  margin: 0 !important;
  display: flex;
  flex-direction: column;
  min-width: 0;
}
body.mode-card .block-head {
  font-size: 11px !important;
  letter-spacing: .08em !important;
  margin-bottom: 10px !important;

  color: var(--accent) !important;
  text-transform: uppercase;

  align-items: center;
  gap: 6px;
  flex-wrap: wrap;

body.mode-card .timer-btn { font-size: 10px !important; padding: 2px 8px !important; }
/* Tasks become cards (one per UL li) */
body.mode-card ul.tasks {
  display: flex !important;
  flex-direction: column !important;
  gap: 8px !important;
  padding: 0 !important;
  margin: 0 !important;
  flex: 1;
}
body.mode-card ul.tasks li {
  background: var(--panel) !important;
  border: 1px solid var(--line) !important;
  border-radius: 6px !important;
  padding: 10px 12px !important;

  list-style: none !important;

  gap: 10px;
  align-items: flex-start;

body.mode-card ul.tasks li:has(.tag.t-MK)  { border-left-color: var(--hard) !important; }

/* ───── sleek mode: width + 2-col grid for tasks ───── */
body.sleek main { max-width: 1180px !important; padding: 28px 36px 100px !important; }

/* DSA tasks: 2-column grid for tighter packing. Each li becomes a card. */
body.sleek ul.tasks {
  display: grid !important;
  grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)) !important;
  gap: 4px 18px !important;
}
body.sleek ul.tasks > li.full-width { grid-column: 1 / -1; }
/* Expanded rows take the full row so the prep card / why text doesn't crush */
body.sleek ul.tasks > li.expanded { grid-column: 1 / -1; }
@media (max-width: 720px){
  body.sleek ul.tasks { grid-template-columns: 1fr !important; }
}

/* ───── sleek mode: collapse rich-row widgets until row is expanded ─────
   Goal: row shows only its primary label (problem name / concept name /
   project step / lab name) + checkbox + tag. Click → row gets `.expanded`
   → all extras (why text, summary, links, prep card, timer, note UI)
   reveal.
   This applies to: DSA tasks, SDC (system-design concept), SDP (SD problem
   walk-through), LPC (LP card), BEC/BEP (backend concept/project), LXC/LXL
   (linux concept/lab), MKP (mock prep). REV / NOTE / plain text rows
   already render compactly so we leave them alone. */
body.sleek ul.tasks li[data-collapsible="1"] { cursor: pointer; }

/* By default, hide the 'Why today' explanation, summary, link list, sub-help
   blocks, and inner divs of the rich tasks. We selectively whitelist the
   row's label (the deep-link <a> with class .sd-deeplink and any leading
   .tag) plus the parent checkbox. */
body.sleek ul.tasks li[data-collapsible="1"] > span.task-text > * {
  display: none !important;
}
body.sleek ul.tasks li[data-collapsible="1"] > span.task-text > .tag,
body.sleek ul.tasks li[data-collapsible="1"] > span.task-text > a.sd-deeplink,
body.sleek ul.tasks li[data-collapsible="1"] > span.task-text > b,
body.sleek ul.tasks li[data-collapsible="1"] > span.task-text > .badge {
  display: inline !important;
}

/* When expanded, restore everything */
body.sleek ul.tasks li.expanded > span.task-text > * {
  display: revert !important;
}
body.sleek ul.tasks li.expanded > span.task-text > .tag,
body.sleek ul.tasks li.expanded > span.task-text > a.sd-deeplink,
body.sleek ul.tasks li.expanded > span.task-text > b,
body.sleek ul.tasks li.expanded > span.task-text > .badge { display: inline !important; }
body.sleek ul.tasks li.expanded > span.task-text > .concepts { display: inline !important; }
body.sleek ul.tasks li.expanded > span.task-text > .dsa-extras { display: flex !important; }
body.sleek ul.tasks li.expanded > span.task-text > .prep-wrap { display: block !important; }

/* DSA tasks (handled separately because their inner structure differs) */
body.sleek ul.tasks li:has(.tag.t-DSA) .concepts,
body.sleek ul.tasks li:has(.tag.t-DSA) .dsa-extras,
body.sleek ul.tasks li:has(.tag.t-DSA) .prep-wrap,
body.sleek ul.tasks li:has(.tag.t-DSA) .note-toggle,
body.sleek ul.tasks li:has(.tag.t-DSA) .note-input,
body.sleek ul.tasks li:has(.tag.t-DSA) label[data-noteid],
body.sleek ul.tasks li:has(.dsa-problem-row) .concepts,
body.sleek ul.tasks li:has(.dsa-problem-row) .dsa-extras,
body.sleek ul.tasks li:has(.dsa-problem-row) .prep-wrap,
body.sleek ul.tasks li:has(.dsa-problem-row) .note-toggle,
body.sleek ul.tasks li:has(.dsa-problem-row) .note-input,
body.sleek ul.tasks li:has(.dsa-problem-row) label[data-noteid] { display: none !important; }
body.sleek ul.tasks li.expanded:has(.tag.t-DSA) .concepts,
body.sleek ul.tasks li.expanded:has(.tag.t-DSA) .dsa-extras,
body.sleek ul.tasks li.expanded:has(.tag.t-DSA) .prep-wrap,
body.sleek ul.tasks li.expanded:has(.tag.t-DSA) .note-toggle,
body.sleek ul.tasks li.expanded:has(.dsa-problem-row) .concepts,
body.sleek ul.tasks li.expanded:has(.dsa-problem-row) .dsa-extras,
body.sleek ul.tasks li.expanded:has(.dsa-problem-row) .prep-wrap,
body.sleek ul.tasks li.expanded:has(.dsa-problem-row) .note-toggle { display: revert !important; }
body.sleek ul.tasks li.expanded:has(.tag.t-DSA) .dsa-extras,
body.sleek ul.tasks li.expanded:has(.dsa-problem-row) .dsa-extras { display: flex !important; }
body.sleek ul.tasks li.expanded:has(.tag.t-DSA) .prep-wrap,
body.sleek ul.tasks li.expanded:has(.dsa-problem-row) .prep-wrap { display: block !important; }

/* Subtle "click to expand" chevron on collapsible rows */
body.sleek ul.tasks li:has(.tag.t-DSA),
body.sleek ul.tasks li[data-collapsible="1"] { display: flex !important; gap: 8px; align-items: flex-start; padding: 8px 12px !important; border: 1px solid var(--line) !important; border-radius: 6px !important; }
/* Multi-problem rows: switch to block so the inner grid can use full width */
body.sleek ul.tasks li:has(.dsa-problem-row) { display: block !important; padding: 8px 12px !important; border: 1px solid var(--line) !important; border-radius: 6px !important; position: relative; }
body.sleek ul.tasks li:has(.dsa-problem-row) > input[type=checkbox][data-id] { float: left; margin-right: 8px; }
body.sleek ul.tasks li:has(.tag.t-DSA)::after,
body.sleek ul.tasks li[data-collapsible="1"]::after {
  content: "▸";
  display: inline-block;
  margin-left: auto;
  color: var(--dim);
  font-size: 9px;
  align-self: center;
  flex-shrink: 0;
  transition: transform .15s;
}
body.sleek ul.tasks li:has(.dsa-problem-row)::after {
  content: "▸";
  position: absolute;
  right: 10px;
  top: 12px;
  color: var(--dim);
  font-size: 9px;
  transition: transform .15s;
}
body.sleek ul.tasks li.expanded:has(.tag.t-DSA)::after,
body.sleek ul.tasks li.expanded:has(.dsa-problem-row)::after,
body.sleek ul.tasks li.expanded[data-collapsible="1"]::after {
  transform: rotate(90deg);
  color: var(--accent);
}
body.sleek ul.tasks li.expanded { background: rgba(255,153,0,.03); }
body.sleek ul.tasks li.expanded:hover { background: rgba(255,153,0,.05) !important; }
</style>
</head>

<!-- Shared prep-card helpers (PROBLEM_PREP, normalizePrepKey,
     warnMissingPrepOnce, prepLookup). Loaded as a sibling classic script so
     tracker/prep-cards-tests.html can load the same file and exercise the
     helpers in isolation. Top-level const/function declarations here are
     visible to the inline <script> below via the realm's global
     environment record. -->
<script>
/* ───── inlined from prep-cards-helpers.js (kept readable) ───── */
// ───── Per-problem prep-card helpers ─────
// Shared lookup layer for the per-problem interview-prep cards.
// Loaded by BOTH:
//   - tracker/index.html         (production renderer)
//   - tracker/prep-cards-tests.html (test harness)
// Classic script: top-level `const` bindings are visible to subsequent classic
// scripts in the same realm via the global declarative record. We additionally
// expose key symbols on `window` so the test harness's load-detection check
// (typeof window.normalizePrepKey === "function") and any console-callable
// diagnostics can find them.

// PROBLEM_PREP — keyed by canonical Grind 169 problem names; values are the
// six-field prep entry { pattern, insight, complexity, followup, clarify, edges }.
// Multi-item fields use ";" as a separator (rendered as <ul> in HTML and
// "- " lines in plain text). `complexity` follows the form
// "T: O(...) S: O(...)". Populated by content tasks (8.x).
const PROBLEM_PREP = {
  // ───── Arrays group (task 8.1) ─────
  "Two Sum": {
    pattern:    "Hash Map One-Pass — store complement → index while scanning.",
    insight:    "You only need to remember what you've seen, the answer is a single seen-before lookup.",
    complexity: "T: O(n) S: O(n)",
    followup:   "What if the array is sorted? (two-pointer, O(1) extra space); what if you need all pairs?",
    clarify:    "Exactly one solution guaranteed?; can the same index be used twice?; integer overflow on sum?",
    edges:      "Negative numbers; duplicates where target = 2*x; minimum-size array (n=2)"
  },
  "Best Time to Buy and Sell Stock": {
    pattern:    "Single-Pass Min-Tracking — track running min, profit = price minus min so far.",
    insight:    "The optimal sell day's best buy is the lowest price strictly before it, so one scan suffices.",
    complexity: "T: O(n) S: O(1)",
