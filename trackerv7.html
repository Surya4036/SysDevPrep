document.addEventListener("keydown", e => {
  // Skip when typing in inputs
  if (["INPUT","TEXTAREA"].includes(e.target.tagName)) return;
  if (e.key === "/") { e.preventDefault(); searchEl.focus(); }
  else if (e.key === "?") {
    e.preventDefault();
    showModal(`
      <button class="close" onclick="closeModal()">✕</button>
      <h2>⌨️ Keyboard Shortcuts</h2>
      <table style="width:100%;font-size:14px;line-height:2">
        <tr><td><span class="kbd">/</span></td><td>Focus search</td></tr>
        <tr><td><span class="kbd">f</span></td><td>Enter focus mode (next slot + timer)</td></tr>
        <tr><td><span class="kbd">j</span> / <span class="kbd">k</span></td><td>Next / previous day</td></tr>
        <tr><td><span class="kbd">o</span></td><td>Open / collapse current day</td></tr>
        <tr><td><span class="kbd">Space</span></td><td>Check off next unchecked task in visible day</td></tr>
        <tr><td><span class="kbd">r</span></td><td>Resume (next unfinished task)</td></tr>
        <tr><td><span class="kbd">t</span></td><td>Cycle theme: dark → light → high-contrast</td></tr>
        <tr><td><span class="kbd">1</span>–<span class="kbd">8</span></td><td>Jump to week 1–8</td></tr>
        <tr><td><span class="kbd">a</span></td><td>All weeks view</td></tr>
        <tr><td><span class="kbd">d</span></td><td>Today view</td></tr>
        <tr><td><span class="kbd">←</span> / <span class="kbd">→</span></td><td>Navigate guided tour (when active)</td></tr>
        <tr><td><span class="kbd">?</span></td><td>This help</td></tr>
        <tr><td><span class="kbd">Esc</span></td><td>Close modal / exit tour</td></tr>
      </table>
      <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="icon primary" onclick="closeModal();startTour()" style="background:var(--grad-1);color:#000;border:0;font-weight:700;padding:6px 14px;border-radius:99px;cursor:pointer">🗺 Replay tour</button>
      </div>
    `);
  }
  else if (e.key === "Escape") closeModal();
  else if (e.key === "j" || e.key === "k") {
    e.preventDefault();
    const days = [...document.querySelectorAll(".day")];
    if (days.length === 0) return;
    const cur = days.findIndex(d => {
      const r = d.getBoundingClientRect();
      return r.top > 80 && r.top < innerHeight/2;
    });
    const nextIdx = e.key === "j" ? Math.min(cur+1, days.length-1) : Math.max(cur-1, 0);
    const target = days[nextIdx >= 0 ? nextIdx : 0];
    target.scrollIntoView({behavior:"smooth", block:"start"});
  }
  else if (e.key === "o") {
    const focusedDay = [...document.querySelectorAll(".day")].find(d => {
      const r = d.getBoundingClientRect();
      return r.top > 80 && r.top < innerHeight/2;
    });
    if (focusedDay) focusedDay.classList.toggle("open");
  }
  else if (e.key === " ") {
    // toggle the first unchecked task in the topmost visible expanded day
    const day = [...document.querySelectorAll(".day.open")].find(d => {
      const r = d.getBoundingClientRect();
      return r.top > 60 && r.top < innerHeight - 60;
    });
    if (day){
      e.preventDefault();
      const next = day.querySelector("input[type=checkbox][data-id]:not(:checked)");
      if (next){ next.checked = true; next.dispatchEvent(new Event("change")); }
    }
  }
  else if (e.key === "r") document.getElementById("resume").click();
  else if (e.key === "f") enterFocusMode();
  else if (e.key === "t") document.getElementById("theme-toggle").click();
  else if (e.key === "a") setViewMode("all");
  else if (e.key === "d") setViewMode("today");
  else if (/^[1-8]$/.test(e.key)) {
    const btn = [...document.querySelectorAll("nav.weeks button")].find(b => b.dataset.week === e.key);
    if (btn) btn.click();
  }
});

function renderStats(){
  const cont = document.getElementById("view-stats");
  // Revisit-rate stats
  const items = buildMistakeLog();
  const overdue = items.filter(i => i.dueAt === 0).length;
  const upcoming = items.filter(i => i.dueAt > 0 && i.dueAt < 1).length;
  const future = items.filter(i => i.dueAt >= 1).length;
  // Approximate "resolved on time" = how many notes with revisit:false but had a timestamp (i.e., were resolved)
  const resolvedCount = Object.values(notes).filter(n => !n.revisit && n.timestamps && n.timestamps.length > 0).length;
  const totalEverFlagged = Object.values(notes).filter(n => n.timestamps && n.timestamps.length > 0).length;
  const resolveRate = totalEverFlagged > 0 ? Math.round(resolvedCount * 100 / totalEverFlagged) : 0;
  // SM-2 derived: average ease, items mastered (reps >= 3 AND ease >= 2.5)
  const avgEase = items.length > 0
    ? (items.reduce((s, i) => s + (i.easeFactor || 2.5), 0) / items.length)
    : 0;
  const mastered = items.filter(i => (i.repetitions || 0) >= 3 && (i.easeFactor || 2.5) >= 2.5).length;

  // Time tracker stats
  const timeEntries = Object.entries(solveTimes);
  const totalTimeSec = timeEntries.reduce((s, [_, v]) => s + (v.totalSec || 0), 0);
  const avgPerProblem = timeEntries.length > 0 ? Math.round(totalTimeSec / timeEntries.length) : 0;
  // by difficulty
  const byDiff = { E: { count: 0, total: 0 }, M: { count: 0, total: 0 }, H: { count: 0, total: 0 } };
  timeEntries.forEach(([slug, v]) => {
    const entry = Object.entries(DSA).find(([_, m]) => m[0] === slug);
    if (!entry) return;
    const diff = entry[1][1];
    if (byDiff[diff]){ byDiff[diff].count++; byDiff[diff].total += v.totalSec; }
  });
  // Slowest 5 problems
  const slowest = timeEntries
    .map(([slug, v]) => {
      const entry = Object.entries(DSA).find(([_, m]) => m[0] === slug);
      return { slug, name: entry ? entry[0] : slug, sec: v.totalSec, diff: entry ? entry[1][1] : "?" };
    })
    .sort((a, b) => b.sec - a.sec)
    .slice(0, 5);

  // Empty state — nothing tracked yet
  const nothingTracked = timeEntries.length === 0 && items.length === 0 && totalEverFlagged === 0;
  if (nothingTracked){
    cont.innerHTML = `<div class="panel"><h2>📈 Stats</h2>
      <div class="empty-state">
        <div class="ico">📈</div>
        <h3>Nothing to chart yet</h3>
        <p>Start solving problems to see stats here. Stats include slowest problems, average solve time, and revisit-resolve rate.</p>
        <div class="example">Tip: hit <code>▶ Time</code> on any DSA task to log time, or flag with <code>🔁</code> to seed the spaced-repetition queue.</div>
      </div>
    </div>`;
    return;
  }

  let html = `<div class="panel"><h2>📈 Stats</h2>
    <h3>Revisit / Spaced repetition (SM-2 lite)</h3>
    <div class="revisit-stats">
      <div class="stat red"><div class="num">${overdue}</div><div class="lbl">Overdue</div></div>
      <div class="stat"><div class="num">${upcoming}</div><div class="lbl">Due Today</div></div>
      <div class="stat green"><div class="num">${resolveRate}%</div><div class="lbl">Resolve Rate</div></div>
    </div>
    <div class="revisit-stats" style="margin-top:8px">
      <div class="stat"><div class="num">${items.length}</div><div class="lbl">In Queue</div></div>
      <div class="stat"><div class="num">${avgEase ? avgEase.toFixed(2) : "—"}</div><div class="lbl">Avg Ease</div></div>
      <div class="stat green"><div class="num">${mastered}</div><div class="lbl">Mastered</div></div>
    </div>
    <p style="color:var(--muted);font-size:12px;margin:0">Mastered = ≥3 successful reviews and ease ≥ 2.5. Open the <b>Mistakes</b> tab to clear overdue items.</p>

    <h3 style="margin-top:18px">Solve-time tracker</h3>
    <div class="revisit-stats">
      <div class="stat"><div class="num">${timeEntries.length}</div><div class="lbl">Problems Timed</div></div>
      <div class="stat"><div class="num">${formatDuration(totalTimeSec)}</div><div class="lbl">Total Time</div></div>
      <div class="stat green"><div class="num">${avgPerProblem ? formatDuration(avgPerProblem) : "—"}</div><div class="lbl">Avg / Problem</div></div>
    </div>
    <p style="color:var(--muted);font-size:12px;margin:0 0 8px">Per-difficulty avg: ${
      ["E","M","H"].map(d => {
        const x = byDiff[d];
        return x.count ? `${d} <b>${formatDuration(Math.round(x.total / x.count))}</b>` : `${d} —`;
      }).join(" · ")
    }</p>
    ${slowest.length ? `<h4 style="margin-top:14px;font-size:13px">Slowest 5 problems</h4>
    <ul style="padding-left:18px;font-size:13px">
      ${slowest.map(s => `<li><a href="${LC(s.slug)}" target="_blank" rel="noopener">${s.name}</a> <span class="badge b-${s.diff}">${s.diff}</span> — <b style="color:var(--accent-3)">${formatDuration(s.sec)}</b></li>`).join("")}
    </ul>` : ""}
  </div>`;
  cont.innerHTML = html;
}

function openBEProjectModal(id){

  let html = `
    <button class="close" onclick="closeModal()" aria-label="Close" title="Close this dialog.">✕</button>
    <h2>🛠 ${p.name}</h2>
    <div class="be-modal-section"><p style="font-size:14px;line-height:1.6">${p.summary}</p></div>

    <div class="be-modal-section">
      <h4>Steps (${comp.done}/${comp.total} complete · ${pct}%)</h4>
      <div class="be-progress-stats"><span><b>${comp.done}</b> of <b>${comp.total}</b> steps</span><span>${pct}%${comp.done === comp.total && comp.total > 0 ? " · ✓ Project shipped!" : ""}</span></div>
      <div class="be-progress"><div class="be-progress-fill" style="width:${pct}%"></div></div>`;
  p.steps.forEach(s => {
    const checked = isStepDone(id, s.n) ? "checked" : "";
    const doneCls = isStepDone(id, s.n) ? "done" : "";
    html += `<details class="be-step ${doneCls}">
      <summary><span class="be-step-row"><input type=checkbox ${checked} data-proj-id="${id}" data-step-n="${s.n}" onclick="event.stopPropagation()"><span class="step-num">${s.n}</span><span class="step-title">${s.title}</span></span></summary>
      <div class="goal">${s.goal}</div>
      ${s.body || ""}
      ${s.check ? `<div class="check">${s.check}</div>` : ""}
    </details>`;
  });
  html += `</div>`;
  showModal(html);
  // wire step checkboxes
  document.querySelectorAll('#modal input[data-proj-id]').forEach(cb => {
    cb.addEventListener("change", () => {
      const projId = cb.dataset.projId;
      const stepN = parseInt(cb.dataset.stepN, 10);
      setStepDone(projId, stepN, cb.checked);
      // re-open to refresh progress bar
      openBEProjectModal(projId);
    });
  });
}

  if (!p) return;
  const pb = MOCK_PLAYBOOKS.find(x => x.id === p.playbook);
  let html = `
    <button class="close" onclick="closeModal()" aria-label="Close" title="Close this dialog.">✕</button>
    <h2>🎙 ${p.label}</h2>
    <div class="mock-modal-section"><p style="font-size:13px;color:var(--muted)">Day ${p.day} · Week ${p.week}${SCHEDULE.find(d=>d.day===p.day)?.dateLabel ? ` · ${SCHEDULE.find(d=>d.day===p.day).dateLabel}` : ""}</p></div>
    <div class="mock-modal-section"><h4>Focus areas</h4><ul style="padding-left:18px;font-size:13px;line-height:1.6">${p.focus.map(x => `<li>${x}</li>`).join("")}</ul></div>
    <div class="mock-modal-section"><h4>Likely problems</h4><ul style="padding-left:18px;font-size:13px;line-height:1.6">${p.likelyProblems.map(x => `<li>${x}</li>`).join("")}</ul></div>
    <div class="mock-modal-section"><h4>5-minute prep</h4><div class="sd-example">${p.prep}</div></div>
    ${pb ? `<div class="mock-modal-section"><h4>Use this playbook</h4><a href="#" class="sd-deeplink" data-sd-deeplink="mockplaybook:${pb.id}" title="Open this Mock playbook in-app.">📖 ${pb.title}</a></div>` : ""}
  `;
  showModal(html);
  document.querySelectorAll("#modal .sd-deeplink").forEach(a => a.addEventListener("click", e => {
    e.preventDefault(); e.stopPropagation();
    const [kind, mid] = a.dataset.sdDeeplink.split(":");
    if (kind === "mockplaybook") openMockPlaybookModal(mid);
  }));
}
window.openMockPlaybookModal = openMockPlaybookModal;
window.openMockPrepModal = openMockPrepModal;

function renderConcepts(){
  const cont = document.getElementById("view-concepts");
  // group concepts roughly by family (heuristic: first concept is the family)
  const groups = {
    "Core array/string patterns": ["hashmap-lookup","two-pointer","sliding-window","prefix-sum","sorting","intervals","greedy","kadane"],
    "Search": ["binary-search","search-on-answer"],
    "Stack & queue": ["stack","monotonic-stack"],
    "Linked list": ["linked-list-traversal","fast-slow-pointer","reverse-linked-list","merge-two-sorted-lists","seen-before"],
    "Trees": ["binary-tree-dfs","binary-tree-bfs","bottom-up-recursion","bst-properties"],
    "Graphs": ["graph-bfs","graph-dfs","grid-traversal","topological-sort","union-find","dijkstra"],
    "Heap & PQ": ["heap","two-heaps"],
    "Trie & recursion": ["trie","recursion","backtracking"],
    "Dynamic programming": ["dp","dp-1d","dp-2d","dp-string","knapsack","lis"],
    "Bits / math / matrix / design": ["bit-manipulation","math","matrix-tricks","design"]
  };
  let html = `<div class="panel"><h2>🧠 Concepts</h2>
    <p style="color:var(--muted);font-size:13px;margin-top:0">Click any concept to see when to use it, key ops, related concepts, and every problem in your tracker that uses it. Use this as a pre-flight check before opening a problem.</p>`;
  Object.entries(groups).forEach(([groupName, ids]) => {
    html += `<h3 style="margin-top:18px">${groupName}</h3><div class="concept-grid">`;
    ids.forEach(cid => {
      const c = CONCEPTS[cid]; if (!c) return;
      const count = Object.values(PROBLEM_CONCEPTS).filter(arr => arr.includes(cid)).length;
      html += `<div class="concept-card" data-concept="${cid}" tabindex="0" role="button">
        <h4>${c.name} <span style="float:right;color:var(--muted);font-size:11px;font-weight:400">${count} prob</span></h4>
        <p>${c.summary}</p>
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  cont.innerHTML = html;
  cont.querySelectorAll(".concept-card").forEach(card => {
    card.addEventListener("click", () => openConceptModal(card.dataset.concept));
    card.addEventListener("keydown", e => {
      if (e.key === "Enter" || e.key === " "){ e.preventDefault(); openConceptModal(card.dataset.concept); }
    });
  });
}

function renderResources(){
  const cont = document.getElementById("view-resources");
  let html = `<div class="panel"><h2>Resources</h2><div class="grid-2">`;
  Object.entries(RESOURCES).forEach(([cat, items]) => {
    html += `<div><h3>${cat}</h3><ul>`;
    items.forEach(([n,u]) => html += `<li><a href="${u}" target="_blank" rel="noopener">${n}</a></li>`);
    html += `</ul></div>`;
  });
  html += `</div></div>`;
  cont.innerHTML = html;
}

// Build a {problemName: topic} map by scanning DSA entries in source order
// and following the inline `// topic` comments embedded in `tracker/index.html`.
// Cached on first use.
let __DSA_TOPIC_CACHE = null;
function getDsaTopicMap(){
  if (__DSA_TOPIC_CACHE) return __DSA_TOPIC_CACHE;
  // Topics in source order, matching the // comments in `const DSA = {`
  const TOPIC_SEQUENCE = [
    { boundary: "Two Sum",                                topic: "Arrays" },
    { boundary: "Pascal's Triangle I",                     topic: "Arrays" },
    { boundary: "Ransom Note",                             topic: "Hash" },
    { boundary: "4 Sum",                                   topic: "Hash" },
    { boundary: "Roman to Integer",                        topic: "Math" },
    { boundary: "Add Binary",                              topic: "Bits" },
    { boundary: "Valid Palindrome",                        topic: "Strings" },
    { boundary: "Reverse every word in a string",          topic: "Strings" },
    { boundary: "Valid Parentheses",                       topic: "Stack" },
    { boundary: "Implement Stack using Arrays",            topic: "Stack" },
    { boundary: "Merge Two Sorted Lists",                  topic: "Linked List" },
    { boundary: "Delete Node in a Linked List O(1)",       topic: "Linked List" },
    { boundary: "Binary Search",                           topic: "Binary Search" },
    { boundary: "The N-th root of an integer",             topic: "Binary Search" },
    { boundary: "Invert Binary Tree",                      topic: "Binary Tree" },
    { boundary: "Inorder Traversal",                       topic: "Binary Tree" },
    { boundary: "Lowest Common Ancestor of a BST",         topic: "BST" },
    { boundary: "Populating Next Right Pointers in Each Node", topic: "BST" },
    { boundary: "Flood Fill",                              topic: "Graph" },
    { boundary: "DFS",                                     topic: "Graph" },
    { boundary: "K Closest Points to Origin",              topic: "Heap" },
    { boundary: "Implement Max Heap",                      topic: "Heap" },
    { boundary: "Implement Trie (Prefix Tree)",            topic: "Trie" },
    { boundary: "Trie Implementation and Operations",      topic: "Trie" },
    { boundary: "Permutations",                            topic: "Recursion" },
    { boundary: "Subset Sums",                             topic: "Recursion" },
    { boundary: "Spiral Matrix",                           topic: "Matrix" },
    { boundary: "Design Hit Counter",                      topic: "Queue" },
    { boundary: "N meetings in one room",                  topic: "Greedy" },
    { boundary: "Climbing Stairs",                         topic: "DP" },
    { boundary: "Longest common subsequence",              topic: "DP" },
  ];
  const keys = Object.keys(DSA);
  const map = {};
  let topicIdx = 0, currentTopic = "Arrays";
  for (const k of keys){
    // Advance topic pointer when we hit the next boundary problem
    while (topicIdx + 1 < TOPIC_SEQUENCE.length && k === TOPIC_SEQUENCE[topicIdx + 1].boundary){
      topicIdx++;
    }
    if (topicIdx === 0 && k === TOPIC_SEQUENCE[0].boundary) currentTopic = TOPIC_SEQUENCE[0].topic;
    currentTopic = TOPIC_SEQUENCE[topicIdx].topic;
    map[k] = currentTopic;
  }
  __DSA_TOPIC_CACHE = map;
  return map;
}

// Module-level state for the Grind tab filters. Persisted to localStorage so
// the user's filter selection survives page reloads / tab switches.
// Filters: { diffs: string[], topics: string[], q: string }  (empty arrays = no filter)
const GRIND_FILTERS_KEY = "grind-filters-v2";
function getGrindFilters(){
  try {
    const f = JSON.parse(localStorage.getItem(GRIND_FILTERS_KEY) || "{}");
    return {
      diffs: Array.isArray(f.diffs) ? f.diffs : [],
      topics: Array.isArray(f.topics) ? f.topics : [],
      q: typeof f.q === "string" ? f.q : "",
    };
  } catch { return { diffs: [], topics: [], q: "" }; }
}
function setGrindFilters(f){
  localStorage.setItem(GRIND_FILTERS_KEY, JSON.stringify(f));
}
function toggleInArray(arr, v){
  const i = arr.indexOf(v);
  if (i >= 0) arr.splice(i, 1);
  else arr.push(v);
  return arr;
}

function renderGrind(){
  const cont = document.getElementById("view-grind");
  const topicMap = getDsaTopicMap();
  const filters = getGrindFilters();
  const TOPIC_ORDER = ["Arrays","Hash","Math","Bits","Strings","Stack","Linked List","Binary Search","Binary Tree","BST","Graph","Heap","Trie","Recursion","Matrix","Queue","Greedy","DP"];
  const topicCounts = {};
  Object.values(topicMap).forEach(t => { topicCounts[t] = (topicCounts[t] || 0) + 1; });
  const diffCounts = { E: 0, M: 0, H: 0, P: 0 };
  Object.values(DSA).forEach(([_s, d, prem]) => {
    if (prem) diffCounts.P++;
    if (d in diffCounts) diffCounts[d]++;
  });

  // Match logic: empty arrays mean "no filter" (show all). Otherwise the
  // value must appear in the selected set.
  const matches = (diff, topic, prem, name) => {
    const matchDiff = filters.diffs.length === 0
      || filters.diffs.includes(diff)
      || (filters.diffs.includes("P") && prem);
    const matchTopic = filters.topics.length === 0 || filters.topics.includes(topic);
    const matchQ = !filters.q || name.toLowerCase().includes(filters.q.toLowerCase());
    return matchDiff && matchTopic && matchQ;
  };

  const rows = Object.entries(DSA)
    .sort((a,b) => {
      const order = {E:0,M:1,H:2};
      return order[a[1][1]] - order[b[1][1]] || a[0].localeCompare(b[0]);
    })
    .map(([n, [slug, diff, prem]]) => {
      const topic = topicMap[n] || "Arrays";
      const visible = matches(diff, topic, prem, n);
      const id = `grind-${slug}`;
      const checked = isDone(id) ? "checked" : "";
      const cls = prem ? "b-P" : "b-"+diff;
      const lbl = prem ? `${diff}·P` : diff;
      const concepts = (PROBLEM_CONCEPTS[n] || []).map(cid => {
        const c = CONCEPTS[cid]; if (!c) return "";
        return `<span class="concept-chip" data-concept="${cid}" title="${c.summary.replace(/"/g,'&quot;')}">${c.name}</span>`;
      }).join("");
      const prep = (typeof prepLookup === "function") ? prepLookup(n) : null;
      const prepBlock = prep ? `<div class="prep-wrap">${renderPrepCard(`grind::${normalizePrepKey(n)}`, prep)}</div>` : "";
      const isNonLc = typeof slug === "string" && slug.startsWith("non-lc/");
      const titleHtml = isNonLc
        ? `<span class="task-title">${n}</span>`
        : `<a href="${LC(slug)}" target="_blank" rel="noopener">${n}</a>`;
      return `<li data-diff="${diff}" data-topic="${topic}" data-name="${n.toLowerCase()}" data-prem="${prem ? 1 : 0}" style="${visible ? "" : "display:none"}"><input type=checkbox ${checked} data-id="${id}"><span class="task-text">${titleHtml}<span class="badge ${cls}" title="${prem ? 'Premium (LeetCode subscription required)' : (diff === 'E' ? 'Easy' : diff === 'M' ? 'Medium' : diff === 'H' ? 'Hard' : diff)}">${lbl}</span><span class="grind-topic" title="Topic">${topic}</span>${concepts ? `<span class="concepts">${concepts}</span>` : ""}${prepBlock}</span></li>`;
    }).join("");
  const totalCount = Object.keys(DSA).length;

  // Multi-select chips. No "All" button — instead, no selection means everything is shown,
  // and a "Clear" pill appears when any chip is active.
  const isDiffActive = (key) => filters.diffs.includes(key);
  const isTopicActive = (key) => filters.topics.includes(key);
  const diffChip = (key, label, count) =>
    `<button class="grind-chip ${isDiffActive(key) ? "active" : ""}" data-diff-filter="${key}">${label}<span class="grind-chip-count">${count}</span></button>`;
  const topicChip = (key, label, count) =>
    `<button class="grind-chip ${isTopicActive(key) ? "active" : ""}" data-topic-filter="${key}">${label}${count != null ? `<span class="grind-chip-count">${count}</span>` : ""}</button>`;
  const hasActive = filters.diffs.length || filters.topics.length || filters.q;
  const clearBtn = hasActive
    ? `<button class="grind-chip grind-chip-clear" data-clear-filter>✕ Clear all</button>`
    : "";

  cont.innerHTML = `<div class="panel"><h2>DSA Problems · Quick Index (${totalCount})</h2>
    <div class="grind-filters">
      <div class="grind-filter-row">
        <span class="grind-filter-label">Difficulty</span>
        ${diffChip("E", "Easy", diffCounts.E)}
        ${diffChip("M", "Medium", diffCounts.M)}
        ${diffChip("H", "Hard", diffCounts.H)}
        ${diffChip("P", "Premium", diffCounts.P)}
      </div>
      <div class="grind-filter-row">
        <span class="grind-filter-label">Topic</span>
        ${TOPIC_ORDER.filter(t => topicCounts[t]).map(t => topicChip(t, t, topicCounts[t])).join("")}
      </div>
      <div class="grind-filter-row">
        <input type="text" class="grind-search" placeholder="Search by problem name…" value="${filters.q.replace(/"/g,'&quot;')}" />

        <span id="grind-count" class="grind-count"></span>
      </div>
    </div>
    <ul class="tasks" id="grind-list">${rows}</ul></div>`;

  function applyFilter(){
    const list = cont.querySelectorAll("#grind-list > li");
    const f = getGrindFilters();
    let visible = 0;
    list.forEach(li => {
      const matchDiff = f.diffs.length === 0
        || f.diffs.includes(li.dataset.diff)
        || (f.diffs.includes("P") && li.dataset.prem === "1");
      const matchTopic = f.topics.length === 0 || f.topics.includes(li.dataset.topic);
      const matchQ = !f.q || li.dataset.name.includes(f.q.toLowerCase());
      const show = matchDiff && matchTopic && matchQ;
      li.style.display = show ? "" : "none";
      if (show) visible++;
    });
    const cnt = cont.querySelector("#grind-count");
    if (cnt) cnt.textContent = `${visible} of ${list.length} shown`;
  }

  function refreshChipsAndClear(){
    const f = getGrindFilters();
    cont.querySelectorAll("[data-diff-filter]").forEach(b => b.classList.toggle("active", f.diffs.includes(b.dataset.diffFilter)));
    cont.querySelectorAll("[data-topic-filter]").forEach(b => b.classList.toggle("active", f.topics.includes(b.dataset.topicFilter)));
    // Show / hide the Clear button without re-rendering the whole panel
    const showClear = f.diffs.length || f.topics.length || f.q;
    let clr = cont.querySelector("[data-clear-filter]");
    const searchRow = cont.querySelectorAll(".grind-filter-row")[2];
    if (showClear && !clr && searchRow){
      clr = document.createElement("button");
      clr.className = "grind-chip grind-chip-clear";
      clr.setAttribute("data-clear-filter", "");
      clr.textContent = "✕ Clear all";
      clr.addEventListener("click", clearAllFilters);
      searchRow.insertBefore(clr, searchRow.querySelector("#grind-count"));
    } else if (!showClear && clr){
      clr.remove();
    }
  }

  function clearAllFilters(){
    setGrindFilters({ diffs: [], topics: [], q: "" });
    const searchEl = cont.querySelector(".grind-search");
    if (searchEl) searchEl.value = "";
    refreshChipsAndClear();
    applyFilter();
  }

  cont.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", () => {
      setDone(cb.dataset.id, cb.checked);
      cb.parentElement.querySelector(".task-text").classList.toggle("done", cb.checked);
    });
    if(cb.checked) cb.parentElement.querySelector(".task-text").classList.add("done");
  });
  cont.querySelectorAll(".concept-chip").forEach(chip => chip.addEventListener("click", e => {
    e.stopPropagation();
    e.preventDefault();
    openConceptModal(chip.dataset.concept);
  }));
  cont.querySelectorAll("[data-diff-filter]").forEach(btn => btn.addEventListener("click", () => {
    const f = getGrindFilters();
    toggleInArray(f.diffs, btn.dataset.diffFilter);
    setGrindFilters(f);
    refreshChipsAndClear();
    applyFilter();
  }));
  cont.querySelectorAll("[data-topic-filter]").forEach(btn => btn.addEventListener("click", () => {
    const f = getGrindFilters();
    toggleInArray(f.topics, btn.dataset.topicFilter);
    setGrindFilters(f);
    refreshChipsAndClear();
    applyFilter();
  }));
  const clearEl = cont.querySelector("[data-clear-filter]");
  if (clearEl) clearEl.addEventListener("click", clearAllFilters);
  const searchEl = cont.querySelector(".grind-search");
  if (searchEl){
    searchEl.addEventListener("input", () => {
      const f = getGrindFilters();
      f.q = searchEl.value.trim();
      setGrindFilters(f);
      refreshChipsAndClear();
      applyFilter();
    });
  }
  applyFilter();
  if (typeof wirePrepToggles === "function") wirePrepToggles(cont);
}

function updateStats(){
  let total=0, done=0;
  const counts = {DSA:0, SD:0, LP:0, BE:0, MK:0, LAB:0};
  SCHEDULE.forEach(d => {
    d.slots.forEach((s, si) => {
      s.tasks.forEach((t, ti) => {
        const id = `d${d.day}-s${si}-t${ti}`;
        total++;
        if(isDone(id)){
          done++;
          if(t.type === "dsa") counts.DSA += (t.names||[]).length;
          else if(t.type === "sd") counts.SD++;
          else if(t.type === "lp") counts.LP++;
          else if(t.type === "be") counts.BE++;
          else if(t.type === "bec") counts.BE++;
          else if(t.type === "bep") counts.BE++;
          else if(t.type === "mk") counts.MK++;
          else if(t.type === "mkp") counts.MK++;
          else if(t.type === "lab") counts.LAB++;
        }
      });
    });
  });
  document.getElementById("done").textContent = done;
  document.getElementById("total").textContent = total;
  document.getElementById("bar").style.width = (total ? (done/total*100) : 0) + "%";
  document.getElementById("s-dsa").textContent = counts.DSA;
  document.getElementById("s-sd").textContent = counts.SD;
  document.getElementById("s-lp").textContent = counts.LP;
  document.getElementById("s-be").textContent = counts.BE;
  document.getElementById("s-mk").textContent = counts.MK;
  document.getElementById("s-lab").textContent = counts.LAB;
  document.getElementById("streak").textContent = streak();
  document.getElementById("day-completed").textContent = dayCompletedCount();
  // level: 1 XP per task done; level up every 25 XP
  const xp = done;
  const level = Math.floor(xp / 25) + 1;
  document.getElementById("xp").textContent = xp;
  document.getElementById("level").textContent = level;
  // Due-today pill — visible only when there are revisits to do
  try {
    const m = (typeof buildMistakeLog === "function") ? buildMistakeLog() : [];
    const dueCount = m.filter(x => x.dueAt === 0 || (x.dueAt > 0 && x.dueAt < 1)).length;
    const duePill = document.getElementById("due-pill");
    const dueNum = document.getElementById("s-due");
    if (duePill && dueNum){
      dueNum.textContent = dueCount;
      duePill.style.display = dueCount > 0 ? "" : "none";
      duePill.classList.toggle("due-pill-overdue", m.some(x => x.dueAt === 0));
    }
  } catch {}
  checkAchievements();
}

// ───── Diagnostic helper for prep-card coverage ─────
// Returns { schedule: string[], grind: string[], total: number } where
//   schedule — names referenced in SCHEDULE (any DSA task's t.names) that miss PROBLEM_PREP
//   grind    — names in DSA that miss PROBLEM_PREP
//   total    — unique union size
// All names normalized via normalizePrepKey before lookup so decorations are stripped.
window.__listMissingPrep = function(){
  const scheduleMissing = new Set();
  const grindMissing = new Set();
  if (typeof SCHEDULE !== "undefined" && Array.isArray(SCHEDULE)){
    SCHEDULE.forEach(d => (d.slots || []).forEach(s => (s.tasks || []).forEach(t => {
      if (t && t.type === "dsa" && Array.isArray(t.names)){
        t.names.forEach(n => {
          if (typeof prepLookup === "function" && !prepLookup(n)){
            scheduleMissing.add(typeof normalizePrepKey === "function" ? normalizePrepKey(n) : String(n));
          }
        });
      }
    })));
  }
  if (typeof DSA !== "undefined"){
    Object.keys(DSA).forEach(n => {
      if (typeof prepLookup === "function" && !prepLookup(n)){
        grindMissing.add(typeof normalizePrepKey === "function" ? normalizePrepKey(n) : String(n));
      }
    });
  }
  const union = new Set([...scheduleMissing, ...grindMissing]);
  return {
    schedule: Array.from(scheduleMissing),
    grind: Array.from(grindMissing),
    total: union.size
  };
};

let _tourIdx = 0;
let _tourActive = false;
let _tourResizeHandler = null;

function _tourEl(id){ return document.getElementById(id); }

function startTour(){
  // Close any open modal first so the tour isn't fighting for z-index
  const modalBg = document.getElementById("modal-bg");
  if (modalBg && modalBg.classList.contains("show")) closeModal();

  _tourIdx = 0;
  _tourActive = true;
  _tourEl("tour-overlay").classList.add("show");
  _tourEl("tour-tooltip").classList.add("show");

  if (!_tourResizeHandler){
    _tourResizeHandler = () => { if (_tourActive) showTourStep(_tourIdx); };
    window.addEventListener("resize", _tourResizeHandler);
  }
  showTourStep(0);
}

function endTour(completed){
  _tourActive = false;
  _tourEl("tour-overlay").classList.remove("show");
  _tourEl("tour-tooltip").classList.remove("show");
  _tourEl("tour-spotlight").style.display = "none";
  _tourEl("tour-backdrop").classList.remove("show");
  if (_tourResizeHandler){
    window.removeEventListener("resize", _tourResizeHandler);
    _tourResizeHandler = null;
  }
  if (completed){
    settings.tourCompleted = true;
    saveSettings();
    if (typeof toast === "function") toast("✅ Tour complete · press ? for shortcuts");
  }
  _tourIdx = 0;
}

function showTourStep(i){
  if (i < 0) i = 0;
  if (i >= TOUR_STEPS.length){ endTour(true); return; }
  _tourIdx = i;
  const step = TOUR_STEPS[i];

  // 1. Switch tab if needed
  if (step.tab){
    const btn = document.querySelector(`.tabs button[data-view="${step.tab}"]`);
    if (btn && !btn.classList.contains("active")) btn.click();
  }
  // 2. Switch view mode if needed (Today/All)
  if (step.viewMode && typeof setViewMode === "function") setViewMode(step.viewMode);
  // 3. Optional pre-step setup (e.g., open a day card so its inner targets render)
  if (typeof step.prep === "function"){
    try { step.prep(); } catch(_){}
  }

  // 4. Wait for re-render before resolving target
  requestAnimationFrame(() => {
    const target = step.selector ? document.querySelector(step.selector) : null;
    // Skip gracefully if the target is missing (e.g., no .dsa-extras yet)
    if (step.selector && !target){
      // Try advancing in the same direction we came from; default forward
      const next = i + 1;
      if (next < TOUR_STEPS.length){ showTourStep(next); return; }
      endTour(true); return;
    }
    _positionTour(step, target);
  });
}

function _positionTour(step, target){
  const spot = _tourEl("tour-spotlight");
  const tip = _tourEl("tour-tooltip");
  const back = _tourEl("tour-backdrop");

  // Render tooltip body first so size is known
  const isLast = _tourIdx === TOUR_STEPS.length - 1;
  tip.innerHTML = `
    <h3>${step.title}</h3>
    <p>${step.body}</p>
    <div class="tour-tooltip-controls">
      <span class="step-info">${_tourIdx + 1} of ${TOUR_STEPS.length}</span>
      <span class="tour-skip" data-tour-action="skip">Skip tour</span>
      <div class="tour-btn-row">
        ${_tourIdx > 0 ? `<button data-tour-action="prev">← Back</button>` : ""}
        <button class="primary" data-tour-action="next">${isLast ? "Done ✓" : "Next →"}</button>
      </div>
    </div>`;

  // Wire control buttons (avoid inline handlers to keep CSP-friendly)
  tip.querySelectorAll("[data-tour-action]").forEach(el => {
    el.addEventListener("click", () => {
      const a = el.dataset.tourAction;
      if (a === "skip") endTour(false);
      else if (a === "prev") showTourStep(_tourIdx - 1);
      else if (a === "next") showTourStep(_tourIdx + 1);
    });
  });

  if (!target){
    // Centered tooltip; fake backdrop covers full viewport
    spot.style.display = "none";
    back.classList.add("show");
    tip.classList.add("center");
    tip.style.left = ""; tip.style.top = "";
    return;
  }

  // Real spotlight: hide backdrop (spotlight uses huge box-shadow as backdrop)
  back.classList.remove("show");
  tip.classList.remove("center");

  target.scrollIntoView({behavior: "smooth", block: "center", inline: "nearest"});
  // Wait for scroll to settle before measuring
  setTimeout(() => {
    if (!_tourActive) return;
    const rect = target.getBoundingClientRect();
    const pad = innerWidth < 720 ? 4 : 8;
    spot.style.display = "block";
    spot.style.left = Math.max(0, rect.left - pad) + "px";
    spot.style.top = Math.max(0, rect.top - pad) + "px";
    spot.style.width = (rect.width + pad * 2) + "px";
    spot.style.height = (rect.height + pad * 2) + "px";

    // Place tooltip below the spotlight, fall back to above, then to side
    const tipRect = tip.getBoundingClientRect();
    const tipW = Math.max(tipRect.width, 280);
    const tipH = Math.max(tipRect.height, 120);
    const margin = 16;

    let tx = rect.left;
    let ty = rect.bottom + margin;

    if (ty + tipH > innerHeight - margin){
      // try above
      const above = rect.top - tipH - margin;
      if (above >= margin) ty = above;
      else ty = Math.max(margin, innerHeight - tipH - margin);
    }
    if (tx + tipW > innerWidth - margin) tx = innerWidth - tipW - margin;
    if (tx < margin) tx = margin;

    tip.style.left = tx + "px";
    tip.style.top = ty + "px";
  }, 380);
}

window.startTour = startTour;
window.endTour = endTour;
window.showTourStep = showTourStep;

// 🗺 Tour button
const tourBtn = document.getElementById("tour-btn");
if (tourBtn) tourBtn.addEventListener("click", () => startTour());

// Keyboard: Esc closes; Arrow keys navigate (only while tour is active)
document.addEventListener("keydown", e => {
  if (!_tourActive) return;
  // Don't hijack typing in inputs (e.g., search box)
  if (["INPUT","TEXTAREA"].includes(e.target.tagName)) return;
  if (e.key === "Escape"){ e.preventDefault(); endTour(false); }
  else if (e.key === "ArrowRight"){ e.preventDefault(); showTourStep(_tourIdx + 1); }
  else if (e.key === "ArrowLeft"){ e.preventDefault(); if (_tourIdx > 0) showTourStep(_tourIdx - 1); }
}, true); // capture so we run before other handlers

// Auto-launch on first visit: no progress AND tour not yet completed
if (!settings.tourCompleted && Object.keys(state).length === 0){
  setTimeout(() => {
    // Don't start if a modal opened in the meantime
    const mb = document.getElementById("modal-bg");
    if (mb && mb.classList.contains("show")) return;
    startTour();
  }, 600);
}
