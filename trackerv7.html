function renderHeatmap(){
  const mode = settings.heatmap || "strip";
  let html = `<div class="grid-wrap"><header class="row"><h3>📊 60-Day Progress</h3>
    <div class="heatmap-tabs" role="tablist" aria-label="Progress view">
      <button data-hm="strip" class="${mode==='strip'?'active':''}" role="tab">Strip</button>
      <button data-hm="cal" class="${mode==='cal'?'active':''}" role="tab">Calendar</button>
    </div></header>`;

  // Always show the journey (vehicle on the road)
  html += renderJourney();

  if (mode === "cal") {
    html += renderCalendar();
  } else {
    html += `<div class="grid-60" role="grid" aria-label="60-day strip">`;
    SCHEDULE.forEach(d => {
      const pct = dayPct(d);
      let cls = "cell";
      if (pct === 100) cls += " p100";
      else if (pct >= 75) cls += " p75";
      else if (pct >= 50) cls += " p50";
      else if (pct >= 25) cls += " p25";
      if (d.day === currentDay()) cls += " today";
      html += `<div class="${cls}" data-day="${d.day}" role="gridcell" tabindex="0" aria-label="Day ${d.day}, ${d.dateLabel||''}, ${pct}% complete" title="Day ${d.day} · ${d.dateLabel||""} · ${d.title} · ${pct}%">${d.day}</div>`;
    });
    html += `</div>`;
  }
  html += renderCharts();
  html += `</div>`;
  return html;
}

// Pick a journey face emoji based on completion tier. Faces look forward, so
// they never appear "running backward" the way directional emoji (🚶 🏎️) do.
// Arc: starting out → focused → engaged → fired up → genius → champion.
function vehicleForCompletion(done, total){
  if (done === total && total > 0) return { emoji: "🏆", label: "Done!" };
  const pct = total ? done / total : 0;
  if (pct < 0.10) return { emoji: "🚶🏼‍➡️", label: "Just starting" };
  if (pct < 0.25) return { emoji: "🚶🏼‍➡️", label: "Locked in" };
  if (pct < 0.45) return { emoji: "🚶🏼‍➡️", label: "Studying hard" };
  if (pct < 0.65) return { emoji: "🚶🏼‍➡️", label: "Confident" };
  if (pct < 0.85) return { emoji: "🚶🏼‍➡️", label: "Crushing it" };
  return { emoji: "🚶🏼‍➡️", label: "Almost there" };
}

function renderJourney(){
  const totalDone = SCHEDULE.filter(d => dayPct(d) === 100).length;
  const total = SCHEDULE.length;
  const fillPct = total ? totalDone / total : 0;
  const v = vehicleForCompletion(totalDone, total);

  // SVG path geometry: a winding road through the viewBox.
  // viewBox is 1000 wide; height ~200. Path uses 4 gentle S-curves.
  const VB_W = 1000, VB_H = 200;
  const pathD = `M 30 100
                 C 130 30, 220 30, 280 100
                 S 430 170, 500 100
                 S 650 30, 720 100
                 S 870 170, 970 100`;

  // Build a hidden path reference to compute point-at-length positions in JS later.
  // For now compute approximate positions analytically by sampling t in [0,1].
  // We don't have a real DOM path here at SSR time; we rely on getPointAtLength after mount.
  // Layout: SVG renders, then a small post-mount script positions vehicle + checkpoint dots.

  // Achievement checkpoints: distribute the 25 achievements along the path at regular fractions.
  const cps = ACHIEVEMENTS.map((a, i) => {
    const t = (i + 1) / (ACHIEVEMENTS.length + 1); // position along path 0..1
    const earned = !!a.test();
    return { id: a.id, ico: a.ico, name: a.name, desc: a.desc, t, earned };
  });

  // Week-boundary tick marks (W1..W8 + interview flag at the end). 60 days total → wN at day n*7.
  const weekTicks = [
    { day: 7, label: "W1" },
    { day: 14, label: "W2" },
    { day: 21, label: "W3" },
    { day: 28, label: "W4" },
    { day: 35, label: "W5" },
    { day: 42, label: "W6" },
    { day: 49, label: "W7" },
    { day: 56, label: "W8" }
  ].map(w => ({ ...w, t: w.day / total }));

  const earnedCount = cps.filter(c => c.earned).length;
  const totalCp = cps.length;

  return `
    <div class="journey-wrap">
      <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:6px">
        <div class="journey-tier"><span class="vehicle-emoji">${v.emoji}</span><span><b>${v.label}</b> · ${totalDone}/${total} days complete</span></div>
        <div class="journey-tier"><span>🏆 <b>${earnedCount}</b>/${totalCp} achievements unlocked</span></div>
        <div class="journey-tier"><span>Today: <b>Day ${currentDay()}</b></span></div>
      </div>
      <div class="journey-svg-wrap">
        <svg class="journey-svg" viewBox="0 0 ${VB_W} ${VB_H}" preserveAspectRatio="none" aria-label="60-day journey with ${totalCp} achievement checkpoints">
          <defs>
            <linearGradient id="journeyGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:var(--ok)"/>
              <stop offset="100%" style="stop-color:var(--accent)"/>
            </linearGradient>
          </defs>
          <!-- background road (full path, dashed) -->
          <path id="journey-path" class="journey-road-bg" d="${pathD}"/>
          <!-- progress fill (same path, partial stroke via dasharray) -->
          <path id="journey-path-fill" class="journey-road-fill" d="${pathD}"/>
          <!-- week ticks: small accent marks crossing the path -->
          ${weekTicks.map(w => `<g data-week-tick="${w.t}"><circle r="3" fill="var(--accent)"/><text class="journey-week-marker" dy="-12">${w.label}</text></g>`).join("")}
          <!-- achievement checkpoint dots -->
          ${cps.map(c => `<g data-cp-id="${c.id}" data-cp-t="${c.t}" data-cp-earned="${c.earned}" style="cursor:pointer">
            <circle class="journey-cp-dot ${c.earned ? 'earned' : ''}" r="11"/>
            <text class="journey-cp-icon ${c.earned ? 'earned' : ''}" text-anchor="middle" dy="5">${c.ico}</text>
          </g>`).join("")}
          <!-- vehicle (positioned in JS) -->
          <text id="journey-vehicle" class="journey-vehicle-svg" text-anchor="middle" dy="9">${v.emoji}</text>
          <!-- finish flag at path end -->
          <text id="journey-flag" class="journey-flag-svg" text-anchor="middle" dy="8">🏁</text>
        </svg>
        <div id="journey-tooltip" class="journey-cp-tooltip"></div>
      </div>
      <div class="journey-meta">
        <span>Day 1 (Mon May 18)</span>
        <span><b>${Math.round(fillPct * 100)}%</b> of the journey</span>
        <span>Day 60 (Mon Jul 13) · Interview</span>
      </div>
    </div>`;
}

// Position vehicle, checkpoint dots, and week ticks along the actual SVG path
// (using getPointAtLength). Called after the journey markup is in the DOM.
function layoutJourneySVG(){
  const svg = document.querySelector(".journey-svg");
  if (!svg) return;
  const pathBg = svg.querySelector("#journey-path");
  const pathFill = svg.querySelector("#journey-path-fill");
  if (!pathBg || !pathFill) return;
  const total = pathBg.getTotalLength();
  if (!total) return;

  // Progress fill: dasharray trick. Show only the first fillPct of the stroke.
  const totalDone = SCHEDULE.filter(d => dayPct(d) === 100).length;
  const fillPct = SCHEDULE.length ? totalDone / SCHEDULE.length : 0;
  pathFill.style.strokeDasharray = `${total} ${total}`;
  pathFill.style.strokeDashoffset = `${total * (1 - fillPct)}`;

  // Position vehicle at fillPct along the path
  const vehicle = svg.querySelector("#journey-vehicle");
  if (vehicle){
    const p = pathBg.getPointAtLength(Math.max(8, total * fillPct));
    vehicle.setAttribute("x", p.x);
    vehicle.setAttribute("y", p.y);
  }

  // Position finish flag at the path's end
  const flag = svg.querySelector("#journey-flag");
  if (flag){
    const end = pathBg.getPointAtLength(total);
    flag.setAttribute("x", end.x);
    flag.setAttribute("y", end.y - 18);
  }

  // Position week ticks
  svg.querySelectorAll("[data-week-tick]").forEach(g => {
    const t = parseFloat(g.dataset.weekTick);
    const p = pathBg.getPointAtLength(total * t);
    g.setAttribute("transform", `translate(${p.x} ${p.y})`);
  });

  // Position checkpoint dots along the path; alternate above/below the curve to avoid clustering
  const cpGroups = svg.querySelectorAll("[data-cp-id]");
  cpGroups.forEach((g, i) => {
    const t = parseFloat(g.dataset.cpT);
    const p = pathBg.getPointAtLength(total * t);
    // alternate offset perpendicular to path direction
    const epsilon = 1.5;
    const tNext = Math.min(1, t + 0.001);
    const pNext = pathBg.getPointAtLength(total * tNext);
    const dx = pNext.x - p.x, dy = pNext.y - p.y;
    const len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len; // perpendicular
    const sign = (i % 2 === 0) ? -1 : 1;
    const offset = 24;
    const x = p.x + nx * sign * offset;
    const y = p.y + ny * sign * offset;
    g.setAttribute("transform", `translate(${x} ${y})`);
  });

  // Wire tooltip on checkpoint hover
  const tip = document.getElementById("journey-tooltip");
  if (!tip) return;
  cpGroups.forEach(g => {
    const id = g.dataset.cpId;
    const a = ACHIEVEMENTS.find(x => x.id === id);
    if (!a) return;
    const earned = g.dataset.cpEarned === "true";
    g.addEventListener("mouseenter", e => {
      tip.innerHTML = `<b>${a.ico} ${a.name}</b><div class="desc">${a.desc}</div><div class="status ${earned ? '' : 'locked'}">${earned ? '✓ Unlocked' : '🔒 Locked'}</div>`;
      tip.classList.add("show");
      const wrap = svg.parentElement.getBoundingClientRect();
      const dot = g.getBoundingClientRect();
      tip.style.left = (dot.left - wrap.left + dot.width / 2) + "px";
      tip.style.top = (dot.top - wrap.top) + "px";
    });
    g.addEventListener("mouseleave", () => tip.classList.remove("show"));
    g.addEventListener("click", () => {
      // Jump to Achievements tab
      const btn = document.querySelector(".tabs button[data-view='achievements']");
      if (btn) btn.click();
    });
  });
}

function renderCalendar(){
  // Build months from SCHEDULE.date list
  const byMonth = {};
  SCHEDULE.forEach(d => {
    const key = `${d.date.getFullYear()}-${String(d.date.getMonth()).padStart(2,'0')}`;
    if (!byMonth[key]) byMonth[key] = { year: d.date.getFullYear(), month: d.date.getMonth(), days: [] };
    byMonth[key].days.push(d);
  });
  const monthNames = ["January","February","March","April","May","June","July","August","September","October","November","December"];
  const dows = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  let html = "";
  Object.values(byMonth).sort((a,b) => (a.year-b.year)||(a.month-b.month)).forEach(m => {
    html += `<div class="calendar-month"><h4>${monthNames[m.month]} ${m.year}</h4>`;
    html += `<div class="cal-grid">`;
    dows.forEach(d => html += `<div class="dow">${d}</div>`);
    // first day of month: figure out leading blanks (Mon=0)
    const firstWeekday = (new Date(m.year, m.month, 1).getDay() + 6) % 7; // shift Sun=6
    for (let i = 0; i < firstWeekday; i++) html += `<div class="cal-cell dim"></div>`;
    // each day of month
    const lastDay = new Date(m.year, m.month + 1, 0).getDate();
    for (let day = 1; day <= lastDay; day++){
      const sched = m.days.find(x => x.date.getDate() === day);
      if (sched){
        const pct = dayPct(sched);
        let cls = "cal-cell has-day";
        if (pct === 100) cls += " p100";
        else if (pct >= 75) cls += " p75";
        else if (pct >= 50) cls += " p50";
        else if (pct >= 25) cls += " p25";
        if (sched.day === currentDay()) cls += " today";
        html += `<div class="${cls}" data-day="${sched.day}" tabindex="0" aria-label="${sched.dateLabel}, Day ${sched.day}, ${pct}% complete" title="Day ${sched.day} · ${sched.title} · ${pct}%">
          <div class="date-num">${day}</div>
          <div class="day-label">D${sched.day}</div>
        </div>`;
      } else {
        html += `<div class="cal-cell dim"><div class="date-num">${day}</div></div>`;
      }
    }
    html += `</div></div>`;
  });
  return html;
}

function renderCharts(){
  // Weekly jars: each week is a fixed-height jar; water fills with tasks done / total
  const weeks = [1,2,3,4,5,6,7,8,"Taper"];
  const weekStats = weeks.map(w => {
    const days = SCHEDULE.filter(d => d.week === w);
    let total = 0, done = 0;
    days.forEach(d => d.slots.forEach((s, si) => s.tasks.forEach((t, ti) => {
      total++;
      if (isDone(`d${d.day}-s${si}-t${ti}`)) done++;
    })));
    return { w, total, done };
  });
  const jars = weekStats.map(s => {
    const fill = s.total ? Math.round(s.done * 100 / s.total) : 0;
    const fullCls = (s.total > 0 && s.done === s.total) ? "jar full" : "jar";
    return `<div class="${fullCls}" title="W${s.w}: ${s.done}/${s.total} (${fill}%)">
      <div class="water" style="height:${fill}%"></div>
      <div class="v">${s.done}</div>
      <div class="lbl">W${s.w}</div>
    </div>`;
  }).join("");

  // DSA-by-difficulty pie
  const dsaCounts = { E: grindDone("E"), M: grindDone("M"), H: grindDone("H") };
  const total = dsaCounts.E + dsaCounts.M + dsaCounts.H || 1;
  const slices = [
    { label: "Easy",   v: dsaCounts.E, color: "#60a5fa" },
    { label: "Medium", v: dsaCounts.M, color: "#fbbf24" },
    { label: "Hard",   v: dsaCounts.H, color: "#f87171" }
  ];
  let cumulative = 0;
  const segments = slices.map(s => {
    const pct = s.v / total;
    const start = cumulative;
    cumulative += pct;
    const end = cumulative;
    return { ...s, start, end };
  });
  const pieSvg = `<svg class="pie" viewBox="-1 -1 2 2" aria-label="DSA solved by difficulty">
    ${segments.map(s => {
      if (s.v === 0) return "";
      const a1 = s.start * Math.PI * 2 - Math.PI / 2;
      const a2 = s.end * Math.PI * 2 - Math.PI / 2;
      const large = (s.end - s.start) > 0.5 ? 1 : 0;
      const x1 = Math.cos(a1), y1 = Math.sin(a1);
      const x2 = Math.cos(a2), y2 = Math.sin(a2);
      // Full circle hack: when there is exactly one slice at 100%, draw two halves.
      if (s.start === 0 && s.end === 1){
        return `<circle cx="0" cy="0" r="1" fill="${s.color}"/>`;
      }
      return `<path d="M 0 0 L ${x1} ${y1} A 1 1 0 ${large} 1 ${x2} ${y2} Z" fill="${s.color}"/>`;
    }).join("")}
    <circle class="pie-hole" cx="0" cy="0" r="0.55" />
    <text class="pie-num"   x="0" y="0.06" text-anchor="middle">${total>0?total:0}</text>
    <text class="pie-label" x="0" y="0.32" text-anchor="middle">solved</text>
  </svg>`;
  const legend = slices.map(s => `<div class="row"><span class="swatch" style="background:${s.color}"></span><span>${s.label} <b>${s.v}</b></span></div>`).join("");

  return `<div class="charts">
    <div class="chart-box"><h4>Weekly progress (jars filling)</h4><div class="jars">${jars}</div></div>
    <div class="chart-box"><h4>DSA by difficulty</h4>${pieSvg}<div class="pie-legend">${legend}</div></div>
  </div>`;
}

function dayPct(d){
  let total = 0, done = 0;
  d.slots.forEach((s, si) => s.tasks.forEach((t, ti) => {
    total++;
    if(isDone(`d${d.day}-s${si}-t${ti}`)) done++;
  }));
  return total ? Math.round(done * 100 / total) : 0;
}

function currentDay(){
  // Calendar-based: which Day N corresponds to today's date?
  const today = new Date();
  today.setHours(0,0,0,0);
  const start = new Date(START_DATE.getTime());
  start.setHours(0,0,0,0);
  const diffDays = Math.floor((today - start) / 86400000) + 1;
  if (diffDays < 1) return 1;            // before start: highlight Day 1
  if (diffDays > 60) return 60;           // after end: highlight Day 60
  return diffDays;
}

function dayCompletedCount(){
  return SCHEDULE.filter(d => dayPct(d) === 100).length;
}

function streak(){
  // consecutive 100% days starting from day 1
  let c = 0;
  for (const d of SCHEDULE){
    if (dayPct(d) === 100) c++;
    else break;
  }
  return c;
}

function renderStandup(){
  const today = SCHEDULE.find(d => d.day === currentDay()) || SCHEDULE[0];
  // Top concept of the day = the most-frequent concept across today's DSA tasks
  const concepts = {};
  today.slots.forEach(s => s.tasks.forEach(t => {
    if (t.type !== "dsa") return;
    t.names.forEach(n => (PROBLEM_CONCEPTS[n] || []).forEach(cid => {
      concepts[cid] = (concepts[cid] || 0) + 1;
    }));
  }));
  const topCid = Object.entries(concepts).sort((a,b) => b[1] - a[1])[0]?.[0];
  const topConcept = topCid ? CONCEPTS[topCid] : null;

  // Today's task counts
  let total = 0, done = 0;
  today.slots.forEach((s, si) => s.tasks.forEach((t, ti) => {
    total++;
    if (isDone(`d${today.day}-s${si}-t${ti}`)) done++;
  }));

  // Mistake-log items (split by due bucket)
  const mistakes = buildMistakeLog();
  const overdueMistakes = mistakes.filter(m => m.dueAt === 0);
  const upcomingMistakes = mistakes.filter(m => m.dueAt > 0 && m.dueAt < 1);

  // Concept gaps: concepts where the user has seen ≥3 problems but solved <50%
  const gaps = computeConceptGaps();

  let revisitHTML = "";
  if (overdueMistakes.length > 0 || upcomingMistakes.length > 0){
    const top = [...overdueMistakes, ...upcomingMistakes].slice(0, 3);
    revisitHTML = `<div style="margin-top:10px;padding:10px 14px;background:rgba(248,113,113,.06);border-left:3px solid var(--hard);border-radius:4px">
      <div style="font-size:11px;color:var(--hard);text-transform:uppercase;letter-spacing:.06em;font-weight:700">🔁 Spaced repetition queue</div>
      <div style="margin-top:6px;font-size:13px;line-height:1.5">
        <b>${overdueMistakes.length}</b> overdue · <b>${upcomingMistakes.length}</b> due today.
        ${top.length ? `Top: ${top.map(m => `<a href="#" class="sd-deeplink" data-sd-deeplink="standup-revisit:${m.id}">${m.label.split(",")[0]}</a>`).join(" · ")}` : ""}
        <a href="#" class="sd-deeplink" data-sd-deeplink="tab:mistakes" style="margin-left:6px">→ open Mistakes</a>
      </div>
    </div>`;
  }

  let gapsHTML = "";
  if (gaps.length > 0){
    const top = gaps.slice(0, 2);
    gapsHTML = `<div style="margin-top:8px;padding:10px 14px;background:rgba(192,132,252,.06);border-left:3px solid var(--accent-3);border-radius:4px">
      <div style="font-size:11px;color:var(--accent-3);text-transform:uppercase;letter-spacing:.06em;font-weight:700">🎯 Weak concepts (re-watch the animation)</div>
      <div style="margin-top:6px;font-size:13px;line-height:1.5">
        ${top.map(g => `<a href="#" class="sd-deeplink" data-sd-deeplink="dsaconcept:${g.cid}"><b>${g.name}</b></a> <span style="color:var(--muted)">(${g.solved}/${g.attempted} solved · ${Math.round(g.rate*100)}%)</span>`).join(" · ")}
      </div>
    </div>`;
  }

  return `<div class="standup">
    <h3>📌 Today's standup</h3>
    <div class="focus"><span class="day">Day ${today.day} · ${today.dateLabel || today.dow}:</span> ${today.title}</div>
    ${topConcept ? `<div class="refresh">Refresh first: <b data-standup-concept="${topCid}">${topConcept.name}</b> — ${topConcept.summary}</div>` : ""}
    <div class="meta-row">
      <span>Today: <b>${done}/${total}</b> tasks</span>
      <span>🔥 Streak: <b>${streak()}</b></span>
      <span>� Revisits: <b style="color:${overdueMistakes.length ? 'var(--hard)' : 'var(--ok)'}">${overdueMistakes.length}</b> overdue</span>
      ${settings.name ? `<span style="margin-left:auto">Let's go, <b>${settings.name}</b> 💪</span>` : ""}
    </div>
    ${revisitHTML}
    ${gapsHTML}
    <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
      <button class="icon primary" id="standup-focus" title="Focus mode: only show today's morning slot with timer">🎯 Focus next 30 min</button>
      <button class="icon" id="standup-resume" title="Jump to next unfinished task">⏵ Resume</button>
    </div>
  </div>`;
}

// ───── focus mode ─────
let _focusTimer = null;
// Pomodoro intervals (minutes)
const POMO_WORK = 25;
const POMO_BREAK = 5;
const POMO_LONG_BREAK = 15;
const POMO_CYCLES_BEFORE_LONG = 4;
function enterFocusMode(){
  const today = SCHEDULE.find(d => d.day === currentDay()) || SCHEDULE[0];
  // Pick the slot most likely intended for this time of day
  const hour = new Date().getHours();
  let slotIdx;
  if (today.slots.length <= 3){
    // weekday: AM=0, LU=1, NT=2
    if (hour < 11) slotIdx = 0;
    else if (hour < 14) slotIdx = 1;
    else slotIdx = 2;
  } else {
    // weekend: pick the first slot not yet 100% complete
    slotIdx = today.slots.findIndex((s, si) => {
      const total = s.tasks.length;
      const done = s.tasks.filter((t, ti) => isDone(`d${today.day}-s${si}-t${ti}`)).length;
      return done < total;
    });
    if (slotIdx === -1) slotIdx = 0;
  }
  renderFocusMode(today, slotIdx);
}
function renderFocusMode(today, slotIdx){
  const slot = today.slots[slotIdx];
  if (!slot) return;
  const overlay = document.getElementById("focus-overlay");
  overlay.style.display = "block";
  const totalMins = parseInt(slot.time, 10) || 30;
  const total = slot.tasks.length;
  const done = slot.tasks.filter((t, ti) => isDone(`d${today.day}-s${slotIdx}-t${ti}`)).length;
  let inner = "";
  slot.tasks.forEach((t, ti) => {
    const id = `d${today.day}-s${slotIdx}-t${ti}`;
    inner += renderTaskHTML(id, t);
  });

  // ── pomodoro state (ephemeral; cycles persist across pause/resume but not across slot switches) ──
  const pomoOn = !!settings.pomodoro;
  // phase: "work" | "break" | "longbreak"
  let phase = "work";
  let cyclesDone = 0; // completed work cycles
  // Initial duration label
  const initialMins = pomoOn ? POMO_WORK : totalMins;

  overlay.innerHTML = `<div class="focus-card">
    <button class="exit-focus" data-exit-focus title="Exit focus mode and return to the schedule.">✕ Exit focus</button>
    <div class="sub">DAY ${today.day} · ${today.dateLabel || today.dow}</div>
    <h2>🎯 ${slot.slot}${pomoOn ? "" : ` — ${totalMins} minutes`}</h2>
    <div class="sub">${today.title} · ${done}/${total} done${pomoOn ? ` · This slot is ${totalMins} min (informational)` : ""}</div>
    <div class="pomo-state ${pomoOn ? 'work' : ''}" id="pomo-state" style="${pomoOn ? '' : 'display:none'}">🔴 Work 1/${POMO_CYCLES_BEFORE_LONG}</div>
    <div class="pomo-dots" id="pomo-dots" style="${pomoOn ? '' : 'display:none'}">
      ${Array.from({length: POMO_CYCLES_BEFORE_LONG}).map((_, i) =>
        `<div class="pomo-dot ${i === 0 ? 'current' : ''}" data-pomo-dot="${i}"></div>`).join("")}
    </div>
    <div class="focus-timer" id="focus-timer">${initialMins}:00</div>
    <div class="pomo-break-msg" id="pomo-break-msg" style="display:none">
      <b>☕ Take a break</b> — stretch, water, look out a window.
    </div>
    <div class="focus-controls">
      <button class="primary" data-focus-action="start" title="Start the focus-mode countdown timer.">▶ Start</button>
      <button data-focus-action="pause" title="Pause the focus-mode countdown timer.">⏸ Pause</button>
      <button data-focus-action="reset" title="Reset the focus-mode countdown timer.">↺ Reset</button>
      <button class="pomo-toggle ${pomoOn ? 'on' : ''}" data-focus-action="pomo" title="Toggle Pomodoro mode (25-min work / 5-min break cycles, 15-min long break every 4).">🍅 Pomodoro: ${pomoOn ? 'on' : 'off'}</button>
      <button data-focus-action="prev" title="Jump to the previous slot in this day.">← Prev slot</button>
      <button data-focus-action="next" title="Jump to the next slot in this day.">Next slot →</button>
    </div>
    <div class="tasks-list" id="focus-tasks-list">
      <ul class="tasks">${inner}</ul>
    </div>
  </div>`;
  // Wire task interactions inside focus mode
  wireScheduleInteractions(overlay);

  // Timer
  const timerEl = document.getElementById("focus-timer");
  const stateEl = document.getElementById("pomo-state");
  const dotsEl = document.getElementById("pomo-dots");
  const breakMsgEl = document.getElementById("pomo-break-msg");
  const tasksListEl = document.getElementById("focus-tasks-list");
  let endsAt = null;
  let _pausedAt = null;
  // currentDurationMins reflects whatever the active timer should show on Reset.
  let currentDurationMins = pomoOn ? POMO_WORK : totalMins;

  function fmt(ms){
    const totalSec = Math.max(0, Math.round(ms / 1000));
    const m = Math.floor(totalSec / 60);
    const s = totalSec % 60;
    return `${m}:${String(s).padStart(2,"0")}`;
  }
  function updatePomoUI(){
    if (!pomoOn) return;
    // dots: filled = completed work cycles, current = the one in progress
    dotsEl.querySelectorAll(".pomo-dot").forEach((d, i) => {
      d.classList.toggle("filled", i < cyclesDone);
      d.classList.toggle("current", phase === "work" && i === cyclesDone);
    });
    stateEl.classList.remove("work", "brk", "lbrk");
    if (phase === "work"){
      stateEl.classList.add("work");
      stateEl.textContent = `🔴 Work ${Math.min(cyclesDone + 1, POMO_CYCLES_BEFORE_LONG)}/${POMO_CYCLES_BEFORE_LONG}`;
      breakMsgEl.style.display = "none";
      tasksListEl.classList.remove("dimmed");
    } else if (phase === "break"){
      stateEl.classList.add("brk");
      stateEl.textContent = `☕ Break (${POMO_BREAK} min)`;
      breakMsgEl.innerHTML = `<b>☕ Take a break</b> — stretch, water, look out a window.`;
      breakMsgEl.style.display = "block";
      tasksListEl.classList.add("dimmed");
    } else {
      stateEl.classList.add("lbrk");
      stateEl.textContent = `🌴 Long break (${POMO_LONG_BREAK} min)`;
      breakMsgEl.innerHTML = `<b>🌴 Long break</b> — you earned it. Stand up, walk away from the screen.`;
      breakMsgEl.style.display = "block";
      tasksListEl.classList.add("dimmed");
    }
  }
  function phaseDurationMins(){
    if (!pomoOn) return totalMins;
    if (phase === "work") return POMO_WORK;
    if (phase === "break") return POMO_BREAK;
    return POMO_LONG_BREAK;
  }
  function tick(){
    if (!endsAt) return;
    const left = endsAt - Date.now();
    timerEl.textContent = fmt(left);
    timerEl.classList.toggle("warning", left < 5*60*1000 && left > 0);
    if (left <= 0){
      clearInterval(_focusTimer); _focusTimer = null;
      timerEl.classList.remove("running","warning"); timerEl.classList.add("done");
      timerEl.textContent = "0:00";
      if (!pomoOn){
        timerEl.textContent = "0:00 — done!";
        ding();
        toast("⏰ Slot complete. Take a 5-min break.");
        return;
      }
      // Pomodoro: advance phase
      if (phase === "work"){
        cyclesDone += 1;
        ding();
        if (cyclesDone >= POMO_CYCLES_BEFORE_LONG){
          phase = "longbreak";
          toast(`🌴 ${cyclesDone} cycles done — long break (${POMO_LONG_BREAK} min) starting.`);
        } else {
          phase = "break";
          toast(`☕ Cycle ${cyclesDone} done — ${POMO_BREAK}-min break starting.`);
        }
        currentDurationMins = phaseDurationMins();
        updatePomoUI();
        // Auto-advance into break
        endsAt = Date.now() + currentDurationMins * 60 * 1000;
        _focusTimer = setInterval(tick, 500);
        timerEl.classList.add("running"); timerEl.classList.remove("done");
        tick();
      } else {
        // break or longbreak finished → ring + notify and pause until user clicks Start
        ding();
        if (phase === "longbreak"){
          cyclesDone = 0; // start a fresh round of 4
          toast("🔔 Long break done. Click ▶ Start when you're ready for the next work block.");
        } else {
          toast("🔔 Break done. Click ▶ Start when you're ready for the next work block.");
        }
        try {
          if (typeof Notification !== "undefined" && Notification.permission === "granted"){
            new Notification("Break done", { body: "Click ▶ Start when you're ready for the next work block." });
          } else if (typeof Notification !== "undefined" && Notification.permission === "default"){
            Notification.requestPermission();
          }
        } catch(_) {}
        // Set up next work block but DO NOT auto-start
        phase = "work";
        currentDurationMins = phaseDurationMins();
        endsAt = null;
        _pausedAt = null;
        timerEl.textContent = `${currentDurationMins}:00`;
        updatePomoUI();
      }
    }
  }
  function start(){
    if (_focusTimer) return;
    if (!endsAt){
      endsAt = Date.now() + currentDurationMins * 60 * 1000;
    } else if (_pausedAt){
      // resume from paused
      endsAt = Date.now() + (endsAt - _pausedAt);
      _pausedAt = null;
    }
    _focusTimer = setInterval(tick, 500);
    timerEl.classList.add("running"); timerEl.classList.remove("done");
    tick();
  }
  function pause(){
    if (!_focusTimer) return;
    clearInterval(_focusTimer); _focusTimer = null;
    _pausedAt = Date.now();
    timerEl.classList.remove("running");
  }
  function reset(){
    pause(); endsAt = null; _pausedAt = null;
    if (pomoOn){
      phase = "work";
      cyclesDone = 0;
      currentDurationMins = POMO_WORK;
      updatePomoUI();
    } else {
      currentDurationMins = totalMins;
    }
    timerEl.classList.remove("running","warning","done");
    timerEl.textContent = `${currentDurationMins}:00`;
  }
  // Initial UI sync
  updatePomoUI();

  overlay.querySelector("[data-focus-action='start']").addEventListener("click", start);
  overlay.querySelector("[data-focus-action='pause']").addEventListener("click", pause);
  overlay.querySelector("[data-focus-action='reset']").addEventListener("click", reset);
  overlay.querySelector("[data-focus-action='pomo']").addEventListener("click", () => {
    settings.pomodoro = !settings.pomodoro; saveSettings();
    // Cleanly re-render this slot under the new setting (also resets cycles/timer)
    if (_focusTimer){ clearInterval(_focusTimer); _focusTimer = null; }
    renderFocusMode(today, slotIdx);
  });
  overlay.querySelector("[data-focus-action='prev']").addEventListener("click", () => {
    pause(); if (slotIdx > 0) renderFocusMode(today, slotIdx - 1);
  });
  overlay.querySelector("[data-focus-action='next']").addEventListener("click", () => {
    pause(); if (slotIdx < today.slots.length - 1) renderFocusMode(today, slotIdx + 1);
  });
  overlay.querySelector("[data-exit-focus]").addEventListener("click", exitFocusMode);
  // Esc to exit
  const escHandler = e => {
    if (e.key === "Escape"){ exitFocusMode(); document.removeEventListener("keydown", escHandler); }
  };
  document.addEventListener("keydown", escHandler);
}
function exitFocusMode(){
  if (_focusTimer){ clearInterval(_focusTimer); _focusTimer = null; }
  const overlay = document.getElementById("focus-overlay");
  overlay.style.display = "none";
  overlay.innerHTML = "";
}
window.enterFocusMode = enterFocusMode;
window.exitFocusMode = exitFocusMode;

// ───── concept gaps: where a user has attempted but is failing ─────
function computeConceptGaps(){
  // For each concept: count how many problems involve it AND the user has seen
  // (defined as: at least one DSA task containing that problem is checked or tagged in mistake log).
  // Solved = checked but NOT in mistake-revisit state.
  const seen = {};   // cid -> { attempted, solved }
  Object.entries(PROBLEM_CONCEPTS).forEach(([name, cids]) => {
    const meta = DSA[name]; if (!meta) return;
    const slug = meta[0];
    // attempted if there's a solveTimes entry OR the user has marked it for revisit
    const hasTimer = !!solveTimes[slug];
    const inMistake = Object.entries(notes).some(([id, n]) => {
      if (!n.revisit) return false;
      // notes id format: dN-sI-tI; we don't keep slug there. Use a heuristic: search by problem name in the SCHEDULE
      return false;
    });
    // Better signal: check if any DSA task containing this problem in the schedule is checked.
    let scheduledChecked = false;
    let scheduledFlagged = false;
    SCHEDULE.forEach(d => d.slots.forEach((s, si) => s.tasks.forEach((t, ti) => {
      if (t.type !== "dsa" || !t.names.includes(name)) return;
      const tid = `d${d.day}-s${si}-t${ti}`;
      if (isDone(tid)) scheduledChecked = true;
      const note = notes[tid];
      if (note && note.revisit) scheduledFlagged = true;
    })));
    const attempted = hasTimer || scheduledChecked || scheduledFlagged;
    const solved = scheduledChecked && !scheduledFlagged;  // checked off AND not flagged for revisit
    if (!attempted) return;
    cids.forEach(cid => {
      seen[cid] = seen[cid] || { attempted: 0, solved: 0 };
      seen[cid].attempted += 1;
      if (solved) seen[cid].solved += 1;
    });
  });
  // Gap = ≥3 attempts AND solve rate <60%
  const gaps = [];
  Object.entries(seen).forEach(([cid, stats]) => {
    if (stats.attempted < 3) return;
    const rate = stats.solved / stats.attempted;
    if (rate >= 0.6) return;
    const c = CONCEPTS[cid];
    gaps.push({ cid, name: c ? c.name : cid, ...stats, rate });
  });
  gaps.sort((a, b) => a.rate - b.rate);
  return gaps;
}


function renderSchedule(filter){
  // filter: "today" | "all" | "1".."8" | "Taper"
  const cont = document.getElementById("view-schedule");
  cont.innerHTML = "";

  // First-run tip banner (only on Today view, before any progress, until dismissed)
  const isFirstRun = Object.keys(state).length === 0 && !settings.dismissedFirstRunTip;
  if (filter === "today" && isFirstRun){
    cont.insertAdjacentHTML("beforeend", `<div class="first-run-tip" id="first-run-tip">
      <button class="dismiss" id="first-run-dismiss" title="Got it, hide this." aria-label="Dismiss tip">✕</button>
      👋 <b>First time here?</b> Tip: tap the <b>⏵ Resume</b> button up top to jump
      to your next task. Press <span class="kbd">?</span> for the keyboard-shortcut sheet.
    </div>`);
  }

  // Standup card (only in Today view)
  if (filter === "today") cont.insertAdjacentHTML("beforeend", renderStandup());

  // Heatmap + quote always at top
  cont.insertAdjacentHTML("beforeend", renderHeatmap());
  // Lay out the SVG journey path (positions vehicle, checkpoint dots, week ticks)
  if (typeof layoutJourneySVG === "function") layoutJourneySVG();
  const [q, who] = quoteOfDay();
  cont.insertAdjacentHTML("beforeend", `<div class="quote">${q}<span class="who">— ${who}</span></div>`);

  let lastWeek = null;
  const todayDay = currentDay();
  SCHEDULE.forEach(d => {
    let visible = true;
    let openByDefault = false;
    if (filter === "today") {
      visible = (d.day === todayDay) || (d.day === todayDay + 1);
      openByDefault = (d.day === todayDay);
    } else if (filter !== "all" && filter !== undefined) {
      visible = String(d.week) === String(filter);
      openByDefault = visible && (d.day === todayDay);
    }
    if (!visible) return;

    if (d.week !== lastWeek) {
      cont.insertAdjacentHTML("beforeend", phaseBanner(d.week));
      lastWeek = d.week;
    }
    let totalTasks = 0, doneTasks = 0;
    let bodyHTML = "";
    d.slots.forEach((s, si) => {
      let inner = "";
      s.tasks.forEach((t, ti) => {
        const id = `d${d.day}-s${si}-t${ti}`;
        totalTasks++;
        if (isDone(id)) doneTasks++;
        inner += renderTaskHTML(id, t);
      });
      const timerKey = `d${d.day}-s${si}`;
      const timerMin = parseInt(s.time, 10) || 0;
      const timerHTML = timerMin > 0
        ? `<button class="timer-btn" data-timer="${timerKey}" data-mins="${timerMin}">▶ ${timerMin}m</button>`
        : "";
      bodyHTML += `<div class="block"><div class="block-head"><b>${s.slot}</b>${s.time?` · ${s.time} min`:""}${timerHTML}</div><ul class="tasks">${inner}</ul></div>`;
    });    const pct = totalTasks ? Math.round(doneTasks*100/totalTasks) : 0;
    const completedCls = pct === 100 ? "completed" : "";
    const open = openByDefault ? "open" : "";
    const todayMarker = (d.day === todayDay) ? '<span style="color:var(--accent-3);font-weight:700;margin-left:6px">◀ TODAY</span>' : '';
    cont.insertAdjacentHTML("beforeend",
      `<div class="day ${open} ${completedCls}" data-day="${d.day}">
         <div class="day-head">
           <div class="day-head-left"><button class="day-copy" data-copy-day="${d.day}" title="Copy today's plan to clipboard as plain text.">📋 Copy</button><span class="day-num">DAY ${String(d.day).padStart(2,"0")}</span><span class="day-title">${d.dateLabel || (d.dow + " ·")} · ${d.title}${todayMarker}</span></div>
           <div class="day-pct"><b>${doneTasks}</b>/${totalTasks} · ${pct}%</div>
         </div>
         <div class="day-body">${bodyHTML}</div>
       </div>`);
  });

  wireScheduleInteractions(cont);

  // Auto-scroll to today's card on first paint of "all" / week views so the
  // user lands at "what's due today" instead of week 1 row 1. Skip in Today
  // view since today's card is the only thing visible.
  if (filter !== "today"){
    requestAnimationFrame(() => {
      const todayEl = cont.querySelector(`.day[data-day="${todayDay}"]`);
      if (todayEl){
        // Open today's card automatically
        todayEl.classList.add("open");
        // Soft scroll into view (top of viewport with a small offset)
        const rect = todayEl.getBoundingClientRect();
        const out = rect.top < 0 || rect.top > (window.innerHeight - 100);
        if (out) todayEl.scrollIntoView({ behavior: "smooth", block: "start" });
      }
    });
  }
  // Focus mode: re-decorate the next-task highlight after every schedule render
  if (typeof applyFocusModeDecorations === "function" && document.body.classList.contains("mode-focus")){
    requestAnimationFrame(() => applyFocusModeDecorations(true));
  }
}

function wireScheduleInteractions(cont){
  // First-run tip dismiss (only present on first render of Today view before any progress)
  const dismissBtn = cont.querySelector("#first-run-dismiss");
  if (dismissBtn) dismissBtn.addEventListener("click", () => {
    settings.dismissedFirstRunTip = true; saveSettings();
    const banner = cont.querySelector("#first-run-tip");
    if (banner) banner.remove();
  });
  // Sleek mode: clicking a "rich" task row toggles its expanded state. Rich =
  // DSA tasks (timer/why/prep), or any task that uses an in-app deeplink
  // (.sd-deeplink), since those rows have a "Why today" + summary that's
  // worth tucking away. Plain text rows (rev / note / lp / be / mk / lab
  // without deeplink) are left alone.
  cont.querySelectorAll("ul.tasks > li").forEach(li => {
    const taskText = li.querySelector(":scope > span.task-text");
    const isDsa = li.querySelector(":scope > span > .tag.t-DSA, :scope > span > .dsa-problem-row");
    const isRich = !!li.querySelector(":scope > span > .sd-deeplink");
    if (!isDsa && !isRich) return;
    if (isRich && !isDsa) li.setAttribute("data-collapsible", "1");
    li.addEventListener("click", e => {
      const t = e.target;
      if (t.closest("input, a, button, .concept-chip, .note-toggle, textarea, label, .ttimer, .why-toggle, .prep-toggle, .dsa-sub-check, details, summary")) return;
      li.classList.toggle("expanded");
    });
  });
  cont.querySelectorAll(".day-head").forEach(h => h.addEventListener("click", () => h.parentElement.classList.toggle("open")));
  // Sleek mode: a topic-row is open by default in source order (so non-sleek
  // shows everything), but the sleek CSS hides children. Toggling
  // `.user-opened` on click reveals them in sleek too.
  cont.querySelectorAll("details.topic-row > summary").forEach(s => s.addEventListener("click", () => {
    setTimeout(() => s.parentElement.classList.toggle("user-opened"), 0);
  }));
  cont.querySelectorAll(".cell, .cal-cell.has-day").forEach(c => c.addEventListener("click", () => {
    const targetDay = c.dataset.day;
    if (!targetDay) return;
    document.querySelector(".tabs button[data-view='schedule']").click();
    // ensure "all" view so the target day is rendered
    setViewMode("all");
    setTimeout(() => {
      const el = document.querySelector(`.day[data-day='${targetDay}']`);
      if (el){ el.classList.add("open"); el.scrollIntoView({behavior:"smooth", block:"center"}); }
    }, 100);
  }));
  cont.querySelectorAll(".heatmap-tabs button").forEach(b => b.addEventListener("click", () => {
    settings.heatmap = b.dataset.hm; saveSettings();
    renderSchedule(activeFilter());
  }));
  cont.querySelectorAll("[data-standup-concept]").forEach(b => b.addEventListener("click", () => {
    openConceptModal(b.dataset.standupConcept);
  }));
  cont.querySelectorAll("input[type=checkbox][data-id]").forEach(cb => {
    cb.addEventListener("change", e => {
      const dayEl = cb.closest(".day");
      const wasComplete = dayEl.classList.contains("completed");
      setDone(cb.dataset.id, cb.checked);
      cb.parentElement.querySelector(".task-text").classList.toggle("done", cb.checked);
      // cascade to per-problem sub-checkboxes (if any) — parent checked = all problems done
      const li = cb.closest("li");
      if (li){
        li.querySelectorAll('input[type=checkbox].dsa-sub-check').forEach(sub => {
          sub.checked = cb.checked;
          setDone(sub.dataset.subid, cb.checked);
          const titleEl = li.querySelector(`[data-sub-title="${sub.dataset.subid}"]`);
          if (titleEl) titleEl.classList.toggle("done", cb.checked);
        });
      }
      const all = dayEl.querySelectorAll("input[type=checkbox][data-id]");
      const done = [...all].filter(c=>c.checked).length;
      const pct = all.length ? Math.round(done*100/all.length) : 0;
      dayEl.querySelector(".day-pct").innerHTML = `<b>${done}</b>/${all.length} · ${pct}%`;
      const nowComplete = pct === 100;
      dayEl.classList.toggle("completed", nowComplete);
      if (nowComplete && !wasComplete){
        celebrateDay(parseInt(dayEl.dataset.day, 10));
        checkWeekCompletion(parseInt(dayEl.dataset.day, 10));
      }
    });
    if(cb.checked) cb.parentElement.querySelector(".task-text").classList.add("done");
  });
  // Per-problem sub-checkboxes (DSA tasks with 2+ names)
  cont.querySelectorAll("input[type=checkbox].dsa-sub-check").forEach(sub => {
    sub.addEventListener("change", e => {
      e.stopPropagation();
      const subId = sub.dataset.subid;
      const parentId = sub.dataset.parentId;
      setDone(subId, sub.checked);
      const li = sub.closest("li");
      const titleEl = li.querySelector(`[data-sub-title="${subId}"]`);
      if (titleEl) titleEl.classList.toggle("done", sub.checked);
      // Sync parent: parent checked iff every sub-checkbox in this li is checked
      const subs = [...li.querySelectorAll('input[type=checkbox].dsa-sub-check')];
      const allDone = subs.every(s => s.checked);
      const parentCb = li.querySelector(`input[type=checkbox][data-id="${parentId}"]`);
      if (parentCb && parentCb.checked !== allDone){
        parentCb.checked = allDone;
        setDone(parentId, allDone);
        li.querySelector(".task-text").classList.toggle("done", allDone);
        // Update day card progress display
        const dayEl = sub.closest(".day");
        if (dayEl){
          const wasComplete = dayEl.classList.contains("completed");
          const all = dayEl.querySelectorAll("input[type=checkbox][data-id]");
          const done = [...all].filter(c=>c.checked).length;
          const pct = all.length ? Math.round(done*100/all.length) : 0;
          dayEl.querySelector(".day-pct").innerHTML = `<b>${done}</b>/${all.length} · ${pct}%`;
          const nowComplete = pct === 100;
          dayEl.classList.toggle("completed", nowComplete);
          if (nowComplete && !wasComplete){
            celebrateDay(parseInt(dayEl.dataset.day, 10));
            checkWeekCompletion(parseInt(dayEl.dataset.day, 10));
          }
        }
      }
    });
  });
  cont.querySelectorAll(".note-toggle").forEach(t => t.addEventListener("click", e => {
    e.stopPropagation();
    const id = t.dataset.noteid;
    const li = t.closest("li");
    const ta = li.querySelector(`textarea.note-input[data-noteid="${id}"]`);
    const lbl = li.querySelector(`label[data-noteid="${id}"]`);
    const isOpen = ta.style.display === "block";
    ta.style.display = lbl.style.display = isOpen ? "none" : "block";
    if (!isOpen) ta.focus();
  }));
  cont.querySelectorAll("textarea.note-input").forEach(ta => {
    ta.addEventListener("input", () => {
      const id = ta.dataset.noteid;
      setNote(id, {text: ta.value});
      const tog = ta.closest("li").querySelector(".note-toggle");
      if (tog) tog.classList.toggle("has-note", !!ta.value || getNote(id).revisit);
    });
  });
  cont.querySelectorAll(".note-revisit").forEach(cb => {
    cb.addEventListener("change", () => {
      const id = cb.dataset.noteid;
      const cur = getNote(id);
      const ts = cur.timestamps || [];
      if (cb.checked && ts.length === 0) ts.push(Date.now());
      if (cb.checked){
        // Newly flagged → seed SM-2 defaults; if previously flagged & cleared,
        // start a fresh schedule from now.
        const initialTs = ts[0] || Date.now();
        setNote(id, {revisit: true, timestamps: ts, ...sm2Defaults(initialTs)});
      } else {
        setNote(id, {revisit: false, timestamps: ts});
      }
      const tog = cb.closest("li").querySelector(".note-toggle");
      if (tog){
        tog.classList.toggle("has-note", cb.checked || !!cur.text);
        tog.textContent = cb.checked ? "🔁" : (cur.text ? "📝" : "+");
      }
      toast(cb.checked ? "📝 Added to mistake log · revisit in 3 days (SM-2 lite)" : "Removed from mistake log");
    });
  });
  cont.querySelectorAll(".timer-btn").forEach(b => b.addEventListener("click", e => {
    e.stopPropagation();
    startTimer(b);
  }));
  // concept chips: click opens concept modal
  cont.querySelectorAll(".concept-chip").forEach(chip => chip.addEventListener("click", e => {
    e.stopPropagation();
    e.preventDefault();
    openConceptModal(chip.dataset.concept);
  }));
  // WHY toggles
  cont.querySelectorAll(".why-toggle").forEach(b => b.addEventListener("click", e => {
    e.stopPropagation();
    const slug = b.dataset.whySlug;
    const txt = cont.querySelector(`[data-why-text="${slug}"]`);
    if (txt) txt.classList.toggle("open");
  }));
  // pre-flight removed — was unhelpful clutter
  // per-problem timers
  cont.querySelectorAll(".ttimer").forEach(b => b.addEventListener("click", e => {
    e.stopPropagation();
    const slug = b.dataset.ttimerSlug;
    startStopTimer(slug, b);
  }));
  // SD deep-links from schedule rows
  cont.querySelectorAll(".sd-deeplink").forEach(a => a.addEventListener("click", e => {
    e.preventDefault(); e.stopPropagation();
    const [kind, id] = a.dataset.sdDeeplink.split(":");
    if (kind === "concept") openSDConceptModal(id);
    else if (kind === "dsaconcept") openConceptModal(id);
    else if (kind === "problem") openSDProblemModal(id);
    else if (kind === "beconcept") openBEConceptModal(id);
    else if (kind === "beproject") openBEProjectModal(id);
    else if (kind === "lp") jumpToLP(id);
    else if (kind === "lxconcept") openLXConceptModal(id);
    else if (kind === "lxlab") openLXLabModal(id);
    else if (kind === "mockprep") openMockPrepModal(id);
    else if (kind === "mockplaybook") openMockPlaybookModal(id);
    else if (kind === "tab") {
      const btn = document.querySelector(`.tabs button[data-view="${id}"]`);
      if (btn) btn.click();
    }
    else if (kind === "standup-revisit") {
      // jump to that mistake's day
      const m = id.match(/^d(\d+)-/);
      if (m) {
        const day = parseInt(m[1], 10);
        document.querySelector(".tabs button[data-view='schedule']").click();
        setViewMode("all");
        setTimeout(() => {
          const el = document.querySelector(`.day[data-day='${day}']`);
          if (el){ el.classList.add("open"); el.scrollIntoView({behavior:"smooth", block:"center"}); }
        }, 100);
      }
    }
  }));
  // Standup buttons
  const focusBtn = cont.querySelector("#standup-focus");
  if (focusBtn) focusBtn.addEventListener("click", () => enterFocusMode());
  const resumeBtn2 = cont.querySelector("#standup-resume");
  if (resumeBtn2) resumeBtn2.addEventListener("click", () => document.getElementById("resume").click());
  // Copy-day-as-plaintext
  cont.querySelectorAll(".day-copy").forEach(b => b.addEventListener("click", async e => {
    e.stopPropagation();
    const day = parseInt(b.dataset.copyDay, 10);
    const text = buildDayText(day);
    try {
      await navigator.clipboard.writeText(text);
      b.classList.add("ok"); b.textContent = "✓ Copied";
      setTimeout(() => { b.classList.remove("ok"); b.textContent = "📋 Copy"; }, 1500);
      toast("📋 Day plan copied to clipboard");
    } catch (err){
      // Fallback: open modal with the text so user can copy manually
      showModal(`<button class="close" onclick="closeModal()">✕</button>
        <h2>📋 Day ${day} Plan</h2>
        <p style="color:var(--muted);font-size:12px">Couldn't auto-copy — select all and copy.</p>
        <textarea readonly style="width:100%;height:60vh;background:var(--bg-2);border:1px solid var(--line);color:var(--fg);font-family:ui-monospace,monospace;font-size:12px;padding:10px;border-radius:6px">${text.replace(/</g,"&lt;")}</textarea>`);
    }
  }));
  // prep-card toggles for DSA tasks (Daily Schedule + Focus Mode reuse this)
  if (typeof wirePrepToggles === "function") wirePrepToggles(cont);
}

// Build a plain-text snapshot of one day's plan (good for phone / paper)
function buildDayText(dayNum){
  const d = SCHEDULE.find(x => x.day === dayNum);
  if (!d) return "";
  const lines = [];
  lines.push(`AMAZON SDE TRACKER — DAY ${d.day}`);
  if (d.dateLabel) lines.push(d.dateLabel);
  lines.push(d.title);
  lines.push("=".repeat(50));
  d.slots.forEach(s => {
    lines.push("");
    lines.push(`▌ ${s.slot}${s.time ? ` (${s.time} min)` : ""}`);
    lines.push("-".repeat(50));
    s.tasks.forEach(t => {
      lines.push(taskToText(t));
    });
  });
  lines.push("");
  lines.push("=".repeat(50));
  lines.push("Generated from your 60-day Amazon SDE tracker.");
  return lines.join("\n");
}

function taskToText(t){
  if (t.type === "dsa"){
    const items = (t.names || []).map(n => {
      const meta = (typeof DSA !== 'undefined') ? DSA[n] : null;
      const diff = meta ? `[${meta[2] ? meta[1] + "·P" : meta[1]}]` : "";
      const slug = meta ? meta[0] : null;
      const url = slug ? `\n     https://leetcode.com/problems/${slug}/` : "";
      const concepts = (typeof PROBLEM_CONCEPTS !== 'undefined' && PROBLEM_CONCEPTS[n])
        ? `\n     concepts: ${PROBLEM_CONCEPTS[n].map(cid => CONCEPTS[cid]?.name || cid).join(", ")}`
        : "";
      const prep = (typeof prepLookup === "function") ? prepLookup(n) : null;
      const prepBlock = prep ? "\n" + prepToPlainText(prep) : "";
      return `  • DSA  ${n} ${diff}${url}${concepts}${prepBlock}`;
    });
    return items.join("\n");
  }
  if (t.type === "rev") return `  • REVIEW  ${t.text}`;
  if (t.type === "revQ"){
    const v = (typeof PROBLEM_VARIATIONS !== 'undefined') ? PROBLEM_VARIATIONS[t.problemName] : null;
    if (!v) return `  • REVIEW  Re-solve "${t.problemName}" from scratch (no peeking).`;
    return `  • REVIEW QUIZ\n     ${v.variation}\n     Step 1 (no peeking): name the concepts.\n     Step 2 (reveal): variation of "${t.problemName}" — concepts: ${(v.concepts||[]).map(cid => CONCEPTS[cid]?.name || cid).join(", ")}`;
  }
  if (t.type === "sd"){
    const links = (t.links || []).map(([n,u]) => `     ${n}: ${u}`).join("\n");
    return `  • SD  ${t.text}${links ? "\n" + links : ""}`;
  }
  if (t.type === "sdc"){
    const c = (typeof SD_CONCEPTS !== 'undefined') ? SD_CONCEPTS.find(x => x.id === t.conceptId) : null;
    return `  • SD  Concept: ${c ? c.name : t.conceptId}\n     Why: ${t.why}${c ? "\n     " + c.summary : ""}`;
  }
  if (t.type === "sdp"){
    const p = (typeof SD_PROBLEMS !== 'undefined') ? SD_PROBLEMS.find(x => x.id === t.problemId) : null;
    return `  • SD  Walk-through: ${p ? p.name : t.problemId}\n     Why: ${t.why}${p ? "\n     " + p.summary : ""}`;
  }
  if (t.type === "lpc"){
    const lp = (typeof LP_DATA !== 'undefined') ? LP_DATA.find(x => x.id === t.lpId) : null;
    const name = t.lpId === "all" ? "All LPs" : (lp ? lp.name : t.lpId);
    return `  • LP  ${name}\n     Drill: ${t.action}\n     Why: ${t.why}`;
  }
  if (t.type === "be"){
    const links = (t.links || []).map(([n,u]) => `     ${n}: ${u}`).join("\n");
    return `  • BE  ${t.text}${links ? "\n" + links : ""}`;
  }
  if (t.type === "bec"){
    const c = (typeof BE_CONCEPTS !== 'undefined') ? BE_CONCEPTS.find(x => x.id === t.conceptId) : null;
    return `  • BE  Concept: ${c ? c.name : t.conceptId}\n     Why: ${t.why}${c ? "\n     " + c.summary : ""}`;
  }
  if (t.type === "bep"){
    const p = (typeof BE_PROJECTS !== 'undefined') ? BE_PROJECTS.find(x => x.id === t.projectId) : null;
    const step = p && t.stepNum ? p.steps.find(s => s.n === t.stepNum) : null;
    return `  • BE  Project: ${p ? p.name : t.projectId}${step ? ` · Step ${step.n}: ${step.title}` : ""}\n     Why: ${t.why}${step ? `\n     Goal: ${step.goal}` : ""}`;
  }
  if (t.type === "lab"){
    const links = (t.links || []).map(([n,u]) => `     ${n}: ${u}`).join("\n");
    return `  • LAB  ${t.text}${links ? "\n" + links : ""}`;
  }
  if (t.type === "lxc"){
    const c = (typeof LX_CONCEPTS !== 'undefined') ? LX_CONCEPTS.find(x => x.id === t.conceptId) : null;
    return `  • LX  Concept: ${c ? c.name : t.conceptId}\n     Why: ${t.why}${c ? "\n     " + c.summary : ""}`;
  }
  if (t.type === "lxl"){
    const lab = (typeof LX_LABS !== 'undefined') ? LX_LABS.find(x => x.id === t.labId) : null;
    const url = lab ? `\n     ${lab.url}` : "";
    return `  • LAB  ${lab ? lab.name : t.labId}${url}\n     Why: ${t.why}`;
  }
  if (t.type === "mk"){
    const links = (t.links || []).map(([n,u]) => `     ${n}: ${u}`).join("\n");
    return `  • MOCK  ${t.text}${links ? "\n" + links : ""}`;
  }
  if (t.type === "py"){
    const links = (t.links || []).map(([n,u]) => `     ${n}: ${u}`).join("\n");
    return `  • PY  ${t.text}${links ? "\n" + links : ""}`;
  }
  if (t.type === "topic"){
    let row = null;
    if (typeof ROADMAP_WEEKS !== 'undefined'){
      for (const w of ROADMAP_WEEKS){
        const r = (w.days || []).find(x => x.d === t.day);
        if (r){ row = r; break; }
      }
    }
    if (!row) return `  • TOPICS  Day ${t.day}  (no data)`;
    const lines = [`  • TOPICS  Day ${t.day} · ~${row.h || "?"}h`];
    const cells = [
      ["Java",    row.java],
      ["Python",  row.py],
      ["SQL/DB",  row.sql],
      ["Backend", row.be],
      ["DevOps",  row.dev],
      ["CS",      row.cs],
    ];
    cells.forEach(([label, val]) => {
      if (val && val !== "—" && val.trim()) lines.push(`     ${label}: ${val}`);
    });
    if (row.task && row.task !== "—") lines.push(`     Task: ${row.task}`);
    if (row.rev  && row.rev  !== "—") lines.push(`     Revise: ${row.rev}`);
    return lines.join("\n");
  }
  // note / fallback
  return `  • ${t.text || "(task)"}`;
}

function jumpToLP(lpId){
  document.querySelector(".tabs button[data-view='lp']").click();
  setTimeout(() => {
    if (lpId === "all" || !lpId){
      document.getElementById("view-lp").scrollIntoView({behavior:"smooth", block:"start"});
      return;
    }
    const card = document.getElementById("lp-" + lpId);
    if (!card) return;
    card.scrollIntoView({behavior:"smooth", block:"center"});
    // expand all 3 details so the user sees probes / seeds / red flags
    card.querySelectorAll("details").forEach(d => d.open = true);
    // pulse highlight
    card.style.transition = "box-shadow .3s, transform .3s";
    card.style.boxShadow = "0 0 0 3px var(--accent)";
    card.style.transform = "scale(1.01)";
    setTimeout(() => { card.style.boxShadow = ""; card.style.transform = ""; }, 1500);
  }, 100);
}
window.jumpToLP = jumpToLP;

function openConceptModal(cid){
  const c = CONCEPTS[cid];
  if (!c) return;
  // problems using this concept
  const probs = Object.entries(PROBLEM_CONCEPTS)
    .filter(([_, ids]) => ids.includes(cid))
    .map(([name]) => {
      const meta = DSA[name]; if (!meta) return null;
      const [slug, diff, premium] = meta;
      const bclass = premium ? "b-P" : ("b-"+diff);
      const dlabel = premium ? `${diff}·P` : diff;
      return `<li><a href="${LC(slug)}" target="_blank" rel="noopener">${name}</a><span class="badge ${bclass}" title="${premium ? 'Premium (LeetCode subscription required)' : (diff === 'E' ? 'Easy' : diff === 'M' ? 'Medium' : diff === 'H' ? 'Hard' : diff)}">${dlabel}</span></li>`;
    }).filter(Boolean).join("");
  const related = (c.related||[]).map(rid => {
    const rc = CONCEPTS[rid]; if (!rc) return "";
    return `<span class="concept-chip" data-concept="${rid}" title="${rc.summary.replace(/"/g,'&quot;')}">${rc.name}</span>`;
  }).join("");
  const code = CONCEPT_CODE[cid];
  const codeBlock = code ? `<div class="concept-modal-section"><h5>Python snippet</h5><pre class="code-block">${code}</pre></div>` : "";
  const hasAnim = !!(CONCEPT_ANIM[cid] && CONCEPT_ANIM[cid].length);
  const animBlock = hasAnim ? `<div class="concept-modal-section">
    <h5>Animation</h5>

// ───── animation engine (each step provides {html, narr}) ─────
let _animTimer = null;
function initAnimation(cid){
  const steps = CONCEPT_ANIM[cid];
  if (!steps || !steps.length) return;
  const box = document.querySelector(`[data-anim="${cid}"]`);
  if (!box) return;
  let step = 0;
  const total = steps.length;
  const stepInfo = document.querySelector("[data-anim-step]");
  const narrEl = document.querySelector("[data-anim-narr]");

  function render(){
    const s = steps[step] || {};
    box.innerHTML = s.html || "";
    if (stepInfo) stepInfo.textContent = `${step + 1} / ${total}`;
    if (narrEl){
      narrEl.innerHTML = `<span class="step-num">${step + 1}</span>${s.narr || ""}`;
    }
  }

  function pauseAuto(){ if (_animTimer) clearInterval(_animTimer); _animTimer = null; setBtnLabel("▶ Play"); }
  function setBtnLabel(label){
    const b = box.parentElement.querySelector("[data-anim-action='play']");
    if (b){
      b.textContent = label;
      b.setAttribute("title", label.includes("Pause") ? "Pause auto-advance." : "Auto-advance steps.");
    }
  }

  document.querySelector("[data-anim-action='prev']").onclick = () => { pauseAuto(); step = Math.max(0, step - 1); render(); };
  document.querySelector("[data-anim-action='next']").onclick = () => { pauseAuto(); step = Math.min(total - 1, step + 1); render(); };
  document.querySelector("[data-anim-action='reset']").onclick = () => { pauseAuto(); step = 0; render(); };
  document.querySelector("[data-anim-action='play']").onclick = () => {
    if (_animTimer){ pauseAuto(); return; }
    setBtnLabel("⏸ Pause");
    _animTimer = setInterval(() => {
      if (step >= total - 1){ pauseAuto(); return; }
      step++; render();
    }, 900);
  };
  // cleanup when modal closes
  const observer = new MutationObserver(() => {
    if (!document.getElementById("modal-bg").classList.contains("show")){
      pauseAuto(); observer.disconnect();
    }
  });
  observer.observe(document.getElementById("modal-bg"), { attributes: true, attributeFilter: ["class"] });

  render();
}

// ───── timer (countdown) ─────
function startTimer(btn){
  const key = btn.dataset.timer;
  const mins = parseInt(btn.dataset.mins, 10);
  if (timers[key]){
    clearInterval(timers[key].intervalId);
    delete timers[key];
    btn.classList.remove("running");
    btn.textContent = `▶ ${mins}m`;
    return;
  }
  const endsAt = Date.now() + mins * 60 * 1000;
  btn.classList.add("running");
  const tick = () => {
    const left = endsAt - Date.now();
    if (left <= 0){
      clearInterval(timers[key].intervalId);
      delete timers[key];
      btn.classList.remove("running"); btn.classList.add("done");
      btn.textContent = "⏰ DONE";
      ding();
      toast("⏰ Time's up. Take a 5-min break.");
      return;
    }
    const m = Math.floor(left / 60000);
    const s = Math.floor((left % 60000) / 1000).toString().padStart(2,"0");
    btn.textContent = `⏸ ${m}:${s}`;
  };
  tick();
  timers[key] = { endsAt, intervalId: setInterval(tick, 1000) };
}
function ding(){
  if (!settings.sound) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const o = ctx.createOscillator(); const g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.frequency.value = 880; g.gain.value = .3;
    o.start(); o.stop(ctx.currentTime + 0.18);
    setTimeout(() => {
      const o2 = ctx.createOscillator(); const g2 = ctx.createGain();
      o2.connect(g2); g2.connect(ctx.destination);
      o2.frequency.value = 1320; g2.gain.value = .25;
      o2.start(); o2.stop(ctx.currentTime + 0.22);
    }, 220);
  } catch(_){}
}

function confetti(epic){
  const c = document.getElementById("confetti");
  c.width = innerWidth; c.height = innerHeight;
  const ctx = c.getContext("2d");
  const colors = ["#ff9900","#146eb4","#4ade80","#c084fc","#fbbf24","#f87171","#60a5fa"];
  const N = epic ? 260 : 120;
  const parts = Array.from({length: N}, () => ({
    x: Math.random()*c.width,
    y: -20 - Math.random()*200,
    vx: (Math.random()-0.5)*5,
    vy: 3 + Math.random()*5,
    r: 4 + Math.random()*5,
    color: colors[Math.floor(Math.random()*colors.length)],
    rot: Math.random()*Math.PI,
    vr: (Math.random()-0.5)*0.3
  }));
  let frames = 0, max = epic ? 220 : 140;
  function step(){
    frames++;
    ctx.clearRect(0,0,c.width,c.height);
    parts.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
      ctx.restore();
    });
    if (frames < max) requestAnimationFrame(step);
    else ctx.clearRect(0,0,c.width,c.height);
  }
  step();
}

function buildMistakeLog(){
  const items = [];
  const now = Date.now();
  Object.entries(notes).forEach(([id, n]) => {
    if (!n.revisit) return;
    // find task name
    const m = id.match(/^d(\d+)-s(\d+)-t(\d+)$/);
    if (!m) return;
    const day = parseInt(m[1],10), si = parseInt(m[2],10), ti = parseInt(m[3],10);
    const d = SCHEDULE.find(x => x.day === day);
    if (!d) return;
    const t = d.slots[si]?.tasks[ti];
    if (!t) return;
    // Lazy-migrate to SM-2 defaults if missing
    const sm2 = ensureSM2(id);
    const nextDueAt = sm2.nextDueAt;
    const msUntilDue = nextDueAt - now;
    // dueAt convention (preserved): 0 = overdue, <1 = due within 24h, >=1 = future days
    let dueAt;
    if (msUntilDue <= 0) dueAt = 0;
    else if (msUntilDue < DAY_MS) dueAt = msUntilDue / DAY_MS; // < 1
    else dueAt = msUntilDue / DAY_MS;
    const ts = (n.timestamps && n.timestamps[0]) || nextDueAt - sm2.intervalDays * DAY_MS;
    const ageDays = (now - ts) / DAY_MS;
    const label = t.names ? t.names.join(", ") : (t.text || "(task)");
    items.push({
      id, day, label, type: t.type, note: n.text || "",
      ts, dueAt, ageDays, nextDueAt,
      easeFactor: sm2.easeFactor,
      repetitions: sm2.repetitions,
      intervalDays: sm2.intervalDays
    });
  });
  // sort: most overdue first, then nearest-due
  items.sort((a,b) => a.nextDueAt - b.nextDueAt);
  return items;
}

function showWeekRecap(week, weekDays){
  let dsaCount = 0, mockCount = 0, sdCount = 0, lpCount = 0, beCount = 0, labCount = 0;
  weekDays.forEach(d => d.slots.forEach((s, si) => s.tasks.forEach((t, ti) => {
    if (!isDone(`d${d.day}-s${si}-t${ti}`)) return;
    if (t.type === "dsa") dsaCount += (t.names||[]).length;
    else if (t.type === "mk") mockCount++;
    else if (t.type === "sd") sdCount++;
    else if (t.type === "lp") lpCount++;
    else if (t.type === "be") beCount++;
    else if (t.type === "lab") labCount++;
  })));
  const nextWeek = SCHEDULE.find(x => x.week !== week && x.day > weekDays[weekDays.length-1].day);
  const nextLabel = nextWeek ? `Week ${nextWeek.week}` : "Taper";
  showModal(`
    <button class="close" onclick="closeModal()">✕</button>

function buildSearchIndex(){
  const idx = [];
  SCHEDULE.forEach(d => {
    d.slots.forEach((s, si) => s.tasks.forEach((t, ti) => {
      const id = `d${d.day}-s${si}-t${ti}`;
      let label = "";
      if (t.type === "dsa") label = (t.names||[]).join(", ");
      else if (t.type === "rev") label = t.text;
      else label = t.text || "";
      idx.push({ day: d.day, week: d.week, dayTitle: d.title, slot: s.slot, type: t.type, label, id });
    }));
  });
  return idx;
}
const searchIndex = buildSearchIndex();
function doSearch(q){
  const lo = q.toLowerCase().trim();
  if (lo.length < 2) return [];
  return searchIndex.filter(i =>
    i.label.toLowerCase().includes(lo) ||
    i.dayTitle.toLowerCase().includes(lo) ||
    String(i.day).includes(lo) ||
    i.type.toLowerCase().includes(lo)
  ).slice(0, 30);
}

// ── Focus mode helpers ──────────────────────────────────────────────────
function applyFocusModeDecorations(on){
  // Strip prior decorations
  document.querySelectorAll(".day[data-today]").forEach(d => d.removeAttribute("data-today"));
  document.querySelectorAll("li.next-task").forEach(li => li.classList.remove("next-task"));
  document.querySelectorAll(".block.has-next-task").forEach(b => b.classList.remove("has-next-task"));
  document.querySelectorAll(".focus-mode-pomo, .focus-mode-exit, .focus-mode-upnext, .focus-mode-empty").forEach(el => el.remove());
  if (__focusPomoTimer){ clearInterval(__focusPomoTimer); __focusPomoTimer = null; }
  if (!on) return;

  const todayDay = (typeof currentDay === "function") ? currentDay() : 1;
  const todayEl = document.querySelector(`.day[data-day="${todayDay}"]`);
  if (!todayEl){
    // Schedule hasn't rendered yet — try again next frame, but only if still in focus mode
    requestAnimationFrame(() => {
      if (document.body.classList.contains("mode-focus")) applyFocusModeDecorations(true);
    });
    return;
  }
  todayEl.setAttribute("data-today", "1");
  todayEl.classList.add("open");

  // Find the first unfinished task in today's day (parent checkboxes only)
  const allLi = todayEl.querySelectorAll("ul.tasks > li");
  let nextLi = null;
  let nextLiIdx = -1;
  let upnextLi = null;
  for (let i = 0; i < allLi.length; i++){
    const cb = allLi[i].querySelector("input[type=checkbox][data-id]");
    if (!cb) continue;
    if (!cb.checked){
      if (!nextLi){ nextLi = allLi[i]; nextLiIdx = i; }
      else if (!upnextLi){ upnextLi = allLi[i]; break; }
    }
  }

  const main = document.querySelector("main");
  if (!nextLi){
    // All done — show empty state
    const empty = document.createElement("div");
    empty.className = "focus-mode-empty";
    empty.innerHTML = `<div class="big">🎉</div>Day ${todayDay} cleared. Take a breath.<br><br><button class="focus-mode-exit" onclick="(function(){settings.layoutMode=settings.layoutModePrev||'default';saveSettings();applyLayoutMode();})()">← Back</button>`;
    main.appendChild(empty);
    return;
  }
  nextLi.classList.add("next-task");
  // Mark the parent block so its block-head shows
  const block = nextLi.closest(".block");
  if (block) block.classList.add("has-next-task");

  // Up-next preview
  if (upnextLi){
    const upnextEl = document.createElement("div");
    upnextEl.className = "focus-mode-upnext";
    const labelText = (upnextLi.querySelector(".task-text") || {}).textContent || "Next task";
    upnextEl.innerHTML = `<b>Up next:</b> ${labelText.trim().slice(0, 90)}`;
    document.body.appendChild(upnextEl);
  }

  // Exit button — return to whichever non-focus mode the user came from
  const exitBtn = document.createElement("button");
  exitBtn.className = "focus-mode-exit";
  exitBtn.textContent = "✕ Exit focus mode";
  exitBtn.onclick = () => {
    settings.layoutMode = settings.layoutModePrev || "default";
    saveSettings();
    applyLayoutMode();
  };
  document.body.appendChild(exitBtn);

  // Pomodoro: 25 min work / 5 min break
  const pomo = document.createElement("div");
  pomo.className = "focus-mode-pomo";
  pomo.innerHTML = `<span class="pomo-state">FOCUS</span> <span class="pomo-time">25:00</span> <button class="pomo-pause" title="Pause/resume">❚❚</button> <button class="pomo-reset" title="Reset">↻</button>`;
  document.body.appendChild(pomo);
  let secondsLeft = 25 * 60;
  let phase = "FOCUS"; // or "BREAK"
  let paused = false;
  const timeEl = pomo.querySelector(".pomo-time");
  const stateEl = pomo.querySelector(".pomo-state");
  const fmt = s => `${String(Math.floor(s / 60)).padStart(2, "0")}:${String(s % 60).padStart(2, "0")}`;
  __focusPomoTimer = setInterval(() => {
    if (paused) return;
    secondsLeft--;
    if (secondsLeft <= 0){
      // Phase swap
      if (phase === "FOCUS"){
        phase = "BREAK"; secondsLeft = 5 * 60;
        stateEl.textContent = "BREAK"; pomo.style.borderColor = "var(--ok)"; pomo.style.color = "var(--ok)";
        if (typeof toast === "function") toast("☕ Break time — 5 min");
      } else {
        phase = "FOCUS"; secondsLeft = 25 * 60;
        stateEl.textContent = "FOCUS"; pomo.style.borderColor = "var(--accent)"; pomo.style.color = "var(--accent)";
        if (typeof toast === "function") toast("🎯 Back to work — 25 min");
      }
    }
    timeEl.textContent = fmt(secondsLeft);
  }, 1000);
  pomo.querySelector(".pomo-pause").onclick = (e) => {
    paused = !paused;
    e.target.textContent = paused ? "▶" : "❚❚";
    e.target.title = paused ? "Resume" : "Pause";
  };
  pomo.querySelector(".pomo-reset").onclick = () => {
    secondsLeft = phase === "FOCUS" ? 25 * 60 : 5 * 60;
    timeEl.textContent = fmt(secondsLeft);
  };
}

// ====================================================================
// CLOUD SYNC via GitHub Gist (private, optional, AES-GCM at rest)
// ====================================================================
// All sync state lives in `settings` so it round-trips with import/export
// (settings.gistPat, gistId, gistPassphrase, gistAutoSync, gistLastSync).
// Auto-sync is push-only and debounced. We never auto-pull (avoids surprise
// data loss). PAT is stored in localStorage just like the rest of progress.
const GIST_FILE = "tracker.json";
const GIST_DESC = "Amazon SDE Tracker — progress sync";

function syncSnapshot(){
  // Mirror the export-button payload + extras (solveTimes, projSteps).
  return {
    state, notes, achvState, settings,
    solveTimes, projSteps,
    _v: 1,
    _ts: Date.now()
  };
}
function applySyncPayload(data){
  if (!data || typeof data !== "object") throw new Error("Payload is not an object");
  // Validate shape — never trash local data on a malformed pull.
  const allowed = ["state","notes","achvState","settings","solveTimes","projSteps","_v","_ts"];
  const keys = Object.keys(data);
  if (!keys.some(k => allowed.includes(k))) throw new Error("Payload has no recognized keys");
  if (data.state && typeof data.state === "object") Object.assign(state, data.state);
  if (data.notes && typeof data.notes === "object") Object.assign(notes, data.notes);
  if (data.achvState && typeof data.achvState === "object") Object.assign(achvState, data.achvState);
  if (data.settings && typeof data.settings === "object"){
    // Don't let a pulled passphrase silently lock the local user out — preserve
    // local sync credentials if the pulled side is missing them.
    const localCreds = {
      gistPat: settings.gistPat,
      gistId: settings.gistId,
      gistPassphrase: settings.gistPassphrase,
      gistAutoSync: settings.gistAutoSync,
      gistLastSync: settings.gistLastSync
    };
    Object.assign(settings, data.settings);
    Object.entries(localCreds).forEach(([k, v]) => {
      if (v !== undefined && (settings[k] === undefined || settings[k] === "")) settings[k] = v;
    });
  }
  if (data.solveTimes && typeof data.solveTimes === "object") Object.assign(solveTimes, data.solveTimes);
  if (data.projSteps && typeof data.projSteps === "object") Object.assign(projSteps, data.projSteps);
  save(); saveNotes(); saveSettings(); saveTimes(); saveProj();
  localStorage.setItem(ACHV_KEY, JSON.stringify(achvState));
  applyTheme();
}

// ── Web Crypto helpers (AES-GCM with PBKDF2-derived key) ──
function _hex(buf){
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}
function _unhex(s){
  const out = new Uint8Array(s.length / 2);
  for (let i = 0; i < out.length; i++) out[i] = parseInt(s.substr(i*2, 2), 16);
  return out;
}
async function _deriveKey(passphrase, salt){
  const enc = new TextEncoder();
  const baseKey = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 100000, hash: "SHA-256" },
    baseKey,
    { name: "AES-GCM", length: 256 },
    false,
    ["encrypt","decrypt"]
  );
}
async function gistEncrypt(plaintext, passphrase){
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await _deriveKey(passphrase, salt);
  const enc = new TextEncoder();
  const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, enc.encode(plaintext));
  return JSON.stringify({ _enc: "aes-gcm-pbkdf2-100k", salt: _hex(salt), iv: _hex(iv), ciphertext: _hex(ct) });
}
async function gistDecrypt(payloadStr, passphrase){
  let p;
  try { p = JSON.parse(payloadStr); } catch(_) { throw new Error("Cloud payload isn't valid JSON"); }
  if (!p || !p._enc) throw new Error("Cloud payload isn't encrypted (no passphrase needed)");
  if (!p.salt || !p.iv || !p.ciphertext) throw new Error("Encrypted payload is missing fields");
  const key = await _deriveKey(passphrase, _unhex(p.salt));
  let plain;
  try {
    plain = await crypto.subtle.decrypt({ name: "AES-GCM", iv: _unhex(p.iv) }, key, _unhex(p.ciphertext));
  } catch(_){
    throw new Error("Decryption failed — wrong passphrase?");
  }
  return new TextDecoder().decode(plain);
}

// ── GitHub API wrappers ──
async function _gistFetch(path, opts){
  const pat = settings.gistPat;
  if (!pat) throw new Error("No PAT configured");
  const headers = Object.assign({
    "Authorization": "Bearer " + pat,
    "Accept": "application/vnd.github+json",
    "X-GitHub-Api-Version": "2022-11-28"
  }, (opts && opts.headers) || {});
  if (opts && opts.body) headers["Content-Type"] = "application/json";
  let res;
  try {
    res = await fetch("https://api.github.com" + path, Object.assign({}, opts, { headers }));
  } catch(err){
    throw new Error("Network error: " + (err && err.message ? err.message : "request failed"));
  }
  if (res.status === 401) throw new Error("Token invalid. Regenerate with `gist` scope.");
  if (res.status === 404) throw new Error("Gist gone. Click Push to create a new one.");
  if (!res.ok){
    let detail = "";
    try { detail = (await res.json()).message || ""; } catch(_) {}
    throw new Error(`GitHub API error ${res.status}${detail ? ": " + detail : ""}`);
  }
  return res.status === 204 ? null : res.json();
}
async function gistTestConnection(){
  // /user is the cheapest authenticated endpoint
  const u = await _gistFetch("/user", { method: "GET" });
  return u && u.login;
}
async function gistPush(){
  const snap = syncSnapshot();
  let content = JSON.stringify(snap);
  if (settings.gistPassphrase){
    content = await gistEncrypt(content, settings.gistPassphrase);
  }
  const body = JSON.stringify({
    description: GIST_DESC,
    public: false,
    files: { [GIST_FILE]: { content } }
  });
  let res;
  if (settings.gistId){
    res = await _gistFetch("/gists/" + encodeURIComponent(settings.gistId), { method: "PATCH", body });
  } else {
    res = await _gistFetch("/gists", { method: "POST", body });
    if (res && res.id) settings.gistId = res.id;
  }
  settings.gistLastSync = Date.now();
  saveSettings();
  return res;
}
async function gistPull(){
  if (!settings.gistId) throw new Error("No gist ID. Push first to create one.");
  const res = await _gistFetch("/gists/" + encodeURIComponent(settings.gistId), { method: "GET" });
  const file = res && res.files && res.files[GIST_FILE];
  if (!file || typeof file.content !== "string") throw new Error(`Gist is missing the ${GIST_FILE} file.`);
  let plain = file.content;
  // Detect encrypted payload by sniffing for the marker.
  const looksEncrypted = plain.indexOf('"_enc"') !== -1 && plain.indexOf('"ciphertext"') !== -1;
  if (looksEncrypted){
    if (!settings.gistPassphrase) throw new Error("Cloud payload is encrypted — set a passphrase first.");
    plain = await gistDecrypt(plain, settings.gistPassphrase);
  }
  let data;
  try { data = JSON.parse(plain); } catch(_) { throw new Error("Decrypted payload isn't valid JSON"); }
  applySyncPayload(data);
  settings.gistLastSync = Date.now();
  saveSettings();
  return data;
}

// ── Auto-sync (push-only, debounced) ──
let _autoSyncTimer = null;
function scheduleAutoSync(){
  if (!settings.gistAutoSync || !settings.gistPat) return;
  clearTimeout(_autoSyncTimer);
  _autoSyncTimer = setTimeout(() => {
    gistPush().catch(err => {
      // Surface the error quietly — don't spam during typing
      toast("⚠ Auto-sync failed: " + (err && err.message ? err.message : "unknown"));
    });
  }, 30000);
}

// ── Sync modal UI ──
function _syncStatusHTML(){
  if (!settings.gistPat){
    return `<div class="sync-status warn">Not configured. Add a Personal Access Token below to start.</div>`;
  }
  const last = settings.gistLastSync ? new Date(settings.gistLastSync).toLocaleString() : "never";
  const where = settings.gistId ? `Gist <code style="background:var(--bg);padding:1px 5px;border-radius:3px">${settings.gistId.slice(0,8)}…</code>` : "no gist yet";
  const enc = settings.gistPassphrase ? " · 🔒 encrypted" : " · ⚠ plain JSON";
  return `<div class="sync-status ok">Configured · ${where}${enc}<div class="last">Last synced: ${last}</div></div>`;
}
