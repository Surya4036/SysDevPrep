<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Amazon SDE 60-Day Tracker</title>
<style>
  :root {
    --bg: #07090d;
    --bg-2: #0d1117;
    --panel: #141923;
    --panel-2: #1c2230;
    --line: #262d3d;
    --fg: #e7eaf0;
    --muted: #8a93a3;
    --accent: #ff9900;
    --accent-2: #146eb4;
    --accent-3: #c084fc;
    --ok: #4ade80;
    --warn: #fbbf24;
    --hard: #f87171;
    --easy: #60a5fa;
    --med: #fbbf24;
    --grad-1: linear-gradient(135deg, #ff9900 0%, #ff5e62 100%);
    --grad-2: linear-gradient(135deg, #146eb4 0%, #c084fc 100%);
    --grad-3: linear-gradient(135deg, #4ade80 0%, #22d3ee 100%);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
  body::before {
    content:""; position: fixed; inset:0; pointer-events:none; z-index:-1;
    background:
      radial-gradient(900px 600px at 0% 0%, rgba(255,153,0,.10), transparent 60%),
      radial-gradient(900px 600px at 100% 0%, rgba(20,110,180,.10), transparent 60%),
      radial-gradient(700px 500px at 50% 100%, rgba(192,132,252,.08), transparent 60%);
  }
  a { color: var(--accent-2); text-decoration: none; }
  a:hover { text-decoration: underline; color: var(--accent); }

  /* ───── header ───── */
  header { position: sticky; top: 0; z-index: 10; background: rgba(20,25,35,.85); backdrop-filter: blur(10px); border-bottom: 1px solid var(--line); padding: 14px 20px; }
  header h1 { margin: 0; font-size: 19px; background: var(--grad-1); -webkit-background-clip: text; background-clip: text; color: transparent; font-weight: 800; letter-spacing: -.01em; }
  header .sub { color: var(--muted); font-size: 12px; margin-top: 4px; }
  .top-row { display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }

  /* ───── progress + xp ───── */
  .progress { flex: 1; min-width: 260px; }
  .progress-bar { height: 10px; background: var(--panel-2); border-radius: 99px; overflow: hidden; box-shadow: inset 0 0 0 1px var(--line); }
  .progress-fill { height: 100%; background: var(--grad-1); transition: width .6s cubic-bezier(.22,1,.36,1); position: relative; box-shadow: 0 0 18px rgba(255,153,0,.5); }
  .progress-fill::after {
    content:""; position:absolute; inset:0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.3), transparent);
    animation: shimmer 2.4s linear infinite;
  }
  @keyframes shimmer { 0% { transform: translateX(-100%);} 100% { transform: translateX(100%);} }
  .stats { display: flex; gap: 14px; font-size: 12px; color: var(--muted); margin-top: 8px; flex-wrap: wrap; align-items: center; }
  .stats .pill { background: var(--panel-2); border: 1px solid var(--line); padding: 3px 9px; border-radius: 99px; }
  .stats .pill b { color: var(--fg); }
  .stats .streak { background: linear-gradient(135deg, rgba(255,153,0,.18), rgba(255,94,98,.18)); border-color: rgba(255,153,0,.4); color: var(--accent); font-weight: 700; }
  .stats .level { background: linear-gradient(135deg, rgba(192,132,252,.18), rgba(20,110,180,.18)); border-color: rgba(192,132,252,.4); color: var(--accent-3); font-weight: 700; }

  nav.weeks { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; }
  nav.weeks button { background: var(--panel-2); color: var(--fg); border: 1px solid var(--line); padding: 6px 12px; border-radius: 99px; cursor: pointer; font-size: 12px; transition: all .2s; }
  nav.weeks button.active { background: var(--grad-1); color: #000; border-color: transparent; font-weight: 700; box-shadow: 0 4px 12px rgba(255,153,0,.4); }
  nav.weeks button:hover:not(.active) { border-color: var(--accent); transform: translateY(-1px); }

  .tabs { display: flex; gap: 4px; margin-left: auto; }
  .tabs button { background: transparent; border: 1px solid var(--line); color: var(--muted); padding: 6px 14px; border-radius: 99px; cursor: pointer; font-size: 12px; transition: all .2s; }
  .tabs button.active { color: var(--accent); border-color: var(--accent); background: rgba(255,153,0,.08); }

  main { max-width: 1100px; margin: 0 auto; padding: 20px; }

  /* ───── 60-day heatmap grid ───── */
  .grid-wrap { background: var(--panel); border: 1px solid var(--line); border-radius: 12px; padding: 14px; margin-bottom: 16px; }
  .grid-wrap h3 { margin: 0 0 10px; font-size: 13px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .grid-60 { display: grid; grid-template-columns: repeat(20, 1fr); gap: 4px; }
  @media (max-width: 700px) { .grid-60 { grid-template-columns: repeat(10, 1fr); } }
  .cell { aspect-ratio: 1/1; background: var(--panel-2); border: 1px solid var(--line); border-radius: 4px; display:flex; align-items:center; justify-content:center; font-size: 9px; color: var(--muted); cursor: pointer; transition: all .2s; position: relative; }
  .cell:hover { transform: scale(1.18); border-color: var(--accent); z-index: 2; }
  .cell.p25 { background: rgba(255,153,0,.18); border-color: rgba(255,153,0,.35); color: #fff; }
  .cell.p50 { background: rgba(255,153,0,.40); border-color: rgba(255,153,0,.6); color: #fff; }
  .cell.p75 { background: rgba(255,153,0,.62); border-color: rgba(255,153,0,.8); color: #000; }
  .cell.p100 { background: var(--grad-1); border-color: transparent; color: #000; font-weight: 700; box-shadow: 0 0 10px rgba(255,153,0,.6); }
  .cell.today { outline: 2px solid var(--accent-3); outline-offset: 2px; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { outline-color: var(--accent-3); } 50% { outline-color: var(--accent); } }

  /* ───── motivation banner ───── */
  .quote { background: var(--panel); border: 1px solid var(--line); border-left: 4px solid var(--accent); border-radius: 8px; padding: 12px 16px; margin-bottom: 14px; font-style: italic; color: var(--fg); position: relative; }
  .quote::before { content: "❝"; position: absolute; top: -2px; right: 14px; font-size: 32px; color: var(--accent); opacity: .35; }
  .quote .who { display: block; font-style: normal; color: var(--muted); font-size: 11px; margin-top: 4px; }

  /* ───── day card ───── */
  .day { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; margin-bottom: 12px; overflow: hidden; transition: all .25s; position: relative; }
  .day:hover { border-color: rgba(255,153,0,.4); }
  .day-head { padding: 14px 18px; display: flex; align-items: center; justify-content: space-between; gap: 12px; cursor: pointer; user-select: none; }
  .day-head:hover { background: var(--panel-2); }
  .day-num { color: var(--muted); font-size: 11px; margin-right: 10px; font-weight: 700; letter-spacing: .05em; padding: 2px 7px; background: var(--panel-2); border-radius: 4px; }
  .day-title { font-weight: 600; font-size: 14px; }
  .day-pct { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
  .day-pct b { color: var(--ok); font-size: 13px; }
  .mini-ring { width: 28px; height: 28px; }
  .day-body { padding: 4px 18px 16px; border-top: 1px solid var(--line); display: none; }
  .day.open .day-body { display: block; animation: slideDown .25s ease-out; }
  @keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: none; } }

  /* ───── DAY COMPLETED — cross out treatment ───── */
  .day.completed { background: linear-gradient(135deg, rgba(74,222,128,.06), rgba(20,110,180,.06)); border-color: rgba(74,222,128,.3); }
  .day.completed::after {
    content: "✓ DONE";
    position: absolute; top: 50%; right: 22px; transform: translateY(-50%) rotate(-8deg);
    font-size: 32px; font-weight: 900; letter-spacing: .1em;
    color: var(--ok); opacity: .25;
    pointer-events: none;
    text-shadow: 0 0 30px rgba(74,222,128,.6);
  }
  .day.completed .day-title { color: var(--muted); position: relative; }
  .day.completed .day-title::after {
    content: ""; position: absolute; left: 0; right: 0; top: 50%;
    border-top: 2px solid rgba(74,222,128,.7);
    transform: scaleX(1); transform-origin: left;
    animation: strikeThrough .6s ease-out;
  }
  @keyframes strikeThrough { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  .day.completed .day-num { background: var(--ok); color: #000; }
  .day.completed .day-pct b { color: var(--ok); }

  /* ───── tasks ───── */
  .block { margin: 14px 0; padding-left: 4px; }
  .block-head { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
  .block-head b { color: var(--accent); margin-right: 6px; font-size: 12px; }
  ul.tasks { list-style: none; padding: 0; margin: 0; }
  ul.tasks li { display: flex; gap: 10px; padding: 8px 0; border-bottom: 1px dashed var(--line); align-items: flex-start; transition: background .2s; border-radius: 4px; padding-left: 6px; padding-right: 6px; }
  ul.tasks li:hover { background: rgba(255,153,0,.04); }
  ul.tasks li:last-child { border: 0; }
  ul.tasks input[type=checkbox] { margin-top: 3px; accent-color: var(--accent); cursor: pointer; width: 16px; height: 16px; }
  .task-text { flex: 1; transition: all .25s; }
  .task-text.done { color: var(--muted); text-decoration: line-through; opacity: .6; }
  .badge { display: inline-block; font-size: 10px; font-weight: 700; padding: 1px 7px; border-radius: 99px; margin-left: 6px; vertical-align: middle; letter-spacing: .03em; }
  .b-E { background: rgba(96,165,250,.18); color: var(--easy); }
  .b-M { background: rgba(251,191,36,.18); color: var(--med); }
  .b-H { background: rgba(248,113,113,.18); color: var(--hard); }
  .b-P { background: rgba(138,147,163,.18); color: var(--muted); }
  .links { display: inline-flex; gap: 6px; margin-left: 8px; flex-wrap: wrap; }
  .links a { font-size: 11px; padding: 2px 9px; border: 1px solid var(--line); border-radius: 99px; color: var(--muted); background: var(--panel-2); transition: all .2s; }
  .links a:hover { color: var(--accent); border-color: var(--accent); text-decoration: none; transform: translateY(-1px); }
  .tag { font-size: 10px; padding: 2px 7px; border-radius: 99px; margin-right: 8px; font-weight: 700; letter-spacing: .04em; }
  .t-DSA { background: rgba(20,110,180,.22); color: var(--accent-2); }
  .t-SD  { background: rgba(255,153,0,.20); color: var(--accent); }
  .t-LP  { background: rgba(74,222,128,.18); color: var(--ok); }
  .t-BE  { background: rgba(168,85,247,.20); color: #c084fc; }
  .t-LX  { background: rgba(251,191,36,.18); color: var(--warn); }
  .t-MK  { background: rgba(248,113,113,.20); color: var(--hard); }
  .t-PY  { background: rgba(96,165,250,.18); color: var(--easy); }
  .t-REV { background: rgba(138,147,163,.18); color: var(--muted); }
  .t-LAB { background: rgba(251,191,36,.20); color: var(--warn); }

  /* ───── phase banner ───── */
  .phase-banner { padding: 12px 16px; background: linear-gradient(135deg, var(--panel) 0%, var(--panel-2) 100%); border-left: 4px solid var(--accent); margin: 18px 0 10px; border-radius: 8px; font-size: 13px; box-shadow: 0 4px 12px rgba(0,0,0,.2); }
  .phase-banner b { color: var(--accent); letter-spacing: .04em; }

  /* ───── panels (resources / grind / lp tabs) ───── */
  .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 10px; padding: 18px; margin-bottom: 14px; }
  .panel h2 { margin: 0 0 12px; font-size: 16px; color: var(--accent); }
  .panel h3 { margin: 14px 0 6px; font-size: 13px; color: var(--fg); border-bottom: 1px solid var(--line); padding-bottom: 5px; letter-spacing: .03em; }
  .panel ul { padding-left: 18px; margin: 4px 0; }
  .panel li { padding: 2px 0; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px 28px; }
  @media (max-width: 800px) { .grid-2 { grid-template-columns: 1fr; } }

  details { margin: 4px 0; }
  details summary { cursor: pointer; padding: 4px 0; color: var(--muted); }
  details summary:hover { color: var(--fg); }
  details[open] summary { color: var(--fg); }
  .lp-card { background: var(--panel-2); border-radius: 8px; padding: 12px 16px; margin: 10px 0; border-left: 3px solid var(--ok); }
  .lp-card h4 { margin: 0 0 6px; color: var(--ok); font-size: 14px; }
  .lp-card .red { color: var(--hard); font-size: 12px; }

  .hidden { display: none !important; }

  /* ───── celebration toast ───── */
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(120px); background: var(--grad-1); color: #000; padding: 14px 22px; border-radius: 99px; font-weight: 700; box-shadow: 0 12px 36px rgba(255,153,0,.6); z-index: 100; transition: transform .4s cubic-bezier(.22,1.4,.36,1); pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ───── confetti ───── */
  canvas#confetti { position: fixed; inset: 0; pointer-events: none; z-index: 99; }
</style>
</head>
<body>

<header>
  <div class="top-row">
    <div>
      <h1>🚀 Amazon SDE-1 / Early SDE-2 — 60-Day Tracker</h1>
      <div class="sub">Python backend · Grind 169 · ~29 hrs/week · Topic-progressive · ~250 hrs total</div>
    </div>
    <div class="progress">
      <div class="progress-bar"><div class="progress-fill" id="bar"></div></div>
      <div class="stats">
        <span class="pill"><b id="done">0</b>/<b id="total">0</b> tasks</span>
        <span class="pill streak">🔥 Streak <b id="streak">0</b></span>
        <span class="pill level">⭐ Level <b id="level">1</b> · <b id="xp">0</b> XP</span>
        <span class="pill">📅 Day <b id="day-completed">0</b>/60</span>
        <span class="pill">DSA <b id="s-dsa">0</b></span>
        <span class="pill">SD <b id="s-sd">0</b></span>
        <span class="pill">LP <b id="s-lp">0</b></span>
        <span class="pill">BE <b id="s-be">0</b></span>
        <span class="pill">Mocks <b id="s-mk">0</b></span>
        <span class="pill">Labs <b id="s-lab">0</b></span>
      </div>
    </div>
    <div class="tabs">
      <button data-view="schedule" class="active">Schedule</button>
      <button data-view="resources">Resources</button>
      <button data-view="grind">Grind 169</button>
      <button data-view="lp">LP Playbook</button>
    </div>
  </div>
  <nav class="weeks" id="weeks"></nav>
</header>

<canvas id="confetti"></canvas>
<div id="toast" class="toast"></div>

<main>
  <section id="view-schedule"></section>
  <section id="view-resources" class="hidden"></section>
  <section id="view-grind" class="hidden"></section>
  <section id="view-lp" class="hidden"></section>
</main>

// ---- DSA library: name -> {slug, diff, premium?} ----

const STORE_KEY = "amzn-tracker-v1";
const state = JSON.parse(localStorage.getItem(STORE_KEY) || "{}");
function save(){ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
function isDone(id){ return !!state[id]; }
function setDone(id, v){ if(v) state[id]=1; else delete state[id]; save(); updateStats(); }
function renderTaskHTML(taskId, t){
  const checked = isDone(taskId) ? "checked" : "";
  if(t.type === "dsa"){
    const items = t.names.map(n => {
      const meta = DSA[n];
      if(!meta) return `<span>${n}</span>`;
      const [slug, diff, premium] = meta;
      const bclass = premium ? "b-P" : ("b-"+diff);
      const dlabel = premium ? `${diff}·P` : diff;
      return `<a href="${LC(slug)}" target="_blank" rel="noopener">${n}</a><span class="badge ${bclass}">${dlabel}</span>`;
    }).join(" · ");
    return `<li><input type=checkbox ${checked} data-id="${taskId}"><span class="task-text"><span class="tag t-DSA">DSA</span>${items}</span></li>`;
  }
  if(t.type === "rev"){
    return `<li><input type=checkbox ${checked} data-id="${taskId}"><span class="task-text"><span class="tag t-REV">REVIEW</span>${t.text}</span></li>`;
  }
  if(t.type === "sd"){
    const links = (t.links||[]).map(([n,u]) => `<a href="${u}" target="_blank" rel="noopener">${n}</a>`).join("");
    return `<li><input type=checkbox ${checked} data-id="${taskId}"><span class="task-text"><span class="tag t-SD">SD</span>${t.text} <span class="links">${links}</span></span></li>`;
  }
  if(t.type === "lp"){
    return `<li><input type=checkbox ${checked} data-id="${taskId}"><span class="task-text"><span class="tag t-LP">LP</span>${t.text}</span></li>`;
  }
  if(t.type === "be"){
    const links = (t.links||[]).map(([n,u]) => `<a href="${u}" target="_blank" rel="noopener">${n}</a>`).join("");
    return `<li><input type=checkbox ${checked} data-id="${taskId}"><span class="task-text"><span class="tag t-BE">BE</span>${t.text} <span class="links">${links}</span></span></li>`;
  }
  if(t.type === "lab"){
    const links = (t.links||[]).map(([n,u]) => `<a href="${u}" target="_blank" rel="noopener">${n}</a>`).join("");
    return `<li><input type=checkbox ${checked} data-id="${taskId}"><span class="task-text"><span class="tag t-LAB">LAB</span>${t.text} <span class="links">${links}</span></span></li>`;
  }
  if(t.type === "mk"){
    const links = (t.links||[]).map(([n,u]) => `<a href="${u}" target="_blank" rel="noopener">${n}</a>`).join("");
    return `<li><input type=checkbox ${checked} data-id="${taskId}"><span class="task-text"><span class="tag t-MK">MOCK</span>${t.text} <span class="links">${links}</span></span></li>`;
  }
  if(t.type === "py"){
    const links = (t.links||[]).map(([n,u]) => `<a href="${u}" target="_blank" rel="noopener">${n}</a>`).join("");
    return `<li><input type=checkbox ${checked} data-id="${taskId}"><span class="task-text"><span class="tag t-PY">PY</span>${t.text} <span class="links">${links}</span></span></li>`;
  }
  // note
  return `<li><input type=checkbox ${checked} data-id="${taskId}"><span class="task-text">${t.text}</span></li>`;
}

const QUOTES = [
  ["Slow is smooth. Smooth is fast.","Navy SEALs"],
  ["Discipline equals freedom.","Jocko Willink"],
  ["You don't rise to the level of your goals; you fall to the level of your systems.","James Clear"],
  ["Hard work beats talent when talent doesn't work hard.","Tim Notke"],
  ["The expert in anything was once a beginner.","Helen Hayes"],
  ["Done is better than perfect.","Sheryl Sandberg"],
  ["Compound interest is the eighth wonder of the world.","Einstein (apocryphal)"],
  ["The only way out is through.","Robert Frost"],
  ["You miss 100% of the shots you don't take.","Wayne Gretzky"],
  ["First solve the problem. Then write the code.","John Johnson"],
  ["Make it work, make it right, make it fast.","Kent Beck"],
  ["The best time to plant a tree was 20 years ago. The second best time is now.","Chinese proverb"],
  ["Amateurs sit and wait for inspiration. The rest of us just get up and go to work.","Stephen King"],
  ["Talk is cheap. Show me the code.","Linus Torvalds"]
];
function quoteOfDay(){
  const d = new Date();
  const idx = (d.getFullYear() * 366 + d.getMonth() * 31 + d.getDate()) % QUOTES.length;
  return QUOTES[idx];
}

function renderHeatmap(){
  let html = `<div class="grid-wrap"><h3>📊 60-Day Progress</h3><div class="grid-60">`;
  SCHEDULE.forEach(d => {
    const pct = dayPct(d);
    let cls = "cell";
    if (pct === 100) cls += " p100";
    else if (pct >= 75) cls += " p75";
    else if (pct >= 50) cls += " p50";
    else if (pct >= 25) cls += " p25";
    if (d.day === currentDay()) cls += " today";
    html += `<div class="${cls}" data-day="${d.day}" title="Day ${d.day} · ${d.title} · ${pct}%">${d.day}</div>`;
  });
  html += `</div></div>`;
  return html;
}

function dayPct(d){
  let total = 0, done = 0;
  d.slots.forEach((s, si) => s.tasks.forEach((t, ti) => {
    total++;
    if(isDone(`d${d.day}-s${si}-t${ti}`)) done++;
  }));
  return total ? Math.round(done * 100 / total) : 0;
}

function currentDay(){
  // best-guess "current day" = first day not 100%
  for (const d of SCHEDULE){ if (dayPct(d) < 100) return d.day; }
  return 60;
}

function dayCompletedCount(){
  return SCHEDULE.filter(d => dayPct(d) === 100).length;
}

function streak(){
  // consecutive 100% days starting from day 1
  let c = 0;
  for (const d of SCHEDULE){
    if (dayPct(d) === 100) c++;
    else break;
  }
  return c;
}

function renderSchedule(filterWeek){
  const cont = document.getElementById("view-schedule");
  cont.innerHTML = "";

  // Heatmap + quote always at top (week filter doesn't hide them)
  cont.insertAdjacentHTML("beforeend", renderHeatmap());
  const [q, who] = quoteOfDay();
  cont.insertAdjacentHTML("beforeend", `<div class="quote">${q}<span class="who">— ${who}</span></div>`);

  let lastWeek = null;
  SCHEDULE.forEach(d => {
    if(filterWeek && filterWeek !== "all" && String(d.week) !== String(filterWeek)) return;
    if(d.week !== lastWeek){
      cont.insertAdjacentHTML("beforeend", phaseBanner(d.week));
      lastWeek = d.week;
    }
    let totalTasks = 0, doneTasks = 0;
    let bodyHTML = "";
    d.slots.forEach((s, si) => {
      let inner = "";
      s.tasks.forEach((t, ti) => {
        const id = `d${d.day}-s${si}-t${ti}`;
        totalTasks++;
        if(isDone(id)) doneTasks++;
        inner += renderTaskHTML(id, t);
      });
      bodyHTML += `<div class="block"><div class="block-head"><b>${s.slot}</b>${s.time?` · ${s.time} min`:""}</div><ul class="tasks">${inner}</ul></div>`;
    });
    const pct = totalTasks ? Math.round(doneTasks*100/totalTasks) : 0;
    const completedCls = pct === 100 ? "completed" : "";
    const open = filterWeek && filterWeek !== "all" ? "open" : "";
    cont.insertAdjacentHTML("beforeend",
      `<div class="day ${open} ${completedCls}" data-day="${d.day}">
         <div class="day-head">
           <div><span class="day-num">DAY ${String(d.day).padStart(2,"0")}</span><span class="day-title">${d.dow} · ${d.title}</span></div>
           <div class="day-pct"><b>${doneTasks}</b>/${totalTasks} · ${pct}%</div>
         </div>
         <div class="day-body">${bodyHTML}</div>
       </div>`);
  });

  // wire toggles + checkboxes
  cont.querySelectorAll(".day-head").forEach(h => h.addEventListener("click", () => h.parentElement.classList.toggle("open")));
  cont.querySelectorAll(".cell").forEach(c => c.addEventListener("click", () => {
    const targetDay = c.dataset.day;
    document.querySelector(".tabs button[data-view='schedule']").click();
    setTimeout(() => {
      const el = document.querySelector(`.day[data-day='${targetDay}']`);
      if (el){ el.classList.add("open"); el.scrollIntoView({behavior:"smooth", block:"center"}); }
    }, 100);
  }));
  cont.querySelectorAll("input[type=checkbox]").forEach(cb => {
    cb.addEventListener("change", e => {
      const dayEl = cb.closest(".day");
      const wasComplete = dayEl.classList.contains("completed");
      setDone(cb.dataset.id, cb.checked);
      cb.parentElement.querySelector(".task-text").classList.toggle("done", cb.checked);
      // refresh per-day pct
      const all = dayEl.querySelectorAll("input[type=checkbox]");
      const done = [...all].filter(c=>c.checked).length;
      const pct = all.length ? Math.round(done*100/all.length) : 0;
      dayEl.querySelector(".day-pct").innerHTML = `<b>${done}</b>/${all.length} · ${pct}%`;
      const nowComplete = pct === 100;
      dayEl.classList.toggle("completed", nowComplete);
      if (nowComplete && !wasComplete){
        celebrateDay(parseInt(dayEl.dataset.day, 10));
      }
      // refresh heatmap cell
      const cell = document.querySelector(`.cell[data-day='${dayEl.dataset.day}']`);
      if (cell){
        cell.classList.remove("p25","p50","p75","p100");
        if (pct === 100) cell.classList.add("p100");
        else if (pct >= 75) cell.classList.add("p75");
        else if (pct >= 50) cell.classList.add("p50");
        else if (pct >= 25) cell.classList.add("p25");
      }
    });
    if(cb.checked) cb.parentElement.querySelector(".task-text").classList.add("done");
  });
}

// ───── celebration: confetti + toast ─────
function celebrateDay(dayNum){
  const msgs = [
    `🎉 Day ${dayNum} crushed! Streak: ${streak()} 🔥`,
    `💪 Day ${dayNum} done. Keep stacking wins.`,
    `⚡ Day ${dayNum} cleared. Compounding pays.`,
    `🚀 Day ${dayNum} sealed. ${60 - dayCompletedCount()} to go.`,
    `🏆 Day ${dayNum} closed. Future-you says thanks.`
  ];
  toast(msgs[Math.floor(Math.random()*msgs.length)]);
  confetti();
  if (dayCompletedCount() === 60){
    setTimeout(() => { toast("🌟 60 DAYS COMPLETE. GO GET THE OFFER. 🌟"); confetti(true); }, 800);
  }
}
function toast(msg){
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove("show"), 3200);
}
function confetti(epic){
  const c = document.getElementById("confetti");
  c.width = innerWidth; c.height = innerHeight;
  const ctx = c.getContext("2d");
  const colors = ["#ff9900","#146eb4","#4ade80","#c084fc","#fbbf24","#f87171","#60a5fa"];
  const N = epic ? 260 : 120;
  const parts = Array.from({length: N}, () => ({
    x: Math.random()*c.width,
    y: -20 - Math.random()*200,
    vx: (Math.random()-0.5)*5,
    vy: 3 + Math.random()*5,
    r: 4 + Math.random()*5,
    color: colors[Math.floor(Math.random()*colors.length)],
    rot: Math.random()*Math.PI,
    vr: (Math.random()-0.5)*0.3
  }));
  let frames = 0, max = epic ? 220 : 140;
  function step(){
    frames++;
    ctx.clearRect(0,0,c.width,c.height);
    parts.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.vy += 0.08; p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r, -p.r/2, p.r*2, p.r);
      ctx.restore();
    });
    if (frames < max) requestAnimationFrame(step);
    else ctx.clearRect(0,0,c.width,c.height);
  }
  step();
}

function updateStats(){
  let total=0, done=0;
  const counts = {DSA:0, SD:0, LP:0, BE:0, MK:0, LAB:0};
  SCHEDULE.forEach(d => {
    d.slots.forEach((s, si) => {
      s.tasks.forEach((t, ti) => {
        const id = `d${d.day}-s${si}-t${ti}`;
        total++;
        if(isDone(id)){
          done++;
          if(t.type === "dsa") counts.DSA += (t.names||[]).length;
          else if(t.type === "sd") counts.SD++;
          else if(t.type === "lp") counts.LP++;
          else if(t.type === "be") counts.BE++;
          else if(t.type === "mk") counts.MK++;
          else if(t.type === "lab") counts.LAB++;
        }
      });
    });
  });
  document.getElementById("done").textContent = done;
  document.getElementById("total").textContent = total;
  document.getElementById("bar").style.width = (total ? (done/total*100) : 0) + "%";
  document.getElementById("s-dsa").textContent = counts.DSA;
  document.getElementById("s-sd").textContent = counts.SD;
  document.getElementById("s-lp").textContent = counts.LP;
  document.getElementById("s-be").textContent = counts.BE;
  document.getElementById("s-mk").textContent = counts.MK;
  document.getElementById("s-lab").textContent = counts.LAB;
  document.getElementById("streak").textContent = streak();
  document.getElementById("day-completed").textContent = dayCompletedCount();
  // level: 1 XP per task done; level up every 25 XP
  const xp = done;
  const level = Math.floor(xp / 25) + 1;
  document.getElementById("xp").textContent = xp;
  document.getElementById("level").textContent = level;
}
